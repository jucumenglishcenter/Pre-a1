<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transform P2 - Pre-A1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#F59E0B;--primary-light:#FCD34D;--primary-dark:#D97706;--bg-gradient-start:#FFFBEB;--bg-gradient-end:#FEF3C7;--text-dark:#78350F;--text-medium:#92400E;--text-light:#B45309;--success:#10B981;--success-light:#D1FAE5;--success-dark:#059669;--error:#EF4444;--error-light:#FEE2E2;--error-dark:#DC2626;--info:#3B82F6;--info-light:#DBEAFE;--info-dark:#1D4ED8;--orange:#F97316;--orange-light:#FFF7ED;--orange-dark:#C2410C;--purple:#8B5CF6;--purple-light:#EDE9FE;--purple-dark:#6D28D9;--shadow-soft:0 4px 20px rgba(245,158,11,0.15);--border-radius:20px;}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end));min-height:100vh;color:var(--text-dark);}
        .header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-soft);}
        .back-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.4rem;text-decoration:none;color:var(--text-dark);transition:all .2s;flex-shrink:0;}
        .back-btn:hover{background:rgba(255,255,255,0.5);transform:scale(1.1);}
        .header-info{flex:1;}
        .header-title{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:600;color:white;}
        .header-subtitle{font-size:.8rem;color:rgba(255,255,255,.85);margin-top:2px;}
        .progress-indicator{background:rgba(255,255,255,0.3);padding:.4rem .9rem;border-radius:20px;font-weight:700;color:white;font-size:.9rem;}
        .progress-container{height:6px;background:rgba(255,255,255,0.3);}
        .progress-fill{height:100%;background:white;transition:width .5s ease;width:0%;}
        main{padding:1.5rem;max-width:650px;margin:0 auto;}
        .instructions{background:white;border-radius:16px;padding:1rem 1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow-soft);border-left:5px solid var(--primary);display:flex;gap:.75rem;align-items:flex-start;}
        .instructions-icon{font-size:1.6rem;flex-shrink:0;}
        .instructions-title{font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:600;color:var(--text-dark);margin-bottom:.2rem;}
        .instructions-text{font-size:.85rem;color:var(--text-medium);line-height:1.5;}
        .question-card{background:white;border-radius:var(--border-radius);box-shadow:var(--shadow-soft);padding:1.5rem;margin-bottom:1rem;animation:slideIn .4s ease;}
        .question-card.hidden{display:none;}
        @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        .q-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;}
        .question-number{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:.95rem;flex-shrink:0;}
        .transform-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .7rem;border-radius:20px;font-size:.72rem;font-weight:700;margin-left:auto;}
        .transform-badge.aff-neg{background:#FEE2E2;color:#DC2626;}
        .transform-badge.aff-q{background:#DBEAFE;color:#1D4ED8;}
        .transform-badge.neg-aff{background:#D1FAE5;color:#059669;}
        .transform-badge.neg-q{background:#DBEAFE;color:#1D4ED8;}
        .transform-badge.q-aff{background:#D1FAE5;color:#059669;}
        .transform-badge.q-neg{background:#FEE2E2;color:#DC2626;}
        .transform-visual{background:var(--bg-gradient-start);border:1px solid var(--primary-light);border-radius:14px;padding:1rem;margin-bottom:1rem;}
        .transform-box{padding:.7rem .9rem;border-radius:10px;}
        .transform-box.base{background:var(--orange-light);border:1px solid #FED7AA;margin-bottom:.5rem;}
        .transform-box.goal{background:#F0F9FF;border:1px solid #BAE6FD;}
        .transform-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:.3rem;}
        .transform-box.base .transform-label{color:var(--orange-dark);}
        .transform-box.goal .transform-label{color:var(--info-dark);}
        .transform-sentence{font-size:.98rem;font-weight:600;color:var(--text-dark);line-height:1.5;}
        .verb-highlight{color:var(--orange-dark);font-weight:800;background:#FED7AA;padding:0 3px;border-radius:3px;}
        .transform-arrow{text-align:center;font-size:1rem;color:var(--text-light);margin:.2rem 0;}
        .options-container{display:flex;flex-direction:column;gap:.65rem;margin-bottom:.5rem;}
        .option-btn{border:2.5px solid #E5E7EB;border-radius:13px;padding:.85rem 1rem;cursor:pointer;transition:all .2s;background:white;text-align:left;font-family:'Nunito',sans-serif;display:flex;gap:.75rem;align-items:center;width:100%;}
        .option-btn:hover:not(.disabled){border-color:var(--primary);background:var(--bg-gradient-start);transform:translateX(4px);}
        .option-btn.disabled{cursor:default;}
        .option-btn.correct{border-color:var(--success);background:var(--success-light);}
        .option-btn.incorrect{border-color:var(--error);background:var(--error-light);}
        .option-letter{width:26px;height:26px;border-radius:50%;background:var(--primary-light);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex-shrink:0;font-family:'Fredoka',sans-serif;}
        .option-btn.correct .option-letter{background:var(--success);color:white;}
        .option-btn.incorrect .option-letter{background:var(--error);color:white;}
        .option-text{font-size:.97rem;color:var(--text-dark);line-height:1.5;font-weight:600;flex:1;}
        .option-btn.correct .option-text{color:var(--success-dark);}
        .option-btn.incorrect .option-text{color:var(--error-dark);}
        .verb-changed{font-weight:900;}
        .feedback{margin-top:1.25rem;border-radius:16px;overflow:hidden;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
        .feedback.show{display:block;animation:fadeUp .35s ease;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .fb-header{padding:.9rem 1.25rem;display:flex;align-items:center;gap:.75rem;}
        .feedback.correct .fb-header{background:linear-gradient(135deg,var(--success),var(--success-dark));}
        .feedback.incorrect .fb-header{background:linear-gradient(135deg,var(--error),var(--error-dark));}
        .fb-icon{font-size:1.6rem;}
        .fb-title{font-family:'Fredoka',sans-serif;font-size:1.1rem;color:white;font-weight:600;}
        .fb-subtitle{font-size:.8rem;color:rgba(255,255,255,.85);margin-top:1px;}
        .fb-body{background:white;border:2px solid;border-top:none;border-radius:0 0 16px 16px;padding:1.25rem;display:flex;flex-direction:column;gap:.9rem;}
        .feedback.correct .fb-body{border-color:var(--success);}
        .feedback.incorrect .fb-body{border-color:var(--error);}
        .fb-block{border-radius:12px;padding:.9rem 1rem;}
        .fb-block-title{font-weight:800;font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
        .error-badge{display:inline-block;background:var(--error);color:white;padding:.15rem .55rem;border-radius:6px;font-size:.72rem;font-weight:700;margin-left:4px;}
        .fb-transform{background:#FFFBEB;border:1px solid var(--primary-light);}
        .fb-transform .fb-block-title{color:var(--primary-dark);}
        .transform-flow{display:flex;flex-direction:column;gap:.4rem;}
        .tf-step{padding:.5rem .8rem;border-radius:8px;font-size:.9rem;font-weight:600;}
        .tf-step.original{background:var(--orange-light);color:var(--orange-dark);}
        .tf-step.result-correct{background:var(--success-light);color:var(--success-dark);}
        .tf-step.result-wrong{background:var(--error-light);color:var(--error-dark);}
        .tf-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin-right:6px;opacity:.7;}
        .tf-arrow{text-align:center;font-size:.9rem;color:#94A3B8;}
        .vb-hl{font-weight:900;text-decoration:underline;}
        .fb-signal{background:#F0FDF4;border:1px solid #BBF7D0;}
        .fb-signal.wrong{background:#FFF1F2;border-color:#FECDD3;}
        .fb-signal .fb-block-title{color:var(--success-dark);}
        .fb-signal.wrong .fb-block-title{color:var(--error-dark);}
        .signal-tag{display:inline-block;background:var(--success);color:white;border-radius:6px;padding:.1rem .5rem;font-size:.82rem;font-weight:700;margin:0 2px;}
        .signal-tag.red{background:var(--error);}
        .fb-error{background:var(--error-light);border:1px solid #FECACA;}
        .fb-error .fb-block-title{color:var(--error-dark);}
        .word-swap{display:flex;align-items:center;justify-content:center;gap:.75rem;margin:.6rem 0;flex-wrap:wrap;}
        .ws-box{padding:.4rem 1rem;border-radius:8px;font-weight:700;font-size:.92rem;}
        .ws-wrong{background:white;color:var(--error);border:2px solid var(--error);text-decoration:line-through;}
        .ws-arrow{font-size:1.3rem;color:#94A3B8;}
        .ws-right{background:var(--success);color:white;}
        .error-text{font-size:.9rem;color:var(--text-dark);line-height:1.55;}
        .fb-rule{background:var(--info-light);border:1px solid #BFDBFE;}
        .fb-rule .fb-block-title{color:var(--info-dark);}
        .rule-formula{background:white;border-radius:8px;padding:.5rem .9rem;font-family:'Fredoka',sans-serif;font-size:.92rem;color:var(--info-dark);font-weight:600;margin-bottom:.6rem;text-align:center;border:1px solid #BFDBFE;}
        .rule-examples{display:flex;flex-wrap:wrap;gap:.4rem;}
        .rule-ex{font-size:.82rem;background:white;border:1px solid #BFDBFE;border-radius:6px;padding:.2rem .5rem;color:var(--success-dark);font-weight:600;}
        .fb-why{background:#F0FDF4;border:1px solid #BBF7D0;}
        .fb-why .fb-block-title{color:var(--success-dark);}
        .fb-why-text{font-size:.92rem;color:var(--text-dark);line-height:1.55;}
        .nav-buttons{display:flex;gap:.75rem;margin-top:1.25rem;}
        .nav-btn{padding:.8rem 1.2rem;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;}
        .nav-btn.next{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;flex:1;}
        .nav-btn.prev{background:#F1F5F9;color:var(--text-dark);}
        .nav-btn:disabled{opacity:.4;cursor:default;}
        .nav-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:var(--shadow-soft);}
        .results-screen{display:none;text-align:center;padding:2rem 1.5rem;}
        .results-screen.show{display:block;animation:fadeUp .5s ease;}
        .results-emoji{font-size:4rem;margin-bottom:1rem;}
        .results-title{font-family:'Fredoka',sans-serif;font-size:2rem;margin-bottom:.5rem;}
        .results-score{font-size:3rem;font-weight:800;color:var(--purple);margin:1rem 0;}
        .results-message{font-size:1.05rem;color:var(--text-medium);margin-bottom:1.5rem;}
        .stars-container{display:flex;justify-content:center;gap:.5rem;margin:1.5rem 0;}
        .star{font-size:2.5rem;opacity:.3;transition:all .5s ease;}
        .star.earned{opacity:1;animation:starPop .5s ease;}
        @keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
        .results-buttons{display:flex;flex-direction:column;gap:1rem;margin-top:2rem;}
        .result-btn{padding:1rem 2rem;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;}
        .result-btn.primary{background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:white;}
        .result-btn.secondary{background:#F1F5F9;color:var(--text-dark);}
        .result-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-soft);}
    </style>
</head>
<body>
    <header class="header">
        <a href="prea1-m1t2-index.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔄 Transform — Parte 2</div>
            <div class="header-subtitle">💛 Pre-A1 · Personal Identity · To Be + − ?</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <main>
        <div class="instructions">
            <div class="instructions-icon">🔄</div>
            <div>
                <div class="instructions-title">Transforma la oración</div>
                <div class="instructions-text">Lee la oración original y sigue el objetivo: cambia entre <strong>afirmativo ↔ negativo ↔ pregunta</strong> usando la forma correcta de <strong>to be</strong>.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="prea1-m1t2-index.html" class="result-btn secondary">← Volver al módulo</a>
            </div>
        </div>
    </main>
    <script>
    // To Be + − ? · Transform · Parte 2 — 10 preguntas
    // Las 6 combinaciones posibles, sujetos y contextos distintos a Parte 1
    // cv = changed verb (la parte que cambia en cada opción)
    const quizData = [
        {   // Q1: ➕→➖  he is → isn't
            id:1, ttype:"aff-neg",
            base:"Don Beto is the kindest man on our street.",
            bv:"is", goal:"➕ Afirmativo → ➖ Negativo",
            clue:"he (Don Beto) + negativa singular",
            clueExplain:"La negativa de 'he is' es 'he isn't' o 'he is not'. El verbo permanece en posición normal.",
            rule:"he/she/it is → he/she/it isn't",
            examples:["He is → He isn't","She is → She isn't","It is → It isn't"],
            correctReason:"'Don Beto' = he (singular). La negativa de 'is' es 'isn't'. El orden es: sujeto + isn't + resto.",
            options:[
                {text:"Don Beto isn't the kindest man on our street.", correct:true, cv:"isn't"},
                {text:"Don Beto aren't the kindest man on our street.", correct:false, cv:"aren't",
                 errorType:"Negativa plural por singular",
                 explanation:"'Aren't' es la negativa de 'are' — para sujetos plurales (we/they). 'Don Beto' = he — singular. La negativa correcta de 'he is' es 'isn't'."},
                {text:"Don Beto not is the kindest man on our street.", correct:false, cv:"not is",
                 errorType:"Orden incorrecto de la negación",
                 explanation:"'Not' va siempre DESPUÉS del verbo to be. No se dice 'not is'. La forma correcta es 'isn't' o 'is not'."}
            ]
        },
        {   // Q2: ➕→❓  they are → Are they?
            id:2, ttype:"aff-q",
            base:"Nico and Eva are in the same school.",
            bv:"are", goal:"➕ Afirmativo → ❓ Pregunta",
            clue:"Nico and Eva (plural) → pregunta con Are",
            clueExplain:"Para hacer una pregunta con 'are', el verbo va PRIMERO: Are + sujeto + ...?",
            rule:"sujeto + are → Are + sujeto + ...?",
            examples:["They are → Are they?","We are → Are we?","Nico and Eva are → Are Nico and Eva?"],
            correctReason:"Sujeto plural + 'are' → pregunta: 'Are + sujeto + ...?' El verbo se mueve al inicio.",
            options:[
                {text:"Are Nico and Eva in the same school?", correct:true, cv:"Are"},
                {text:"Is Nico and Eva in the same school?", correct:false, cv:"Is",
                 errorType:"Singular en pregunta plural",
                 explanation:"'Is' en preguntas va con he/she/it. 'Nico and Eva' son dos personas — plural. La pregunta con sujeto plural empieza con 'Are'."},
                {text:"Nico and Eva are in the same school?", correct:false, cv:"Nico and Eva are",
                 errorType:"Sin inversión — sujeto primero",
                 explanation:"En preguntas con to be el verbo SIEMPRE va primero. No se puede dejar el sujeto al inicio — eso no es una pregunta gramatical. Orden: Are + Nico and Eva + ...?"}
            ]
        },
        {   // Q3: ➖→➕  she isn't → she is
            id:3, ttype:"neg-aff",
            base:"Mia's grandma isn't in the photo.",
            bv:"isn't", goal:"➖ Negativo → ➕ Afirmativo",
            clue:"she (Mia's grandma) → afirmativa singular",
            clueExplain:"Para la afirmativa: se elimina 'not' y el verbo vuelve a su forma positiva. 'isn't' → 'is'.",
            rule:"she/he/it isn't → she/he/it is",
            examples:["She isn't → She is","He isn't → He is","It isn't → It is"],
            correctReason:"Se elimina la negación. 'isn't' (is not) regresa a 'is'. El orden es: sujeto + is + resto.",
            options:[
                {text:"Mia's grandma is in the photo.", correct:true, cv:"is"},
                {text:"Mia's grandma are in the photo.", correct:false, cv:"are",
                 errorType:"Plural por singular",
                 explanation:"'Are' es para sujetos plurales. 'Mia's grandma' = she (singular). La afirmativa de 'she isn't' es 'she is'."},
                {text:"Mia's grandma am in the photo.", correct:false, cv:"am",
                 errorType:"Primera persona por tercera",
                 explanation:"'Am' es solo para 'I'. 'Mia's grandma' = she (tercera persona). La afirmativa correcta es 'is'."}
            ]
        },
        {   // Q4: ➖→❓  we aren't → Are we?
            id:4, ttype:"neg-q",
            base:"We aren't late for class.",
            bv:"aren't", goal:"➖ Negativo → ❓ Pregunta",
            clue:"We (plural) → pregunta con Are",
            clueExplain:"Para convertir una negativa en pregunta: se elimina 'not' y el verbo va al inicio. 'aren't' → 'Are + we'?",
            rule:"we aren't → Are we + ...?",
            examples:["We aren't → Are we?","They aren't → Are they?","You aren't → Are you?"],
            correctReason:"Se elimina 'not', el verbo 'are' va primero. Orden: Are + we + ...? Con sujeto plural la pregunta usa 'Are'.",
            options:[
                {text:"Are we late for class?", correct:true, cv:"Are"},
                {text:"Is we late for class?", correct:false, cv:"Is",
                 errorType:"Singular en pregunta plural",
                 explanation:"'Is' en preguntas va con he/she/it. 'We' es plural. Al convertir 'we aren't' en pregunta, el verbo correcto es 'Are'."},
                {text:"We are late for class?", correct:false, cv:"We are",
                 errorType:"Sin inversión y con afirmativo",
                 explanation:"Dos errores: hay que eliminar el 'not' (pero usar la forma positiva) Y invertir el orden. El verbo debe ir primero. Orden: Are + we + ...?"}
            ]
        },
        {   // Q5: ❓→➕  Is she? → she is
            id:5, ttype:"q-aff",
            base:"Is Miss Rosa your teacher?",
            bv:"Is", goal:"❓ Pregunta → ➕ Afirmativo",
            clue:"she (Miss Rosa) → afirmativa singular",
            clueExplain:"Para la afirmativa: el sujeto va primero y el verbo después. 'Is + Miss Rosa' → 'Miss Rosa + is'.",
            rule:"Is she/he/it? → she/he/it is",
            examples:["Is she? → She is","Is he? → He is","Is Miss Rosa? → Miss Rosa is"],
            correctReason:"Se invierte el orden: el sujeto va primero y 'is' va después. Afirmativa: Miss Rosa + is + ....",
            options:[
                {text:"Miss Rosa is my teacher.", correct:true, cv:"is"},
                {text:"Miss Rosa are my teacher.", correct:false, cv:"are",
                 errorType:"Plural por singular",
                 explanation:"'Are' es para sujetos plurales. 'Miss Rosa' = she (singular). Al convertir la pregunta en afirmativa, la forma correcta es 'is'."},
                {text:"Miss Rosa am my teacher.", correct:false, cv:"am",
                 errorType:"Primera persona por tercera",
                 explanation:"'Am' es exclusivo de 'I'. 'Miss Rosa' es tercera persona singular (= she). La afirmativa correcta es 'Miss Rosa is'."}
            ]
        },
        {   // Q6: ❓→➖  Are they? → they aren't
            id:6, ttype:"q-neg",
            base:"Are Ravi and Dev the same age?",
            bv:"Are", goal:"❓ Pregunta → ➖ Negativo",
            clue:"they (Ravi and Dev, plural) → negativa con aren't",
            clueExplain:"Para la negativa: el sujeto va primero, el verbo después, y se añade 'not'. 'Are + Ravi and Dev' → 'Ravi and Dev + aren't'.",
            rule:"Are + sujeto? → sujeto + aren't",
            examples:["Are they? → They aren't","Are Ravi and Dev? → Ravi and Dev aren't","Are you? → You aren't"],
            correctReason:"Sujeto primero, luego 'aren't' (are not). El orden es: Ravi and Dev + aren't + ....",
            options:[
                {text:"Ravi and Dev aren't the same age.", correct:true, cv:"aren't"},
                {text:"Ravi and Dev isn't the same age.", correct:false, cv:"isn't",
                 errorType:"Singular por plural",
                 explanation:"'Isn't' es la negativa de 'is' — para he/she/it. 'Ravi and Dev' son dos personas — plural. La negativa plural es 'aren't'."},
                {text:"Ravi and Dev not are the same age.", correct:false, cv:"not are",
                 errorType:"Orden incorrecto de la negación",
                 explanation:"'Not' va DESPUÉS del verbo to be — nunca antes. El orden correcto es: Ravi and Dev + aren't (o are not)."}
            ]
        },
        {   // Q7: ➕→➖  I am → I am not
            id:7, ttype:"aff-neg",
            base:"I am ready for the exam.",
            bv:"am", goal:"➕ Afirmativo → ➖ Negativo",
            clue:"I + negativa → I am not",
            clueExplain:"La negativa de 'I am' es 'I am not'. No existe contracción '*amn't'. Es la única forma.",
            rule:"I am → I am not (sin contracción posible)",
            examples:["I am → I am not","I am ready → I am not ready","I am here → I am not here"],
            correctReason:"Con 'I', la negativa es 'I am not'. Se añade 'not' después de 'am'. No existe 'I amn't'.",
            options:[
                {text:"I am not ready for the exam.", correct:true, cv:"am not"},
                {text:"I isn't ready for the exam.", correct:false, cv:"isn't",
                 errorType:"Tercera persona con I",
                 explanation:"'Isn't' es la negativa de 'he/she/it is'. Con 'I' la negativa es siempre 'am not'. No existe 'I isn't'."},
                {text:"I not am ready for the exam.", correct:false, cv:"not am",
                 errorType:"Orden incorrecto de la negación",
                 explanation:"'Not' va siempre DESPUÉS del verbo. El orden correcto es: I + am + not. No se dice 'not am'."}
            ]
        },
        {   // Q8: ➕→❓  he is → Is he?
            id:8, ttype:"aff-q",
            base:"Nico's dad is very patient.",
            bv:"is", goal:"➕ Afirmativo → ❓ Pregunta",
            clue:"he (Nico's dad) → pregunta con Is",
            clueExplain:"Para preguntar con he/she/it: el verbo 'is' va PRIMERO. 'he is' → 'Is + he'?",
            rule:"he/she/it is → Is + he/she/it + ...?",
            examples:["He is → Is he?","She is → Is she?","Nico's dad is → Is Nico's dad?"],
            correctReason:"'Nico's dad' = he. En preguntas con he/she/it el verbo va primero: Is + Nico's dad + ...?",
            options:[
                {text:"Is Nico's dad very patient?", correct:true, cv:"Is"},
                {text:"Are Nico's dad very patient?", correct:false, cv:"Are",
                 errorType:"Plural en pregunta singular",
                 explanation:"'Are' en preguntas va con you/we/they — plural. 'Nico's dad' = he — singular. La pregunta con he/she/it empieza con 'Is'."},
                {text:"Nico's dad is very patient?", correct:false, cv:"Nico's dad is",
                 errorType:"Sin inversión — sujeto primero",
                 explanation:"En preguntas con to be el verbo SIEMPRE va primero. Dejar el sujeto al inicio no crea una pregunta gramatical. Orden: Is + Nico's dad + ...?"}
            ]
        },
        {   // Q9: ➖→➕  they aren't → they are
            id:9, ttype:"neg-aff",
            base:"Mom and grandma aren't in the kitchen yet.",
            bv:"aren't", goal:"➖ Negativo → ➕ Afirmativo",
            clue:"they (mom and grandma, plural) → afirmativa con are",
            clueExplain:"Para la afirmativa: se elimina 'not'. 'aren't' (are not) → 'are'. Orden: sujeto + are + resto.",
            rule:"they/plural aren't → they/plural are",
            examples:["They aren't → They are","Mom and grandma aren't → Mom and grandma are"],
            correctReason:"Se elimina la negación. 'aren't' regresa a 'are'. Sujeto plural + are + resto de la oración.",
            options:[
                {text:"Mom and grandma are in the kitchen.", correct:true, cv:"are"},
                {text:"Mom and grandma is in the kitchen.", correct:false, cv:"is",
                 errorType:"Singular por plural",
                 explanation:"'Is' es para he/she/it — un sujeto singular. 'Mom and grandma' son dos personas — plural. La afirmativa plural es 'are'."},
                {text:"Mom and grandma am in the kitchen.", correct:false, cv:"am",
                 errorType:"Primera persona por plural",
                 explanation:"'Am' es solo para 'I'. 'Mom and grandma' son tercera persona plural. La afirmativa correcta es 'are'."}
            ]
        },
        {   // Q10: ❓→➖  Am I? → I am not
            id:10, ttype:"q-neg",
            base:"Am I in the wrong classroom?",
            bv:"Am", goal:"❓ Pregunta → ➖ Negativo",
            clue:"I → negativa: I am not",
            clueExplain:"Para la negativa: el sujeto va primero, luego 'am not'. 'Am + I' → 'I + am not'.",
            rule:"Am I? → I am not",
            examples:["Am I? → I am not","Am I late? → I am not late","Am I wrong? → I am not wrong"],
            correctReason:"Sujeto 'I' primero, luego 'am not'. La negativa de 'I am' es siempre 'I am not'. No hay contracción posible.",
            options:[
                {text:"I am not in the wrong classroom.", correct:true, cv:"am not"},
                {text:"I isn't in the wrong classroom.", correct:false, cv:"isn't",
                 errorType:"Tercera persona con I",
                 explanation:"'Isn't' es la negativa de 'he/she/it is'. Con 'I' la negativa es siempre 'am not'. 'I isn't' no existe."},
                {text:"I not am in the wrong classroom.", correct:false, cv:"not am",
                 errorType:"Orden incorrecto de la negación",
                 explanation:"'Not' va siempre DESPUÉS del verbo to be. El orden correcto es: I + am + not. No se dice 'not am'."}
            ]
        }
    ];

    let currentQuestion=0, score=0;
    let answered=new Array(quizData.length).fill(false);
    function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

    function initQuiz(){
        const c=document.getElementById('questionsContainer');
        c.innerHTML='';
        quizData.forEach((q,i)=>{q.shuffled=shuffle([...q.options]);c.appendChild(createCard(q,i));});
        showQuestion(0);updateProgress();
    }

    function createCard(q,index){
        const card=document.createElement('div');
        card.className=`question-card ${index!==0?'hidden':''}`;
        card.id=`question-${index}`;
        const L=['A','B','C'];
        const bMap={
            'aff-neg':'➕ → ➖','aff-q':'➕ → ❓','neg-aff':'➖ → ➕',
            'neg-q':'➖ → ❓','q-aff':'❓ → ➕','q-neg':'❓ → ➖'
        };
        const badge=`<span class="transform-badge ${q.ttype}">${bMap[q.ttype]}</span>`;
        const baseH=q.base.replace(q.bv,`<span class="verb-highlight">${q.bv}</span>`);
        const opts=q.shuffled.map((opt,i)=>`
            <button class="option-btn" onclick="selectOption(${index},${i})">
                <div class="option-letter">${L[i]}</div>
                <div class="option-text">${opt.text.replace(opt.cv,`<span class="verb-changed">${opt.cv}</span>`)}</div>
            </button>`).join('');
        card.innerHTML=`
            <div class="q-header">
                <div class="question-number">${index+1}</div>
                <span style="font-size:.88rem;color:var(--text-medium);font-weight:600;flex:1;">Transforma la oración:</span>
                ${badge}
            </div>
            <div class="transform-visual">
                <div class="transform-box base">
                    <span class="transform-label">🔶 Oración original</span>
                    <div class="transform-sentence">${baseH}</div>
                </div>
                <div class="transform-arrow">⬇ Transforma a...</div>
                <div class="transform-box goal">
                    <span class="transform-label">🎯 Objetivo</span>
                    <div class="transform-sentence">${q.goal}</div>
                </div>
            </div>
            <div class="options-container" id="options-${index}">${opts}</div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index===0?'disabled':''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index===quizData.length-1?'Ver Resultados 🎉':'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    function selectOption(qi,optIdx){
        if(answered[qi])return;
        answered[qi]=true;
        const q=quizData[qi];
        const sel=q.shuffled[optIdx];
        const isCorrect=sel.correct;
        const correctOpt=q.shuffled.find(o=>o.correct);
        if(isCorrect)score++;
        document.querySelectorAll(`#options-${qi} .option-btn`).forEach((btn,i)=>{
            btn.classList.add('disabled');
            if(q.shuffled[i].correct)btn.classList.add('correct');
            else if(i===optIdx)btn.classList.add('incorrect');
        });
        buildFeedback(qi,sel,isCorrect,correctOpt,q);
        document.getElementById(`next-${qi}`).disabled=false;
        updateProgress();
    }

    function buildFeedback(qi,sel,isCorrect,correctOpt,q){
        const el=document.getElementById(`feedback-${qi}`);
        el.className=`feedback show ${isCorrect?'correct':'incorrect'}`;
        const exs=q.examples.map(e=>`<span class="rule-ex">${e}</span>`).join('');
        const hl=(text,word,cls)=>text.replace(word,`<span class="vb-hl ${cls}">${word}</span>`);
        const pBase=hl(q.base,q.bv,'');
        const pOk=hl(correctOpt.text,correctOpt.cv,'');
        const pBad=!isCorrect?hl(sel.text,sel.cv,''):null;
        const flow=`<div class="transform-flow">
            <div class="tf-step original"><span class="tf-label">Original:</span>${pBase}</div>
            <div class="tf-arrow">⬇</div>
            ${pBad?`<div class="tf-step result-wrong"><span class="tf-label">Tu respuesta:</span>${pBad}</div><div class="tf-arrow">↕</div>`:''}
            <div class="tf-step result-correct"><span class="tf-label">Correcto:</span>${pOk}</div>
        </div>`;
        if(isCorrect){
            el.innerHTML=`
            <div class="fb-header"><span class="fb-icon">✅</span><div>
                <div class="fb-title">¡Transformación correcta!</div>
                <div class="fb-subtitle">Aplicaste bien to be</div>
            </div></div>
            <div class="fb-body">
                <div class="fb-block fb-transform"><div class="fb-block-title">🔄 Transformación realizada</div>${flow}</div>
                <div class="fb-block fb-signal">
                    <div class="fb-block-title">🔍 Señal clave</div>
                    <div style="font-size:.92rem;color:var(--text-dark);line-height:1.55;"><span class="signal-tag">${q.clue}</span> — ${q.clueExplain}</div>
                </div>
                <div class="fb-block fb-rule">
                    <div class="fb-block-title">📐 Regla aplicada</div>
                    <div class="rule-formula">${q.rule}</div>
                    <div class="rule-examples">${exs}</div>
                </div>
                <div class="fb-block fb-why">
                    <div class="fb-block-title">💡 ¿Por qué es correcta?</div>
                    <div class="fb-why-text">${q.correctReason}</div>
                </div>
            </div>`;
        } else {
            el.innerHTML=`
            <div class="fb-header"><span class="fb-icon">❌</span><div>
                <div class="fb-title">Transformación incorrecta</div>
                <div class="fb-subtitle">Revisemos qué falló</div>
            </div></div>
            <div class="fb-body">
                <div class="fb-block fb-transform"><div class="fb-block-title">🔄 Tu transformación vs. la correcta</div>${flow}</div>
                <div class="fb-block fb-signal wrong">
                    <div class="fb-block-title">🔍 Señal clave que debías identificar</div>
                    <div style="font-size:.92rem;color:var(--text-dark);line-height:1.55;"><span class="signal-tag red">${q.clue}</span> — ${q.clueExplain}</div>
                </div>
                <div class="fb-block fb-error">
                    <div class="fb-block-title">⚠️ El error: <span class="error-badge">${sel.errorType}</span></div>
                    <div class="word-swap">
                        <span class="ws-box ws-wrong">${sel.cv}</span>
                        <span class="ws-arrow">→</span>
                        <span class="ws-box ws-right">${correctOpt.cv}</span>
                    </div>
                    <div class="error-text">${sel.explanation}</div>
                </div>
                <div class="fb-block fb-rule">
                    <div class="fb-block-title">📐 La regla correcta</div>
                    <div class="rule-formula">${q.rule}</div>
                    <div class="rule-examples">${exs}</div>
                </div>
                <div class="fb-block fb-why">
                    <div class="fb-block-title">💡 ¿Cómo debía hacerse?</div>
                    <div class="fb-why-text">${q.correctReason}</div>
                </div>
            </div>`;
        }
    }

    function showQuestion(i){document.querySelectorAll('.question-card').forEach((c,idx)=>c.classList.toggle('hidden',idx!==i));document.getElementById('currentQ').textContent=i+1;currentQuestion=i;}
    function nextQuestion(i){i<quizData.length-1?showQuestion(i+1):showResults();}
    function prevQuestion(){if(currentQuestion>0)showQuestion(currentQuestion-1);}
    function updateProgress(){const done=answered.filter(Boolean).length;document.getElementById('progressFill').style.width=(done/quizData.length*100)+'%';}
    function showResults(){
        document.querySelectorAll('.question-card').forEach(c=>c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct=score/quizData.length*100;
        document.getElementById('finalScore').textContent=`${score}/${quizData.length}`;
        const stars=pct>=90?3:pct>=70?2:1;
        document.getElementById('resultsMessage').textContent=pct>=90?'¡Excelente! Transformas to be perfectamente. 🏆':pct>=70?'¡Muy bien! Sigue practicando las transformaciones. 💪':'Buen esfuerzo. Recuerda: el verbo va primero en preguntas y "not" va después en negativas. 📚';
        document.querySelectorAll('.star').forEach((s,i)=>{if(i<stars)setTimeout(()=>s.classList.add('earned'),i*300);});
    }
    document.addEventListener('DOMContentLoaded',initQuiz);
    </script>
</body>
</html>
