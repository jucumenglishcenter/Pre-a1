<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identify P2 - Pre-A1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#F59E0B;--primary-light:#FCD34D;--primary-dark:#D97706;--bg-gradient-start:#FFFBEB;--bg-gradient-end:#FEF3C7;--text-dark:#78350F;--text-medium:#92400E;--text-light:#B45309;--success:#10B981;--success-light:#D1FAE5;--success-dark:#059669;--error:#EF4444;--error-light:#FEE2E2;--error-dark:#DC2626;--info:#3B82F6;--info-light:#DBEAFE;--info-dark:#1D4ED8;--purple:#8B5CF6;--purple-light:#EDE9FE;--purple-dark:#6D28D9;--shadow-soft:0 4px 20px rgba(245,158,11,0.15);--border-radius:20px;}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end));min-height:100vh;color:var(--text-dark);}
        .header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-soft);}
        .back-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.4rem;text-decoration:none;color:var(--text-dark);transition:all .2s;flex-shrink:0;}
        .back-btn:hover{background:rgba(255,255,255,0.5);transform:scale(1.1);}
        .header-info{flex:1;}
        .header-title{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:600;color:white;}
        .header-subtitle{font-size:0.8rem;color:rgba(255,255,255,0.85);margin-top:2px;}
        .progress-indicator{background:rgba(255,255,255,0.3);padding:0.4rem 0.9rem;border-radius:20px;font-weight:700;color:white;font-size:0.9rem;}
        .progress-container{height:6px;background:rgba(255,255,255,0.3);}
        .progress-fill{height:100%;background:white;transition:width .5s ease;width:0%;}
        main{padding:1.5rem;max-width:650px;margin:0 auto;}
        .instructions{background:white;border-radius:16px;padding:1rem 1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow-soft);border-left:5px solid var(--primary);display:flex;gap:0.75rem;align-items:flex-start;}
        .instructions-icon{font-size:1.6rem;flex-shrink:0;}
        .instructions-title{font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:600;color:var(--text-dark);margin-bottom:0.2rem;}
        .instructions-text{font-size:0.85rem;color:var(--text-medium);line-height:1.5;}
        .question-card{background:white;border-radius:var(--border-radius);box-shadow:var(--shadow-soft);padding:1.5rem;margin-bottom:1rem;animation:slideIn .4s ease;}
        .question-card.hidden{display:none;}
        @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        .q-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;}
        .question-number{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:0.95rem;flex-shrink:0;}
        .q-label{font-size:.88rem;color:var(--text-medium);font-weight:600;flex:1;}
        .form-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .7rem;border-radius:20px;font-size:.72rem;font-weight:700;}
        .form-badge.affirmative{background:#D1FAE5;color:#059669;}
        .form-badge.negative{background:#FEE2E2;color:#DC2626;}
        .form-badge.question{background:#DBEAFE;color:#1D4ED8;}
        .sentence-options{display:flex;flex-direction:column;gap:.65rem;margin-bottom:.5rem;}
        .sent-option{border:2.5px solid #E5E7EB;border-radius:13px;padding:.9rem 1rem;cursor:pointer;transition:all .2s;background:white;text-align:left;font-family:'Nunito',sans-serif;display:flex;gap:.75rem;align-items:center;width:100%;}
        .sent-option:hover:not(.disabled){border-color:var(--primary);background:var(--bg-gradient-start);transform:translateX(4px);}
        .sent-option.disabled{cursor:default;}
        .sent-option.correct{border-color:var(--success);background:var(--success-light);}
        .sent-option.incorrect{border-color:var(--error);background:var(--error-light);}
        .option-letter{width:26px;height:26px;border-radius:50%;background:var(--primary-light);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex-shrink:0;font-family:'Fredoka',sans-serif;}
        .sent-option.correct .option-letter{background:var(--success);color:white;}
        .sent-option.incorrect .option-letter{background:var(--error);color:white;}
        .option-text{font-size:.97rem;color:var(--text-dark);line-height:1.5;font-weight:600;flex:1;}
        .sent-option.correct .option-text{color:var(--success-dark);}
        .sent-option.incorrect .option-text{color:var(--error-dark);}
        .option-status{font-size:1.1rem;flex-shrink:0;opacity:0;}
        .sent-option.disabled .option-status{opacity:1;}
        .error-highlight{background:#FEE2E2;color:var(--error-dark);font-weight:800;padding:0 3px;border-radius:3px;text-decoration:underline wavy var(--error);}
        .correct-highlight{background:var(--success-light);color:var(--success-dark);font-weight:800;padding:0 3px;border-radius:3px;}
        .feedback{margin-top:1.25rem;border-radius:16px;overflow:hidden;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
        .feedback.show{display:block;animation:fadeUp .35s ease;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .fb-header{padding:.9rem 1.25rem;display:flex;align-items:center;gap:.75rem;}
        .feedback.correct .fb-header{background:linear-gradient(135deg,var(--success),var(--success-dark));}
        .feedback.incorrect .fb-header{background:linear-gradient(135deg,var(--error),var(--error-dark));}
        .fb-icon{font-size:1.6rem;}
        .fb-title{font-family:'Fredoka',sans-serif;font-size:1.1rem;color:white;font-weight:600;}
        .fb-subtitle{font-size:.8rem;color:rgba(255,255,255,.85);margin-top:1px;}
        .fb-body{background:white;border:2px solid;border-top:none;border-radius:0 0 16px 16px;padding:1.25rem;display:flex;flex-direction:column;gap:.9rem;}
        .feedback.correct .fb-body{border-color:var(--success);}
        .feedback.incorrect .fb-body{border-color:var(--error);}
        .fb-block{border-radius:12px;padding:.9rem 1rem;}
        .fb-block-title{font-weight:800;font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
        .error-badge{display:inline-block;background:var(--error);color:white;padding:.15rem .55rem;border-radius:6px;font-size:.72rem;font-weight:700;margin-left:4px;}
        .fb-signal{background:#F0FDF4;border:1px solid #BBF7D0;}
        .fb-signal.wrong{background:#FFF1F2;border-color:#FECDD3;}
        .fb-signal .fb-block-title{color:var(--success-dark);}
        .fb-signal.wrong .fb-block-title{color:var(--error-dark);}
        .signal-tag{display:inline-block;background:var(--success);color:white;border-radius:6px;padding:.1rem .5rem;font-size:.82rem;font-weight:700;margin:0 2px;}
        .signal-tag.red{background:var(--error);}
        .fb-compare{background:#F8FAFC;border:1px solid #E2E8F0;}
        .fb-compare .fb-block-title{color:#475569;}
        .compare-row{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:.5rem;padding:.6rem .8rem;border-radius:8px;}
        .compare-row:last-child{margin-bottom:0;}
        .compare-row:first-of-type{background:var(--error-light);}
        .compare-row:last-of-type{background:var(--success-light);}
        .compare-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;padding-top:2px;flex-shrink:0;}
        .compare-label.wrong{color:var(--error-dark);}
        .compare-label.right{color:var(--success-dark);}
        .compare-text{font-size:.92rem;font-weight:600;color:var(--text-dark);line-height:1.5;}
        .fb-error{background:var(--error-light);border:1px solid #FECACA;}
        .fb-error .fb-block-title{color:var(--error-dark);}
        .word-swap{display:flex;align-items:center;justify-content:center;gap:.75rem;margin:.6rem 0;flex-wrap:wrap;}
        .ws-box{padding:.4rem 1rem;border-radius:8px;font-weight:700;font-size:.92rem;}
        .ws-wrong{background:white;color:var(--error);border:2px solid var(--error);text-decoration:line-through;}
        .ws-arrow{font-size:1.3rem;color:#94A3B8;}
        .ws-right{background:var(--success);color:white;}
        .error-text{font-size:.9rem;color:var(--text-dark);line-height:1.55;}
        .fb-rule{background:var(--info-light);border:1px solid #BFDBFE;}
        .fb-rule .fb-block-title{color:var(--info-dark);}
        .rule-formula{background:white;border-radius:8px;padding:.5rem .9rem;font-family:'Fredoka',sans-serif;font-size:.92rem;color:var(--info-dark);font-weight:600;margin-bottom:.6rem;text-align:center;border:1px solid #BFDBFE;}
        .rule-examples{display:flex;flex-wrap:wrap;gap:.4rem;}
        .rule-ex{font-size:.82rem;background:white;border:1px solid #BFDBFE;border-radius:6px;padding:.2rem .5rem;color:var(--success-dark);font-weight:600;}
        .fb-why{background:#F0FDF4;border:1px solid #BBF7D0;}
        .fb-why .fb-block-title{color:var(--success-dark);}
        .fb-why-text{font-size:.92rem;color:var(--text-dark);line-height:1.55;}
        .nav-buttons{display:flex;gap:.75rem;margin-top:1.25rem;}
        .nav-btn{padding:.8rem 1.2rem;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;}
        .nav-btn.next{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;flex:1;}
        .nav-btn.prev{background:#F1F5F9;color:var(--text-dark);}
        .nav-btn:disabled{opacity:.4;cursor:default;}
        .nav-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:var(--shadow-soft);}
        .results-screen{display:none;text-align:center;padding:2rem 1.5rem;}
        .results-screen.show{display:block;animation:fadeUp .5s ease;}
        .results-emoji{font-size:4rem;margin-bottom:1rem;}
        .results-title{font-family:'Fredoka',sans-serif;font-size:2rem;margin-bottom:.5rem;}
        .results-score{font-size:3rem;font-weight:800;color:var(--purple);margin:1rem 0;}
        .results-message{font-size:1.05rem;color:var(--text-medium);margin-bottom:1.5rem;}
        .stars-container{display:flex;justify-content:center;gap:.5rem;margin:1.5rem 0;}
        .star{font-size:2.5rem;opacity:.3;transition:all .5s ease;}
        .star.earned{opacity:1;animation:starPop .5s ease;}
        @keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
        .results-buttons{display:flex;flex-direction:column;gap:1rem;margin-top:2rem;}
        .result-btn{padding:1rem 2rem;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;}
        .result-btn.primary{background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:white;}
        .result-btn.secondary{background:#F1F5F9;color:var(--text-dark);}
        .result-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-soft);}
    </style>
</head>
<body>
    <header class="header">
        <a href="prea1-m1t2-index.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔍 Identify — Parte 2</div>
            <div class="header-subtitle">💛 Pre-A1 · Personal Identity · To Be + − ?</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <main>
        <div class="instructions">
            <div class="instructions-icon">🔍</div>
            <div>
                <div class="instructions-title">Identifica la oración correcta</div>
                <div class="instructions-text">Una de las tres oraciones usa <strong>to be</strong> correctamente. Las otras dos tienen errores gramaticales. Identifícala.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="prea1-m1t2-index.html" class="result-btn secondary">← Volver al módulo</a>
            </div>
        </div>
    </main>
    <script>
    // To Be + − ? · Identify · Parte 2 — 10 preguntas
    // Distribución: 4 afirmativas · 3 negativas · 3 preguntas
    // NINGUNA oración repite sujeto+error de la Parte 1
    const quizData = [
        {   // Q1 afirmativa — Don Beto is
            id:1, form:"affirmative",
            clue:"Don Beto (= he, singular)",
            clueExplain:"'Don Beto' es una persona masculina singular — equivale a 'he'. Con he/she/it el verbo es siempre 'is'.",
            rule:"he/she/it → is",
            examples:["Don Beto is strong.","She is kind.","The baby is tiny."],
            correctForm:"is",
            correctReason:"'Don Beto' = he (singular). Con cualquier sujeto singular de tercera persona el verbo to be es 'is'.",
            options:[
                {text:"Don Beto is very strong and kind.", correct:true},
                {text:"Don Beto are very strong and kind.", correct:false,
                 errorWord:"are", correctWord:"is",
                 errorType:"Plural por singular",
                 explanation:"'Are' va con we/you/they — sujetos plurales. 'Don Beto' es una sola persona (= he). Con he/she/it siempre va 'is'."},
                {text:"Don Beto am very strong and kind.", correct:false,
                 errorWord:"am", correctWord:"is",
                 errorType:"Primera persona por tercera",
                 explanation:"'Am' es exclusivo de 'I'. 'Don Beto' es otra persona — tercera persona singular. Con he el verbo es 'is'."}
            ]
        },
        {   // Q2 afirmativa — Nico and Eva are
            id:2, form:"affirmative",
            clue:"Nico and Eva (dos personas = plural)",
            clueExplain:"Dos personas unidas por 'and' forman un sujeto plural. Plural → 'are'.",
            rule:"dos sujetos con 'and' → are",
            examples:["Nico and Eva are classmates.","Leo and Ana are friends.","Mom and dad are happy."],
            correctForm:"are",
            correctReason:"'Nico and Eva' son dos personas — sujeto plural. Cuando hay dos o más sujetos con 'and', el verbo to be es 'are'.",
            options:[
                {text:"Nico and Eva are good friends at school.", correct:true},
                {text:"Nico and Eva is good friends at school.", correct:false,
                 errorWord:"is", correctWord:"are",
                 errorType:"Singular por plural",
                 explanation:"'Is' es para un solo sujeto (he/she/it). 'Nico and Eva' son dos personas. Dos o más sujetos con 'and' requieren 'are'."},
                {text:"Nico and Eva am good friends at school.", correct:false,
                 errorWord:"am", correctWord:"are",
                 errorType:"Primera persona por plural",
                 explanation:"'Am' solo va con 'I'. 'Nico and Eva' son tercera persona plural. La forma correcta es 'are'."}
            ]
        },
        {   // Q3 afirmativa — My dad is
            id:3, form:"affirmative",
            clue:"My dad (= he, singular)",
            clueExplain:"'My dad' es una persona masculina singular — equivale a 'he'. Con he/she/it el verbo es 'is'.",
            rule:"he/she/it → is",
            examples:["My dad is kind.","He is patient.","Dad is the nicest person."],
            correctForm:"is",
            correctReason:"'My dad' = he (singular). La regla es clara: he/she/it + is. Sin excepciones.",
            options:[
                {text:"My dad is the kindest person I know.", correct:true},
                {text:"My dad are the kindest person I know.", correct:false,
                 errorWord:"are", correctWord:"is",
                 errorType:"Plural por singular",
                 explanation:"'Are' va con sujetos plurales (we/you/they). 'My dad' es una sola persona masculina — equivale a 'he'. Con he siempre va 'is'."},
                {text:"My dad am the kindest person I know.", correct:false,
                 errorWord:"am", correctWord:"is",
                 errorType:"Primera persona por tercera",
                 explanation:"'Am' es solo para 'I'. 'My dad' es otra persona — tercera persona singular. La forma correcta es 'is'."}
            ]
        },
        {   // Q4 afirmativa — I am (distinto a Q1 de P1 porque distinto contexto)
            id:4, form:"affirmative",
            clue:"I (primera persona singular)",
            clueExplain:"'I' es la primera persona singular. La única forma posible es 'am'. Es una regla fija.",
            rule:"I → am (siempre, sin excepción)",
            examples:["I am Ana.","I am happy today.","I am in the right class."],
            correctForm:"am",
            correctReason:"Con 'I' como sujeto el verbo to be siempre es 'am'. No existe 'I is' ni 'I are' en inglés.",
            options:[
                {text:"I am glad I met you today, Leo.", correct:true},
                {text:"I is glad I met you today, Leo.", correct:false,
                 errorWord:"is", correctWord:"am",
                 errorType:"Tercera persona con I",
                 explanation:"'Is' es para he/she/it — nunca para 'I'. Con 'I' la única forma correcta es 'am'. Siempre."},
                {text:"I are glad I met you today, Leo.", correct:false,
                 errorWord:"are", correctWord:"am",
                 errorType:"Plural con I",
                 explanation:"'Are' va con you/we/they. 'I' es primera persona singular — solo acepta 'am'. No existe 'I are'."}
            ]
        },
        {   // Q5 negativa — The brothers aren't
            id:5, form:"negative",
            clue:"The two brothers (plural)",
            clueExplain:"'The two brothers' son dos personas — plural. La negativa plural de to be es 'aren't'.",
            rule:"they/plural → aren't",
            examples:["They aren't brothers.","The boys aren't here.","We aren't the same age."],
            correctForm:"aren't",
            correctReason:"'The two brothers' = they (plural). La negativa de 'are' es 'aren't'. Regla: sujeto plural + aren't.",
            options:[
                {text:"The two brothers aren't in the same class.", correct:true},
                {text:"The two brothers isn't in the same class.", correct:false,
                 errorWord:"isn't", correctWord:"aren't",
                 errorType:"Singular por plural",
                 explanation:"'Isn't' es la negativa de 'is' — para he/she/it. Los dos hermanos son plural. La negativa plural es 'aren't'."},
                {text:"The two brothers not are in the same class.", correct:false,
                 errorWord:"not are", correctWord:"aren't",
                 errorType:"Orden incorrecto de la negación",
                 explanation:"'Not' siempre va DESPUÉS del verbo to be — nunca antes. El orden correcto es: sujeto + aren't (o are not). 'Not are' no existe."}
            ]
        },
        {   // Q6 negativa — It isn't
            id:6, form:"negative",
            clue:"It (singular impersonal)",
            clueExplain:"'It' es tercera persona singular (cosa/situación). La negativa de 'it is' es 'it isn't'.",
            rule:"it/he/she → isn't",
            examples:["It isn't easy.","It isn't far.","It isn't cold today."],
            correctForm:"isn't",
            correctReason:"'It' = singular. La negativa de 'is' es 'isn't' (is not). Regla: it + isn't.",
            options:[
                {text:"It isn't always easy to share a room.", correct:true},
                {text:"It aren't always easy to share a room.", correct:false,
                 errorWord:"aren't", correctWord:"isn't",
                 errorType:"Plural por singular",
                 explanation:"'Aren't' es la negativa de 'are' — para sujetos plurales. 'It' es singular. La negativa de 'it is' es 'isn't'."},
                {text:"It not is always easy to share a room.", correct:false,
                 errorWord:"not is", correctWord:"isn't",
                 errorType:"Orden incorrecto de la negación",
                 explanation:"'Not' va siempre después del verbo to be. No se dice 'not is' — se dice 'isn't' o 'is not'. El orden correcto es: it + isn't."}
            ]
        },
        {   // Q7 negativa — I am not (distinto sujeto al de P1 negativas)
            id:7, form:"negative",
            clue:"I (primera persona) + negativa",
            clueExplain:"La negativa de 'I am' es 'I am not'. No existe contracción estándar '*amn't'.",
            rule:"I am → negativa: I am not (sin contracción)",
            examples:["I am not ready.","I am not in Room 6.","I am not the oldest."],
            correctForm:"am not",
            correctReason:"Con 'I' la negativa es 'am not'. No existe '*I amn't'. Es la única forma negativa correcta para primera persona singular.",
            options:[
                {text:"I am not the oldest student in class.", correct:true},
                {text:"I isn't the oldest student in class.", correct:false,
                 errorWord:"isn't", correctWord:"am not",
                 errorType:"Tercera persona con I",
                 explanation:"'Isn't' es la negativa de 'he/she/it is'. Con 'I' la negativa es 'am not'. No existe 'I isn't'."},
                {text:"I not am the oldest student in class.", correct:false,
                 errorWord:"not am", correctWord:"am not",
                 errorType:"Orden incorrecto de la negación",
                 explanation:"'Not' siempre va después del verbo to be. El orden correcto es: I + am + not. No se dice 'not am'."}
            ]
        },
        {   // Q8 pregunta — Is she?
            id:8, form:"question",
            clue:"Miss Rosa (= she, singular)",
            clueExplain:"'Miss Rosa' = she (singular). En preguntas con he/she/it el verbo va primero: Is + sujeto.",
            rule:"pregunta he/she/it → Is + sujeto + ...?",
            examples:["Is she funny?","Is he your brother?","Is Miss Rosa kind?"],
            correctForm:"Is",
            correctReason:"'Miss Rosa' = she (tercera persona singular). En preguntas con he/she/it el verbo 'is' va PRIMERO. Orden: Is + sujeto + ...?",
            options:[
                {text:"Is Miss Rosa the teacher in Room 5?", correct:true},
                {text:"Are Miss Rosa the teacher in Room 5?", correct:false,
                 errorWord:"Are", correctWord:"Is",
                 errorType:"Plural en pregunta singular",
                 explanation:"'Are' en preguntas va con you/we/they. 'Miss Rosa' = she — singular. La pregunta con he/she/it empieza con 'Is'."},
                {text:"Miss Rosa is the teacher in Room 5?", correct:false,
                 errorWord:"Miss Rosa is", correctWord:"Is Miss Rosa",
                 errorType:"Sujeto antes del verbo en pregunta",
                 explanation:"En preguntas con to be el verbo va PRIMERO. No se puede dejar el sujeto antes del verbo — eso no es una pregunta gramatical. Orden: Is + Miss Rosa + ...?"}
            ]
        },
        {   // Q9 pregunta — Are they? (familia)
            id:9, form:"question",
            clue:"Ravi's brothers (= they, plural)",
            clueExplain:"'Ravi's brothers' = they (plural). En preguntas con sujetos plurales el verbo es 'Are'.",
            rule:"pregunta plural → Are + sujeto + ...?",
            examples:["Are they brothers?","Are they in the same class?","Are Ravi and Dev friends?"],
            correctForm:"Are",
            correctReason:"'Ravi's brothers' = they (plural). En preguntas con sujetos plurales el verbo to be es 'Are'. Orden: Are + sujeto + ...?",
            options:[
                {text:"Are Ravi's brothers both in our school?", correct:true},
                {text:"Is Ravi's brothers both in our school?", correct:false,
                 errorWord:"Is", correctWord:"Are",
                 errorType:"Singular en pregunta plural",
                 explanation:"'Is' es para preguntas con he/she/it. 'Ravi's brothers' son dos — plural. La pregunta con sujeto plural empieza con 'Are'."},
                {text:"Am Ravi's brothers both in our school?", correct:false,
                 errorWord:"Am", correctWord:"Are",
                 errorType:"Primera persona en pregunta plural",
                 explanation:"'Am' solo aparece en preguntas con 'I' como sujeto: 'Am I...?'. Con sujetos plurales la pregunta empieza con 'Are'."}
            ]
        },
        {   // Q10 pregunta — Am I? (distinto contexto al de P1)
            id:10, form:"question",
            clue:"I (primera persona singular)",
            clueExplain:"Con 'I' como sujeto la pregunta siempre empieza con 'Am'. Es la única forma posible.",
            rule:"Am I + ...? (única pregunta con I)",
            examples:["Am I right?","Am I late?","Am I in the right seat?"],
            correctForm:"Am",
            correctReason:"'Am I?' es la pregunta de primera persona singular. No existe 'Is I?' ni 'Are I?' en inglés. Siempre 'Am I?'.",
            options:[
                {text:"Am I the new student in this class?", correct:true},
                {text:"Is I the new student in this class?", correct:false,
                 errorWord:"Is I", correctWord:"Am I",
                 errorType:"Tercera persona con I en pregunta",
                 explanation:"'Is' en preguntas va con he/she/it — nunca con 'I'. Con 'I' la pregunta siempre empieza con 'Am'. No existe 'Is I?'."},
                {text:"Are I the new student in this class?", correct:false,
                 errorWord:"Are I", correctWord:"Am I",
                 errorType:"Plural con I en pregunta",
                 explanation:"'Are' en preguntas va con you/we/they. 'I' es primera persona singular — su única pregunta posible es 'Am I?'. No existe 'Are I?'."}
            ]
        }
    ];

    let currentQuestion=0, score=0;
    let answered=new Array(quizData.length).fill(false);

    function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

    function initQuiz(){
        const c=document.getElementById('questionsContainer');
        c.innerHTML='';
        quizData.forEach((q,i)=>{q.shuffled=shuffle([...q.options]);c.appendChild(createCard(q,i));});
        showQuestion(0);updateProgress();
    }

    function createCard(q,index){
        const card=document.createElement('div');
        card.className=`question-card ${index!==0?'hidden':''}`;
        card.id=`question-${index}`;
        const L=['A','B','C'];
        const badges={affirmative:'✅ Afirmativo',negative:'❌ Negativo',question:'❓ Pregunta'};
        const badge=`<span class="form-badge ${q.form}">${badges[q.form]}</span>`;
        const opts=q.shuffled.map((opt,i)=>`
            <button class="sent-option" onclick="selectOption(${index},${i})">
                <div class="option-letter">${L[i]}</div>
                <div class="option-text">${opt.text}</div>
                <div class="option-status">${opt.correct?'✅':'❌'}</div>
            </button>`).join('');
        card.innerHTML=`
            <div class="q-header">
                <div class="question-number">${index+1}</div>
                <span class="q-label">Elige la oración correcta:</span>
                ${badge}
            </div>
            <div class="sentence-options" id="options-${index}">${opts}</div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index===0?'disabled':''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index===quizData.length-1?'Ver Resultados 🎉':'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    function selectOption(qi,optIdx){
        if(answered[qi])return;
        answered[qi]=true;
        const q=quizData[qi];
        const sel=q.shuffled[optIdx];
        const isCorrect=sel.correct;
        const correctOpt=q.shuffled.find(o=>o.correct);
        if(isCorrect)score++;
        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn,i)=>{
            btn.classList.add('disabled');
            if(q.shuffled[i].correct)btn.classList.add('correct');
            else if(i===optIdx)btn.classList.add('incorrect');
        });
        buildFeedback(qi,sel,isCorrect,correctOpt,q);
        document.getElementById(`next-${qi}`).disabled=false;
        updateProgress();
    }

    function mark(text,word,cls){return text.replace(word,`<span class="${cls}">${word}</span>`);}

    function buildFeedback(qi,sel,isCorrect,correctOpt,q){
        const el=document.getElementById(`feedback-${qi}`);
        el.className=`feedback show ${isCorrect?'correct':'incorrect'}`;
        const exs=q.examples.map(e=>`<span class="rule-ex">${e}</span>`).join('');
        const errors=q.shuffled.filter(o=>!o.correct);
        if(isCorrect){
            el.innerHTML=`
            <div class="fb-header"><span class="fb-icon">✅</span><div>
                <div class="fb-title">¡Correcto! Identificaste bien la oración</div>
                <div class="fb-subtitle">Veamos por qué las otras estaban mal</div>
            </div></div>
            <div class="fb-body">
                <div class="fb-block fb-signal">
                    <div class="fb-block-title">🔍 Señal clave</div>
                    <div style="font-size:.92rem;color:var(--text-dark);line-height:1.55;">
                        <span class="signal-tag">${q.clue}</span> — ${q.clueExplain}
                    </div>
                </div>
                ${errors.map(err=>`
                <div class="fb-block fb-error">
                    <div class="fb-block-title">⚠️ Error en una opción: <span class="error-badge">${err.errorType}</span></div>
                    <div class="word-swap">
                        <span class="ws-box ws-wrong">${err.errorWord}</span>
                        <span class="ws-arrow">→</span>
                        <span class="ws-box ws-right">${err.correctWord}</span>
                    </div>
                    <div class="error-text">${err.explanation}</div>
                </div>`).join('')}
                <div class="fb-block fb-rule">
                    <div class="fb-block-title">📐 Regla aplicada</div>
                    <div class="rule-formula">I → am · he/she/it → is · we/you/they → are</div>
                    <div class="rule-examples">${exs}</div>
                </div>
                <div class="fb-block fb-why">
                    <div class="fb-block-title">💡 ¿Por qué es correcta?</div>
                    <div class="fb-why-text">${q.correctReason}</div>
                </div>
            </div>`;
        } else {
            el.innerHTML=`
            <div class="fb-header"><span class="fb-icon">❌</span><div>
                <div class="fb-title">Incorrecto — revisemos juntos</div>
                <div class="fb-subtitle">Identifica la diferencia entre las oraciones</div>
            </div></div>
            <div class="fb-body">
                <div class="fb-block fb-signal wrong">
                    <div class="fb-block-title">🔍 Señal clave que debías identificar</div>
                    <div style="font-size:.92rem;color:var(--text-dark);line-height:1.55;">
                        <span class="signal-tag red">${q.clue}</span> — ${q.clueExplain}
                    </div>
                </div>
                <div class="fb-block fb-compare">
                    <div class="fb-block-title">🔄 Tu elección vs. la correcta</div>
                    <div class="compare-row">
                        <span class="compare-label wrong">Elegiste</span>
                        <span class="compare-text">${mark(sel.text,sel.errorWord,'error-highlight')}</span>
                    </div>
                    <div class="compare-row">
                        <span class="compare-label right">Correcta</span>
                        <span class="compare-text">${mark(correctOpt.text,q.correctForm,'correct-highlight')}</span>
                    </div>
                </div>
                <div class="fb-block fb-error">
                    <div class="fb-block-title">⚠️ El error: <span class="error-badge">${sel.errorType}</span></div>
                    <div class="word-swap">
                        <span class="ws-box ws-wrong">${sel.errorWord}</span>
                        <span class="ws-arrow">→</span>
                        <span class="ws-box ws-right">${sel.correctWord}</span>
                    </div>
                    <div class="error-text">${sel.explanation}</div>
                </div>
                <div class="fb-block fb-rule">
                    <div class="fb-block-title">📐 La regla correcta</div>
                    <div class="rule-formula">I → am · he/she/it → is · we/you/they → are</div>
                    <div class="rule-examples">${exs}</div>
                </div>
                <div class="fb-block fb-why">
                    <div class="fb-block-title">💡 ¿Por qué es correcta la otra?</div>
                    <div class="fb-why-text">${q.correctReason}</div>
                </div>
            </div>`;
        }
    }

    function showQuestion(i){document.querySelectorAll('.question-card').forEach((c,idx)=>c.classList.toggle('hidden',idx!==i));document.getElementById('currentQ').textContent=i+1;currentQuestion=i;}
    function nextQuestion(i){i<quizData.length-1?showQuestion(i+1):showResults();}
    function prevQuestion(){if(currentQuestion>0)showQuestion(currentQuestion-1);}
    function updateProgress(){const done=answered.filter(Boolean).length;document.getElementById('progressFill').style.width=(done/quizData.length*100)+'%';}
    function showResults(){
        document.querySelectorAll('.question-card').forEach(c=>c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct=score/quizData.length*100;
        document.getElementById('finalScore').textContent=`${score}/${quizData.length}`;
        const stars=pct>=90?3:pct>=70?2:1;
        document.getElementById('resultsMessage').textContent=pct>=90?'¡Excelente! Identificas el to be perfectamente. 🏆':pct>=70?'¡Muy bien! Sigue practicando. 💪':'Buen esfuerzo. Repasa I→am, he/she/it→is, we/you/they→are. 📚';
        document.querySelectorAll('.star').forEach((s,i)=>{if(i<stars)setTimeout(()=>s.classList.add('earned'),i*300);});
    }
    document.addEventListener('DOMContentLoaded',initQuiz);
    </script>
</body>
</html>
