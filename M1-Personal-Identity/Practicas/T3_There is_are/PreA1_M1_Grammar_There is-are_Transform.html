<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transform - Pre-A1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#F59E0B;--primary-light:#FCD34D;--primary-dark:#D97706;
            --bg-gradient-start:#FFFBEB;--bg-gradient-end:#FEF3C7;
            --text-dark:#78350F;--text-medium:#92400E;--text-light:#B45309;
            --success:#10B981;--success-light:#D1FAE5;--success-dark:#059669;
            --error:#EF4444;--error-light:#FEE2E2;--error-dark:#DC2626;
            --info:#3B82F6;--info-light:#DBEAFE;--info-dark:#1D4ED8;
            --orange:#F97316;--orange-light:#FFF7ED;--orange-dark:#C2410C;
            --purple:#8B5CF6;--purple-light:#EDE9FE;--purple-dark:#6D28D9;
            --shadow-soft:0 4px 20px rgba(245,158,11,0.15);
            --border-radius:20px;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end));min-height:100vh;color:var(--text-dark);}
        .header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-soft);}
        .back-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.4rem;text-decoration:none;color:var(--text-dark);transition:all .2s;flex-shrink:0;}
        .back-btn:hover{background:rgba(255,255,255,0.5);transform:scale(1.1);}
        .header-info{flex:1;}
        .header-title{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:600;color:white;}
        .header-subtitle{font-size:0.8rem;color:rgba(255,255,255,0.85);margin-top:2px;}
        .progress-indicator{background:rgba(255,255,255,0.3);padding:0.4rem 0.9rem;border-radius:20px;font-weight:700;color:white;font-size:0.9rem;}
        .progress-container{height:6px;background:rgba(255,255,255,0.3);}
        .progress-fill{height:100%;background:white;transition:width .5s ease;width:0%;}
        main{padding:1.5rem;max-width:650px;margin:0 auto;}
        .instructions{background:white;border-radius:16px;padding:1rem 1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow-soft);border-left:5px solid var(--primary);display:flex;gap:0.75rem;align-items:flex-start;}
        .instructions-icon{font-size:1.6rem;flex-shrink:0;}
        .instructions-title{font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:600;color:var(--text-dark);margin-bottom:0.2rem;}
        .instructions-text{font-size:0.85rem;color:var(--text-medium);line-height:1.5;}
        .question-card{background:white;border-radius:var(--border-radius);box-shadow:var(--shadow-soft);padding:1.5rem;margin-bottom:1rem;animation:slideIn .4s ease;}
        .question-card.hidden{display:none;}
        @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        .q-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;}
        .question-number{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:0.95rem;flex-shrink:0;}
        .transform-badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.7rem;border-radius:20px;font-size:0.72rem;font-weight:700;margin-left:auto;}
        .transform-badge.to-plural{background:#D1FAE5;color:#059669;}
        .transform-badge.to-singular{background:#DBEAFE;color:#1D4ED8;}
        .transform-visual{background:var(--bg-gradient-start);border:1px solid var(--primary-light);border-radius:14px;padding:1rem;margin-bottom:1rem;}
        .transform-box{padding:0.7rem 0.9rem;border-radius:10px;}
        .transform-box.base{background:var(--orange-light);border:1px solid #FED7AA;margin-bottom:0.5rem;}
        .transform-box.goal{background:#F0F9FF;border:1px solid #BAE6FD;}
        .transform-label{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:0.3rem;}
        .transform-box.base .transform-label{color:var(--orange-dark);}
        .transform-box.goal .transform-label{color:var(--info-dark);}
        .transform-sentence{font-size:0.98rem;font-weight:600;color:var(--text-dark);line-height:1.5;}
        .verb-highlight{color:var(--orange-dark);font-weight:800;background:#FED7AA;padding:0 3px;border-radius:3px;}
        .transform-arrow{text-align:center;font-size:1rem;color:var(--text-light);margin:0.2rem 0;}
        .options-container{display:flex;flex-direction:column;gap:0.65rem;margin-bottom:0.5rem;}
        .option-btn{border:2.5px solid #E5E7EB;border-radius:13px;padding:0.85rem 1rem;cursor:pointer;transition:all .2s;background:white;text-align:left;font-family:'Nunito',sans-serif;display:flex;gap:0.75rem;align-items:center;width:100%;}
        .option-btn:hover:not(.disabled){border-color:var(--primary);background:var(--bg-gradient-start);transform:translateX(4px);}
        .option-btn.disabled{cursor:default;}
        .option-btn.correct{border-color:var(--success);background:var(--success-light);}
        .option-btn.incorrect{border-color:var(--error);background:var(--error-light);}
        .option-letter{width:26px;height:26px;border-radius:50%;background:var(--primary-light);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.8rem;flex-shrink:0;font-family:'Fredoka',sans-serif;}
        .option-btn.correct .option-letter{background:var(--success);color:white;}
        .option-btn.incorrect .option-letter{background:var(--error);color:white;}
        .option-text{font-size:0.97rem;color:var(--text-dark);line-height:1.5;font-weight:600;flex:1;}
        .option-btn.correct .option-text{color:var(--success-dark);}
        .option-btn.incorrect .option-text{color:var(--error-dark);}
        .verb-changed{font-weight:800;}
        .option-btn.correct .verb-changed{color:var(--success-dark);}
        .feedback{margin-top:1.25rem;border-radius:16px;overflow:hidden;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
        .feedback.show{display:block;animation:fadeUp .35s ease;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .fb-header{padding:0.9rem 1.25rem;display:flex;align-items:center;gap:0.75rem;}
        .feedback.correct .fb-header{background:linear-gradient(135deg,var(--success),var(--success-dark));}
        .feedback.incorrect .fb-header{background:linear-gradient(135deg,var(--error),var(--error-dark));}
        .fb-icon{font-size:1.6rem;}
        .fb-title{font-family:'Fredoka',sans-serif;font-size:1.1rem;color:white;font-weight:600;}
        .fb-subtitle{font-size:0.8rem;color:rgba(255,255,255,0.85);margin-top:1px;}
        .fb-body{background:white;border:2px solid;border-top:none;border-radius:0 0 16px 16px;padding:1.25rem;display:flex;flex-direction:column;gap:0.9rem;}
        .feedback.correct .fb-body{border-color:var(--success);}
        .feedback.incorrect .fb-body{border-color:var(--error);}
        .fb-block{border-radius:12px;padding:0.9rem 1rem;}
        .fb-block-title{font-weight:800;font-size:0.78rem;text-transform:uppercase;letter-spacing:.6px;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;}
        .error-badge{display:inline-block;background:var(--error);color:white;padding:0.15rem 0.55rem;border-radius:6px;font-size:0.72rem;font-weight:700;margin-left:4px;}
        .fb-transform{background:#FFFBEB;border:1px solid var(--primary-light);}
        .fb-transform .fb-block-title{color:var(--primary-dark);}
        .transform-flow{display:flex;flex-direction:column;gap:0.4rem;}
        .tf-step{padding:0.5rem 0.8rem;border-radius:8px;font-size:0.9rem;font-weight:600;}
        .tf-step.present{background:var(--orange-light);color:var(--orange-dark);}
        .tf-step.past-correct{background:var(--success-light);color:var(--success-dark);}
        .tf-step.past-wrong{background:var(--error-light);color:var(--error-dark);}
        .tf-label{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin-right:6px;opacity:.7;}
        .tf-arrow{text-align:center;font-size:0.9rem;color:#94A3B8;}
        .vb-highlight{font-weight:900;text-decoration:underline;}
        .fb-signal{background:#F0FDF4;border:1px solid #BBF7D0;}
        .fb-signal.wrong{background:#FFF1F2;border-color:#FECDD3;}
        .fb-signal .fb-block-title{color:var(--success-dark);}
        .fb-signal.wrong .fb-block-title{color:var(--error-dark);}
        .signal-tag{display:inline-block;background:var(--success);color:white;border-radius:6px;padding:0.1rem 0.5rem;font-size:0.82rem;font-weight:700;margin:0 2px;}
        .signal-tag.red{background:var(--error);}
        .fb-error{background:var(--error-light);border:1px solid #FECACA;}
        .fb-error .fb-block-title{color:var(--error-dark);}
        .word-swap{display:flex;align-items:center;justify-content:center;gap:0.75rem;margin:0.6rem 0;flex-wrap:wrap;}
        .ws-box{padding:0.4rem 1rem;border-radius:8px;font-weight:700;font-size:0.92rem;text-align:center;}
        .ws-wrong{background:white;color:var(--error);border:2px solid var(--error);text-decoration:line-through;}
        .ws-arrow{font-size:1.3rem;color:#94A3B8;}
        .ws-right{background:var(--success);color:white;}
        .error-text{font-size:0.9rem;color:var(--text-dark);line-height:1.55;}
        .fb-rule{background:var(--info-light);border:1px solid #BFDBFE;}
        .fb-rule .fb-block-title{color:var(--info-dark);}
        .rule-formula{background:white;border-radius:8px;padding:0.5rem 0.9rem;font-family:'Fredoka',sans-serif;font-size:0.92rem;color:var(--info-dark);font-weight:600;margin-bottom:0.6rem;text-align:center;border:1px solid #BFDBFE;}
        .rule-examples{display:flex;flex-wrap:wrap;gap:0.4rem;}
        .rule-ex{font-size:0.82rem;background:white;border:1px solid #BFDBFE;border-radius:6px;padding:0.2rem 0.5rem;color:var(--success-dark);font-weight:600;}
        .fb-why{background:#F0FDF4;border:1px solid #BBF7D0;}
        .fb-why .fb-block-title{color:var(--success-dark);}
        .fb-why-text{font-size:0.92rem;color:var(--text-dark);line-height:1.55;}
        .nav-buttons{display:flex;gap:0.75rem;margin-top:1.25rem;}
        .nav-btn{padding:0.8rem 1.2rem;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all .2s;}
        .nav-btn.next{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;flex:1;}
        .nav-btn.prev{background:#F1F5F9;color:var(--text-dark);}
        .nav-btn:disabled{opacity:.4;cursor:default;}
        .nav-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:var(--shadow-soft);}
        .results-screen{display:none;text-align:center;padding:2rem 1.5rem;}
        .results-screen.show{display:block;animation:fadeUp .5s ease;}
        .results-emoji{font-size:4rem;margin-bottom:1rem;}
        .results-title{font-family:'Fredoka',sans-serif;font-size:2rem;margin-bottom:0.5rem;}
        .results-score{font-size:3rem;font-weight:800;color:var(--purple);margin:1rem 0;}
        .results-message{font-size:1.05rem;color:var(--text-medium);margin-bottom:1.5rem;}
        .stars-container{display:flex;justify-content:center;gap:0.5rem;margin:1.5rem 0;}
        .star{font-size:2.5rem;opacity:.3;transition:all .5s ease;}
        .star.earned{opacity:1;animation:starPop .5s ease;}
        @keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
        .results-buttons{display:flex;flex-direction:column;gap:1rem;margin-top:2rem;}
        .result-btn{padding:1rem 2rem;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:0.5rem;transition:all .2s;}
        .result-btn.primary{background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:white;}
        .result-btn.secondary{background:#F1F5F9;color:var(--text-dark);}
        .result-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-soft);}
    </style>
</head>
<body>
    <header class="header">
        <a href="prea1-m1t3-index.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔄 Transform</div>
            <div class="header-subtitle">💛 Pre-A1 · Personal Identity · There is / There are</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <main>
        <div class="instructions">
            <div class="instructions-icon">🔄</div>
            <div>
                <div class="instructions-title">Transforma la oración</div>
                <div class="instructions-text">Lee la oración original y sigue el objetivo. Cambia <strong>There is → There are</strong> (o viceversa) según el nuevo sujeto.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="prea1-m1t3-index.html" class="result-btn secondary">← Volver al módulo</a>
            </div>
        </div>
    </main>
    <script>
    // ============================================================
    // PRE-A1 · Personal Identity · There is / There are
    // Transform — 10 preguntas
    // Tipos de transformación:
    //   5 × singular→plural  (There IS → There ARE)
    //   5 × plural→singular  (There ARE → There IS)
    // Todos los sujetos vienen de las stories y diálogos de M1
    // ============================================================
    const quizData = [
        {   // Q1: There IS → There ARE (un niño → dos niños)
            id:1, transformType:"to-plural",
            base: "There is a boy called Ravi in our class.",
            baseVerb: "is",
            goal: "Cambia a plural: dos niños (Ravi and Dev)",
            clue: "Ravi and Dev → plural",
            clueExplain: "Al cambiar de un niño a dos niños el sujeto se vuelve plural. Plural → 'There ARE'.",
            rule: "singular → plural : There IS → There ARE",
            examples:["There is a boy → There are two boys","There is a photo → There are two photos","There is a student → There are two students"],
            correctReason:"'Ravi and Dev' son dos personas — plural. Cuando el sujeto cambia de singular a plural, 'There is' se convierte en 'There are'. La forma del verbo sigue al sustantivo.",
            correctVerb:"are",
            options:[
                {text:"There are two boys, Ravi and Dev, in our class.", correct:true, changedVerb:"are"},
                {text:"There is two boys, Ravi and Dev, in our class.", correct:false, changedVerb:"is",
                 errorType:"Singular con sujeto plural",
                 explanation:"'Two boys' son dos — plural. 'There is' solo va con singular. Al pluralizar el sujeto, la forma verbal debe cambiar a 'There are'."},
                {text:"There have two boys, Ravi and Dev, in our class.", correct:false, changedVerb:"have",
                 errorType:"Forma inexistente",
                 explanation:"'There have' no existe. Para plural la forma correcta es siempre 'There are'."}
            ]
        },
        {   // Q2: There ARE → There IS (cinco personas → una persona)
            id:2, transformType:"to-singular",
            base: "There are five people in the photo.",
            baseVerb: "are",
            goal: "Cambia a singular: solo Mia",
            clue: "only Mia → singular",
            clueExplain: "Al reducir a una sola persona el sujeto pasa a singular. Singular → 'There IS'.",
            rule: "plural → singular : There ARE → There IS",
            examples:["There are five people → There is only one person","There are two chairs → There is one chair","There are many photos → There is one photo"],
            correctReason:"'Only Mia' es una persona — singular. Cuando el sujeto cambia de plural a singular, 'There are' se convierte en 'There is'.",
            correctVerb:"is",
            options:[
                {text:"There is only Mia in the photo.", correct:true, changedVerb:"is"},
                {text:"There are only Mia in the photo.", correct:false, changedVerb:"are",
                 errorType:"Plural con sujeto singular",
                 explanation:"'Only Mia' es una sola persona. 'There are' exige plural. Con un sujeto singular la forma correcta es 'There is'."},
                {text:"There be only Mia in the photo.", correct:false, changedVerb:"be",
                 errorType:"Forma inexistente",
                 explanation:"'There be' no existe. Para singular la forma correcta es 'There is'."}
            ]
        },
        {   // Q3: There IS → There ARE (un bebé → dos bebés)
            id:3, transformType:"to-plural",
            base: "There is a new baby in Nico's house.",
            baseVerb: "is",
            goal: "Cambia a plural: dos new babies",
            clue: "two new babies → plural",
            clueExplain: "'Two new babies' son dos — plural. Plural → 'There ARE'.",
            rule: "There IS + singular → There ARE + plural",
            examples:["There is a baby → There are two babies","There is a brother → There are two brothers","There is a neighbor → There are many neighbors"],
            correctReason:"Al cambiar de un bebé a dos bebés el sujeto se vuelve plural. La forma 'There is' debe cambiar a 'There are' para concordar.",
            correctVerb:"are",
            options:[
                {text:"There are two new babies in Nico's house.", correct:true, changedVerb:"are"},
                {text:"There is two new babies in Nico's house.", correct:false, changedVerb:"is",
                 errorType:"Singular con sujeto plural",
                 explanation:"'Two new babies' son dos — plural. 'There is' solo va con un elemento singular. La forma correcta con plural es 'There are'."},
                {text:"There was two new babies in Nico's house.", correct:false, changedVerb:"was",
                 errorType:"Tiempo incorrecto — pasado",
                 explanation:"'There was' es el pasado singular. La situación es presente y el sujeto es plural. La forma correcta es 'There are'."}
            ]
        },
        {   // Q4: There ARE → There IS (asientos vacíos → un asiento)
            id:4, transformType:"to-singular",
            base: "There are still some empty seats.",
            baseVerb: "are",
            goal: "Cambia a singular: solo un asiento vacío",
            clue: "only one empty seat → singular",
            clueExplain: "Al reducir a un solo asiento el sujeto pasa a singular. Singular → 'There IS'.",
            rule: "plural → singular : There ARE → There IS",
            examples:["There are seats → There is one seat","There are people → There is one person","There are brothers → There is one brother"],
            correctReason:"'Only one empty seat' es singular — un solo asiento. 'There are' debe cambiar a 'There is' porque el sujeto es ahora singular.",
            correctVerb:"is",
            options:[
                {text:"There is still only one empty seat.", correct:true, changedVerb:"is"},
                {text:"There are still only one empty seat.", correct:false, changedVerb:"are",
                 errorType:"Plural con sujeto singular",
                 explanation:"'One empty seat' es singular — un asiento. 'There are' exige más de uno. Con un sujeto singular la forma correcta es 'There is'."},
                {text:"There have still only one empty seat.", correct:false, changedVerb:"have",
                 errorType:"Forma inexistente",
                 explanation:"'There have' no existe. Para singular, la forma correcta es 'There is'."}
            ]
        },
        {   // Q5: There ARE → There IS (seis personas → una persona)
            id:5, transformType:"to-singular",
            base: "There are six people in Ravi's family.",
            baseVerb: "are",
            goal: "Cambia a singular: solo su mamá",
            clue: "only his mom → singular",
            clueExplain: "'Only his mom' es una persona — singular. Singular → 'There IS'.",
            rule: "plural → singular : There ARE → There IS",
            examples:["There are six people → There is only one person","There are brothers → There is one brother","There are students → There is one student"],
            correctReason:"Pasamos de seis personas a una sola (la mamá). El sujeto singular exige 'There is'. La forma verbal siempre concuerda con el número del sujeto.",
            correctVerb:"is",
            options:[
                {text:"There is only his mom in Ravi's family photo.", correct:true, changedVerb:"is"},
                {text:"There are only his mom in Ravi's family photo.", correct:false, changedVerb:"are",
                 errorType:"Plural con sujeto singular",
                 explanation:"'Only his mom' es una persona. 'There are' exige dos o más. Con un sujeto singular la forma correcta es 'There is'."},
                {text:"There were only his mom in Ravi's family photo.", correct:false, changedVerb:"were",
                 errorType:"Tiempo incorrecto — pasado plural",
                 explanation:"'There were' es el pasado plural. La situación es presente y el sujeto es singular. La forma correcta es 'There is'."}
            ]
        },
        {   // Q6: There IS → There ARE (el abuelo → el abuelo y la abuela)
            id:6, transformType:"to-plural",
            base: "There is also my grandpa, Don Beto.",
            baseVerb: "is",
            goal: "Cambia a plural: abuelo y abuela",
            clue: "my grandpa and grandma → plural",
            clueExplain: "'My grandpa and grandma' son dos personas — plural. Plural → 'There ARE'.",
            rule: "There IS + singular → There ARE + plural",
            examples:["There is my grandpa → There are my grandpa and grandma","There is a neighbor → There are two neighbors","There is a boy → There are two boys"],
            correctReason:"Al agregar la abuela, el sujeto pasa de uno a dos — plural. 'There is' debe cambiar a 'There are' para concordar con dos personas.",
            correctVerb:"are",
            options:[
                {text:"There are also my grandpa and grandma.", correct:true, changedVerb:"are"},
                {text:"There is also my grandpa and grandma.", correct:false, changedVerb:"is",
                 errorType:"Singular con sujeto plural",
                 explanation:"'My grandpa and grandma' son dos personas — plural. 'There is' solo va con una persona. Con dos personas la forma correcta es 'There are'."},
                {text:"There be also my grandpa and grandma.", correct:false, changedVerb:"be",
                 errorType:"Forma inexistente",
                 explanation:"'There be' no existe. Para plural la forma correcta es 'There are'."}
            ]
        },
        {   // Q7: There ARE → There IS (ocho personas → una persona)
            id:7, transformType:"to-singular",
            base: "There are eight people in the photo on Mia's wall.",
            baseVerb: "are",
            goal: "Cambia a singular: solo la abuela Norma",
            clue: "only grandma Norma → singular",
            clueExplain: "Una sola persona — singular. Singular → 'There IS'.",
            rule: "plural → singular : There ARE → There IS",
            examples:["There are eight people → There is only one person","There are many photos → There is one photo","There are brothers → There is one brother"],
            correctReason:"Pasamos de ocho personas a una (la abuela Norma). El sujeto singular exige 'There is'. 'There are' solo va con dos o más.",
            correctVerb:"is",
            options:[
                {text:"There is only grandma Norma in the photo.", correct:true, changedVerb:"is"},
                {text:"There are only grandma Norma in the photo.", correct:false, changedVerb:"are",
                 errorType:"Plural con sujeto singular",
                 explanation:"'Only grandma Norma' es una persona. 'There are' exige más de uno. La forma correcta con singular es 'There is'."},
                {text:"There was only grandma Norma in the photo.", correct:false, changedVerb:"was",
                 errorType:"Tiempo incorrecto — pasado",
                 explanation:"'There was' es el pasado de 'There is'. La foto existe en el presente. El tiempo correcto es 'There is'."}
            ]
        },
        {   // Q8: There IS → There ARE (apuro → dos cosas que hacer)
            id:8, transformType:"to-plural",
            base: "There is no rush on Saturday morning.",
            baseVerb: "is",
            goal: "Cambia a plural: dos things to do",
            clue: "two things to do → plural",
            clueExplain: "'Two things' son dos — plural. Plural → 'There ARE'.",
            rule: "There IS + singular → There ARE + plural",
            examples:["There is no rush → There are two things to do","There is a task → There are many tasks","There is one moment → There are many moments"],
            correctReason:"Al cambiar de 'no rush' (singular/incontable) a 'two things' (plural), el sujeto pasa a ser plural. 'There is' debe cambiar a 'There are'.",
            correctVerb:"are",
            options:[
                {text:"There are two things to do on Saturday morning.", correct:true, changedVerb:"are"},
                {text:"There is two things to do on Saturday morning.", correct:false, changedVerb:"is",
                 errorType:"Singular con sujeto plural",
                 explanation:"'Two things' son dos — plural. 'There is' solo va con uno. Con dos o más elementos la forma correcta es 'There are'."},
                {text:"There have two things to do on Saturday morning.", correct:false, changedVerb:"have",
                 errorType:"Forma inexistente",
                 explanation:"'There have' no existe. Para plural la forma correcta es 'There are'."}
            ]
        },
        {   // Q9: There IS → There ARE (una vecina → dos vecinas)
            id:9, transformType:"to-plural",
            base: "There is also my neighbor Mrs. Ana.",
            baseVerb: "is",
            goal: "Cambia a plural: Mrs. Ana and Mrs. Lupe",
            clue: "Mrs. Ana and Mrs. Lupe → plural",
            clueExplain: "Dos vecinas — plural. Plural → 'There ARE'.",
            rule: "There IS + singular → There ARE + plural",
            examples:["There is a neighbor → There are two neighbors","There is a kind woman → There are two kind women","There is Mrs. Ana → There are Mrs. Ana and Mrs. Lupe"],
            correctReason:"Al agregar una segunda vecina el sujeto pasa a plural. 'There is' (una persona) se convierte en 'There are' (dos personas).",
            correctVerb:"are",
            options:[
                {text:"There are also Mrs. Ana and Mrs. Lupe, my neighbors.", correct:true, changedVerb:"are"},
                {text:"There is also Mrs. Ana and Mrs. Lupe, my neighbors.", correct:false, changedVerb:"is",
                 errorType:"Singular con sujeto plural",
                 explanation:"'Mrs. Ana and Mrs. Lupe' son dos vecinas — plural. 'There is' solo va con una persona. Con dos la forma correcta es 'There are'."},
                {text:"There were also Mrs. Ana and Mrs. Lupe, my neighbors.", correct:false, changedVerb:"were",
                 errorType:"Tiempo incorrecto — pasado",
                 explanation:"'There were' es el pasado plural. Las vecinas existen en el presente. La forma correcta es 'There are'."}
            ]
        },
        {   // Q10: There ARE → There IS (muchas historias → una historia)
            id:10, transformType:"to-singular",
            base: "There are many stories in grandpa's memory.",
            baseVerb: "are",
            goal: "Cambia a singular: one story",
            clue: "one story → singular",
            clueExplain: "Una sola historia — singular. Singular → 'There IS'.",
            rule: "plural → singular : There ARE → There IS",
            examples:["There are many stories → There is one story","There are people → There is one person","There are brothers → There is one brother"],
            correctReason:"Al cambiar de 'many stories' a 'one story' el sujeto pasa a singular. 'There are' debe cambiar a 'There is' para concordar.",
            correctVerb:"is",
            options:[
                {text:"There is one story in grandpa's memory.", correct:true, changedVerb:"is"},
                {text:"There are one story in grandpa's memory.", correct:false, changedVerb:"are",
                 errorType:"Plural con sujeto singular",
                 explanation:"'One story' es una historia — singular. 'There are' exige dos o más. Con un sujeto singular la forma correcta es 'There is'."},
                {text:"There be one story in grandpa's memory.", correct:false, changedVerb:"be",
                 errorType:"Forma inexistente",
                 explanation:"'There be' no existe. Para singular la forma correcta es 'There is'."}
            ]
        }
    ];

    let currentQuestion=0, score=0;
    let answered=new Array(quizData.length).fill(false);

    function initQuiz(){
        const c=document.getElementById('questionsContainer');
        c.innerHTML='';
        quizData.forEach((q,i)=>{
            q.shuffled=[...q.options].sort(()=>Math.random()-.5);
            c.appendChild(createCard(q,i));
        });
        showQuestion(0); updateProgress();
    }

    function createCard(q,index){
        const card=document.createElement('div');
        card.className=`question-card ${index!==0?'hidden':''}`;
        card.id=`question-${index}`;
        const L=['A','B','C'];
        const badge=q.transformType==='to-plural'
            ?'<span class="transform-badge to-plural">IS → ARE</span>'
            :'<span class="transform-badge to-singular">ARE → IS</span>';
        const baseH=q.base.replace(q.baseVerb,`<span class="verb-highlight">${q.baseVerb}</span>`);
        const opts=q.shuffled.map((opt,i)=>`
            <button class="option-btn" onclick="selectOption(${index},${i})">
                <div class="option-letter">${L[i]}</div>
                <div class="option-text">${opt.text.replace(opt.changedVerb,`<span class="verb-changed">${opt.changedVerb}</span>`)}</div>
            </button>`).join('');
        card.innerHTML=`
            <div class="q-header">
                <div class="question-number">${index+1}</div>
                <span style="font-size:0.88rem;color:var(--text-medium);font-weight:600;flex:1;">Transforma la oración:</span>
                ${badge}
            </div>
            <div class="transform-visual">
                <div class="transform-box base">
                    <span class="transform-label">🔶 Oración original</span>
                    <div class="transform-sentence">${baseH}</div>
                </div>
                <div class="transform-arrow">⬇ Transforma a...</div>
                <div class="transform-box goal">
                    <span class="transform-label">🎯 Objetivo</span>
                    <div class="transform-sentence">${q.goal}</div>
                </div>
            </div>
            <div class="options-container" id="options-${index}">${opts}</div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index===0?'disabled':''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index===quizData.length-1?'Ver Resultados 🎉':'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    function selectOption(qi,optIdx){
        if(answered[qi])return;
        answered[qi]=true;
        const q=quizData[qi];
        const sel=q.shuffled[optIdx];
        const isCorrect=sel.correct;
        const correctOpt=q.shuffled.find(o=>o.correct);
        if(isCorrect)score++;
        document.querySelectorAll(`#options-${qi} .option-btn`).forEach((btn,i)=>{
            btn.classList.add('disabled');
            if(q.shuffled[i].correct)btn.classList.add('correct');
            else if(i===optIdx)btn.classList.add('incorrect');
        });
        buildFeedback(qi,sel,isCorrect,correctOpt,q);
        document.getElementById(`next-${qi}`).disabled=false;
        updateProgress();
    }

    function buildFeedback(qi,sel,isCorrect,correctOpt,q){
        const el=document.getElementById(`feedback-${qi}`);
        el.className=`feedback show ${isCorrect?'correct':'incorrect'}`;
        const exs=q.examples.map(e=>`<span class="rule-ex">${e}</span>`).join('');
        const pBase=q.base.replace(q.baseVerb,`<span class="vb-highlight">${q.baseVerb}</span>`);
        const pCorrect=correctOpt.text.replace(correctOpt.changedVerb,`<span class="vb-highlight">${correctOpt.changedVerb}</span>`);
        const pWrong=!isCorrect?sel.text.replace(sel.changedVerb,`<span class="vb-highlight">${sel.changedVerb}</span>`):null;
        const flow=`
            <div class="transform-flow">
                <div class="tf-step present"><span class="tf-label">Original:</span>${pBase}</div>
                <div class="tf-arrow">⬇</div>
                ${pWrong?`<div class="tf-step past-wrong"><span class="tf-label">Tu respuesta:</span>${pWrong}</div><div class="tf-arrow">↕</div>`:''}
                <div class="tf-step past-correct"><span class="tf-label">Correcto:</span>${pCorrect}</div>
            </div>`;

        if(isCorrect){
            el.innerHTML=`
            <div class="fb-header"><span class="fb-icon">✅</span><div>
                <div class="fb-title">¡Transformación correcta!</div>
                <div class="fb-subtitle">Cambiaste la forma correctamente</div>
            </div></div>
            <div class="fb-body">
                <div class="fb-block fb-transform">
                    <div class="fb-block-title">🔄 Transformación realizada</div>
                    ${flow}
                </div>
                <div class="fb-block fb-signal">
                    <div class="fb-block-title">🔍 Señal clave</div>
                    <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                        <span class="signal-tag">${q.clue}</span> — ${q.clueExplain}
                    </div>
                </div>
                <div class="fb-block fb-rule">
                    <div class="fb-block-title">📐 Regla aplicada</div>
                    <div class="rule-formula">${q.rule}</div>
                    <div class="rule-examples">${exs}</div>
                </div>
                <div class="fb-block fb-why">
                    <div class="fb-block-title">💡 ¿Por qué es correcta la transformación?</div>
                    <div class="fb-why-text">${q.correctReason}</div>
                </div>
            </div>`;
        } else {
            el.innerHTML=`
            <div class="fb-header"><span class="fb-icon">❌</span><div>
                <div class="fb-title">Transformación incorrecta</div>
                <div class="fb-subtitle">Revisemos qué falló</div>
            </div></div>
            <div class="fb-body">
                <div class="fb-block fb-transform">
                    <div class="fb-block-title">🔄 Tu transformación vs. la correcta</div>
                    ${flow}
                </div>
                <div class="fb-block fb-signal wrong">
                    <div class="fb-block-title">🔍 Señal clave que debías identificar</div>
                    <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                        <span class="signal-tag red">${q.clue}</span> — ${q.clueExplain}
                    </div>
                </div>
                <div class="fb-block fb-error">
                    <div class="fb-block-title">⚠️ El error: <span class="error-badge">${sel.errorType}</span></div>
                    <div class="word-swap">
                        <span class="ws-box ws-wrong">${sel.changedVerb}</span>
                        <span class="ws-arrow">→</span>
                        <span class="ws-box ws-right">${correctOpt.changedVerb}</span>
                    </div>
                    <div class="error-text">${sel.explanation}</div>
                </div>
                <div class="fb-block fb-rule">
                    <div class="fb-block-title">📐 La regla correcta</div>
                    <div class="rule-formula">${q.rule}</div>
                    <div class="rule-examples">${exs}</div>
                </div>
                <div class="fb-block fb-why">
                    <div class="fb-block-title">💡 ¿Cómo debía hacerse la transformación?</div>
                    <div class="fb-why-text">${q.correctReason}</div>
                </div>
            </div>`;
        }
    }

    function showQuestion(i){
        document.querySelectorAll('.question-card').forEach((c,idx)=>c.classList.toggle('hidden',idx!==i));
        document.getElementById('currentQ').textContent=i+1;
        currentQuestion=i;
    }
    function nextQuestion(i){i<quizData.length-1?showQuestion(i+1):showResults();}
    function prevQuestion(){if(currentQuestion>0)showQuestion(currentQuestion-1);}
    function updateProgress(){
        const done=answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width=(done/quizData.length*100)+'%';
    }
    function showResults(){
        document.querySelectorAll('.question-card').forEach(c=>c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct=score/quizData.length*100;
        document.getElementById('finalScore').textContent=`${score}/${quizData.length}`;
        let stars=pct>=90?3:pct>=70?2:1;
        document.getElementById('resultsMessage').textContent=pct>=90
            ?'¡Excelente! Transformas "There is/are" perfectamente. 🏆'
            :pct>=70?'¡Muy bien! Sigue practicando singular vs. plural. 💪'
            :'Buen esfuerzo. Recuerda: singular → There is, plural → There are. 📚';
        document.querySelectorAll('.star').forEach((s,i)=>{
            if(i<stars)setTimeout(()=>s.classList.add('earned'),i*300);
        });
    }
    document.addEventListener('DOMContentLoaded',initQuiz);
    </script>
</body>
</html>
