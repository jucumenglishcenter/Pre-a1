<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transform - Pre-A1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F59E0B; --primary-light: #FCD34D; --primary-dark: #D97706;
            --accent: #FBBF24; --bg-gradient-start: #FFFBEB; --bg-gradient-end: #FEF3C7;
            --text-dark: #78350F; --text-medium: #92400E; --text-light: #B45309;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --orange: #F97316; --orange-light: #FFF7ED; --orange-dark: #C2410C;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(245,158,11,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:var(--text-dark); transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .transform-visual { background:var(--bg-gradient-start); border:1px solid var(--primary-light); border-radius:14px; padding:1rem; margin-bottom:1rem; }
        .transform-box { padding:0.7rem 0.9rem; border-radius:10px; }
        .transform-box.base { background:var(--orange-light); border:1px solid #FED7AA; margin-bottom:0.5rem; }
        .transform-box.goal { background:#F0F9FF; border:1px solid #BAE6FD; }
        .transform-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:0.3rem; }
        .transform-box.base .transform-label { color:var(--orange-dark); }
        .transform-box.goal .transform-label { color:var(--info-dark); }
        .transform-sentence { font-size:1rem; font-weight:600; color:var(--text-dark); line-height:1.5; }
        .subj-hl { color:var(--orange-dark); font-weight:800; background:#FED7AA; padding:0 3px; border-radius:3px; }
        .transform-arrow { text-align:center; font-size:1rem; color:var(--text-light); margin:0.2rem 0; }
        .options-container { display:flex; flex-direction:column; gap:0.65rem; margin-bottom:0.5rem; }
        .option-btn { border:2.5px solid #E5E7EB; border-radius:13px; padding:0.85rem 1rem; cursor:pointer; transition:all .2s; background:white; text-align:left; font-family:'Nunito',sans-serif; display:flex; gap:0.75rem; align-items:center; }
        .option-btn:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .option-btn.disabled { cursor:default; }
        .option-btn.correct { border-color:var(--success); background:var(--success-light); }
        .option-btn.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:var(--primary-light); color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; font-family:'Fredoka',sans-serif; }
        .option-btn.correct .option-letter { background:var(--success); color:white; }
        .option-btn.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.97rem; color:var(--text-dark); font-weight:600; flex:1; }
        .option-btn.correct .option-text { color:var(--success-dark); }
        .option-btn.incorrect .option-text { color:var(--error-dark); }
        .aux-hl { font-weight:800; }
        .option-btn.correct .aux-hl { color:var(--success-dark); }
        .option-btn.incorrect .aux-hl { color:var(--error-dark); text-decoration:underline wavy; }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .fb-transform { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-transform .fb-block-title { color:#475569; }
        .transform-flow { display:flex; flex-direction:column; gap:0.4rem; }
        .tf-step { padding:0.5rem 0.8rem; border-radius:9px; font-size:0.93rem; font-weight:600; line-height:1.5; }
        .tf-step.original { background:var(--orange-light); color:var(--orange-dark); border:1px solid #FED7AA; }
        .tf-step.correct-form { background:var(--success-light); color:var(--success-dark); border:1px solid #BBF7D0; }
        .tf-step.wrong-form { background:var(--error-light); color:var(--error-dark); border:1px solid #FECACA; text-decoration:line-through; }
        .tf-label { font-size:0.7rem; font-weight:800; text-transform:uppercase; margin-right:6px; opacity:.7; }
        .tf-arrow { text-align:center; color:#94A3B8; font-size:0.9rem; }
        .vb-hl2 { font-weight:800; text-decoration:underline; }
        .fb-error-block { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error-block .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; flex-wrap:wrap; }
        .ws-box { padding:0.4rem 0.8rem; border-radius:8px; font-weight:700; font-size:0.9rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.5rem; color:var(--success-dark); font-weight:700; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/Pre-a1/panel-pre-a1.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔄 Transform</div>
            <div class="header-subtitle">💛 Pre-A1 · Present Simple · Yes/No Questions</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <main>
        <div class="instructions">
            <div class="instructions-icon">🔄</div>
            <div>
                <div class="instructions-title">Transforma a pregunta</div>
                <div class="instructions-text">Lee la oración afirmativa. Elige su versión correcta como pregunta yes/no.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de nuevo</button>
                <a href="https://jucumenglishcenter.github.io/Pre-a1/panel-pre-a1.html" class="result-btn secondary">← Volver al panel</a>
            </div>
        </div>
    </main>
    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // auxPhrase = the auxiliary + subject chunk to highlight (e.g. "Do you" or "Does Marco")
    const quizData = [
        {
            id:1, base:"You get up early.", subject:"you",
            options:[
                {text:"Do you get up early?", correct:true, auxPhrase:"Do you"},
                {text:"Does you get up early?", correct:false, auxPhrase:"Does you", errorType:"Error de sujeto", explanation:"'Does' es para él / ella. Con 'you', la pregunta se forma con: Do you."},
                {text:"You get up early?", correct:false, auxPhrase:"You", errorType:"Falta el auxiliar", explanation:"En inglés hay que poner el auxiliar al inicio. La forma correcta es: Do you get up early?"}
            ],
            correctReason:"Con 'you', la pregunta se forma poniendo Do al inicio: Do + you + verbo. → Do you get up early?",
            rule:"Do + you + verbo?",
            examples:["Do you get up?","Do you eat?","Do you go?"]
        },
        {
            id:2, base:"Marco makes coffee.", subject:"Marco",
            options:[
                {text:"Does Marco make coffee?", correct:true, auxPhrase:"Does Marco make"},
                {text:"Do Marco make coffee?", correct:false, auxPhrase:"Do Marco", errorType:"Error de sujeto", explanation:"'Do' es para I / you / we / they. Marco = él. Con él, la pregunta se forma con: Does Marco."},
                {text:"Does Marco makes coffee?", correct:false, auxPhrase:"Does Marco makes", errorType:"Verbo incorrecto", explanation:"Después de 'Does', el verbo pierde la -s. La forma correcta es: Does Marco make."}
            ],
            correctReason:"Marco = él. La pregunta se forma con: Does + Marco + verbo (sin -s). El verbo pierde la -s: makes → make. → Does Marco make coffee?",
            rule:"Does + Marco (él) + verbo (sin -s)?",
            examples:["Does Marco make?","Does he go?","Does she eat?"]
        },
        {
            id:3, base:"They eat every morning.", subject:"they",
            options:[
                {text:"Do they eat every morning?", correct:true, auxPhrase:"Do they"},
                {text:"Does they eat every morning?", correct:false, auxPhrase:"Does they", errorType:"Error de sujeto", explanation:"'Does' es para él / ella solo. 'They' = ellos. Con ellos, la pregunta se forma con: Do they."},
                {text:"Do they eats every morning?", correct:false, auxPhrase:"Do they eats", errorType:"Verbo incorrecto", explanation:"Después de 'Do', el verbo no lleva -s. La forma correcta es: Do they eat."}
            ],
            correctReason:"'They' = ellos. La pregunta se forma con: Do + they + verbo (sin -s). → Do they eat every morning?",
            rule:"Do + they + verbo?",
            examples:["Do they eat?","Do we go?","Do you make?"]
        },
        {
            id:4, base:"Rosa sweeps the floor.", subject:"Rosa",
            options:[
                {text:"Does Rosa sweep the floor?", correct:true, auxPhrase:"Does Rosa sweep"},
                {text:"Do Rosa sweep the floor?", correct:false, auxPhrase:"Do Rosa", errorType:"Error de sujeto", explanation:"'Do' es para I / you / we / they. Rosa = ella. Con ella, la pregunta se forma con: Does Rosa."},
                {text:"Does Rosa sweeps the floor?", correct:false, auxPhrase:"Does Rosa sweeps", errorType:"Verbo incorrecto", explanation:"Después de 'Does', el verbo pierde la -s/-es. La forma correcta es: Does Rosa sweep."}
            ],
            correctReason:"Rosa = ella. La pregunta se forma con: Does + Rosa + verbo (sin -s). El verbo pierde la -s: sweeps → sweep. → Does Rosa sweep the floor?",
            rule:"Does + Rosa (ella) + verbo (sin -s)?",
            examples:["Does Rosa sweep?","Does she make?","Does he go?"]
        },
        {
            id:5, base:"You take the bus.", subject:"you",
            options:[
                {text:"Do you take the bus?", correct:true, auxPhrase:"Do you"},
                {text:"Does you take the bus?", correct:false, auxPhrase:"Does you", errorType:"Error de sujeto", explanation:"'Does' es para él / ella. Con 'you', la pregunta se forma con: Do you."},
                {text:"Do you takes the bus?", correct:false, auxPhrase:"Do you takes", errorType:"Verbo incorrecto", explanation:"Después de 'Do', el verbo no lleva -s. La forma correcta es: Do you take."}
            ],
            correctReason:"Con 'you', la pregunta se forma con: Do + you + verbo (sin -s). → Do you take the bus?",
            rule:"Do + you + verbo?",
            examples:["Do you take?","Do you eat?","Do you go?"]
        },
        {
            id:6, base:"Ben gives fruit to Rosa.", subject:"Ben",
            options:[
                {text:"Does Ben give fruit to Rosa?", correct:true, auxPhrase:"Does Ben give"},
                {text:"Do Ben give fruit to Rosa?", correct:false, auxPhrase:"Do Ben", errorType:"Error de sujeto", explanation:"'Do' es para I / you / we / they. Ben = él. Con él, la pregunta se forma con: Does Ben."},
                {text:"Does Ben gives fruit to Rosa?", correct:false, auxPhrase:"Does Ben gives", errorType:"Verbo incorrecto", explanation:"Después de 'Does', el verbo pierde la -s. La forma correcta es: Does Ben give."}
            ],
            correctReason:"Ben = él. La pregunta se forma con: Does + Ben + verbo (sin -s). El verbo pierde la -s: gives → give. → Does Ben give fruit to Rosa?",
            rule:"Does + Ben (él) + verbo (sin -s)?",
            examples:["Does Ben give?","Does he sweep?","Does she take?"]
        },
        {
            id:7, base:"We keep the room clean.", subject:"we",
            options:[
                {text:"Do we keep the room clean?", correct:true, auxPhrase:"Do we"},
                {text:"Does we keep the room clean?", correct:false, auxPhrase:"Does we", errorType:"Error de sujeto", explanation:"'Does' es para él / ella. 'We' = nosotros. Con nosotros, la pregunta se forma con: Do we."},
                {text:"Do we keeps the room clean?", correct:false, auxPhrase:"Do we keeps", errorType:"Verbo incorrecto", explanation:"Después de 'Do', el verbo no lleva -s. La forma correcta es: Do we keep."}
            ],
            correctReason:"'We' = nosotros. La pregunta se forma con: Do + we + verbo (sin -s). → Do we keep the room clean?",
            rule:"Do + we + verbo?",
            examples:["Do we keep?","Do we eat?","Do we go?"]
        },
        {
            id:8, base:"Sara brushes her teeth.", subject:"Sara",
            options:[
                {text:"Does Sara brush her teeth?", correct:true, auxPhrase:"Does Sara brush"},
                {text:"Do Sara brush her teeth?", correct:false, auxPhrase:"Do Sara", errorType:"Error de sujeto", explanation:"'Do' es para I / you / we / they. Sara = ella. Con ella, la pregunta se forma con: Does Sara."},
                {text:"Does Sara brushes her teeth?", correct:false, auxPhrase:"Does Sara brushes", errorType:"Verbo incorrecto", explanation:"Después de 'Does', el verbo pierde la -es. La forma correcta es: Does Sara brush."}
            ],
            correctReason:"Sara = ella. La pregunta se forma con: Does + Sara + verbo (sin -es). El verbo pierde la -es: brushes → brush. → Does Sara brush her teeth?",
            rule:"Does + Sara (ella) + verbo (sin -es)?",
            examples:["Does Sara brush?","Does she go?","Does he make?"]
        },
        {
            id:9, base:"Marco washes his face.", subject:"Marco",
            options:[
                {text:"Does Marco wash his face?", correct:true, auxPhrase:"Does Marco wash"},
                {text:"Do Marco wash his face?", correct:false, auxPhrase:"Do Marco", errorType:"Error de sujeto", explanation:"'Do' es para I / you / we / they. Marco = él. Con él, la pregunta se forma con: Does Marco."},
                {text:"Does Marco washes his face?", correct:false, auxPhrase:"Does Marco washes", errorType:"Verbo incorrecto", explanation:"Después de 'Does', el verbo pierde la -es. La forma correcta es: Does Marco wash."}
            ],
            correctReason:"Marco = él. La pregunta se forma con: Does + Marco + verbo (sin -es). El verbo pierde la -es: washes → wash. → Does Marco wash his face?",
            rule:"Does + Marco (él) + verbo (sin -es)?",
            examples:["Does Marco wash?","Does he keep?","Does she take?"]
        },
        {
            id:10, base:"You like bread.", subject:"you",
            options:[
                {text:"Do you like bread?", correct:true, auxPhrase:"Do you"},
                {text:"Does you like bread?", correct:false, auxPhrase:"Does you", errorType:"Error de sujeto", explanation:"'Does' es para él / ella. Con 'you', la pregunta se forma con: Do you."},
                {text:"Do you likes bread?", correct:false, auxPhrase:"Do you likes", errorType:"Verbo incorrecto", explanation:"Después de 'Do', el verbo no lleva -s. La forma correcta es: Do you like."}
            ],
            correctReason:"Con 'you', la pregunta se forma con: Do + you + verbo (sin -s). → Do you like bread?",
            rule:"Do + you + verbo?",
            examples:["Do you like?","Do you make?","Do you eat?"]
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q,i) => { q.shuffled = shuffle(q.options); container.appendChild(createCard(q,i)); });
        showQuestion(0); updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];
        // Highlight the subject in the base sentence
        const baseHighlighted = q.base.replace(q.subject, `<span class="subj-hl">${q.subject}</span>`);

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span style="font-size:0.82rem;color:var(--text-medium);font-weight:600;">Afirmativo → Pregunta</span>
            </div>
            <div class="transform-visual">
                <div class="transform-box base">
                    <span class="transform-label">🔶 Oración afirmativa</span>
                    <div class="transform-sentence">${baseHighlighted}</div>
                </div>
                <div class="transform-arrow">⬇ Transforma a...</div>
                <div class="transform-box goal">
                    <span class="transform-label">🎯 Objetivo</span>
                    <div class="transform-sentence">Pregunta yes/no</div>
                </div>
            </div>
            <div class="options-container" id="options-${index}">
                ${q.shuffled.map((opt,i) => `
                    <button class="option-btn" onclick="selectOption(${index},${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">${opt.text.replace(opt.auxPhrase, `<span class="aux-hl">${opt.auxPhrase}</span>`)}</div>
                    </button>`).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'Ver resultados 🎉' : 'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        if (isCorrect) score++;
        document.querySelectorAll(`#options-${qi} .option-btn`).forEach((btn,i) => {
            btn.classList.add('disabled');
            if (q.shuffled[i].correct) btn.classList.add('correct');
            else if (i === optIdx) btn.classList.add('incorrect');
        });
        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const ruleExamples = q.examples.map(e => `<span class="rule-ex">${e}</span>`).join('');

        const pBase = q.base.replace(q.subject, `<span class="vb-hl2">${q.subject}</span>`);
        const pCorrect = correctOpt.text.replace(correctOpt.auxPhrase, `<span class="vb-hl2">${correctOpt.auxPhrase}</span>`);
        const pWrong = !isCorrect ? selected.text.replace(selected.auxPhrase, `<span class="vb-hl2">${selected.auxPhrase}</span>`) : null;

        const flowHTML = `<div class="transform-flow">
            <div class="tf-step original"><span class="tf-label">Afirmativo:</span>${pBase}</div>
            <div class="tf-arrow">⬇</div>
            ${!isCorrect ? `<div class="tf-step wrong-form"><span class="tf-label">Tu respuesta:</span>${pWrong}</div><div class="tf-arrow">↕</div>` : ''}
            <div class="tf-step correct-form"><span class="tf-label">Correcto:</span>${pCorrect}</div>
        </div>`;

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">✅</span><div><div class="fb-title">¡Correcto!</div><div class="fb-subtitle">Transformaste la oración a pregunta</div></div></div>
                <div class="fb-body">
                    <div class="fb-block fb-transform"><div class="fb-block-title">🔄 Transformación realizada</div>${flowHTML}</div>
                    <div class="fb-block fb-rule"><div class="fb-block-title">📐 Regla aplicada</div><div class="rule-formula">${q.rule}</div><div class="rule-examples">${ruleExamples}</div></div>
                    <div class="fb-block fb-why"><div class="fb-block-title">💡 ¿Por qué es correcta?</div><div class="fb-why-text">${q.correctReason}</div></div>
                </div>`;
        } else {
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">❌</span><div><div class="fb-title">Incorrecto</div><div class="fb-subtitle">Revisemos qué falló</div></div></div>
                <div class="fb-body">
                    <div class="fb-block fb-transform"><div class="fb-block-title">🔄 Tu respuesta vs. la correcta</div>${flowHTML}</div>
                    <div class="fb-block fb-error-block"><div class="fb-block-title">⚠️ Error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="word-swap"><span class="ws-box ws-wrong">${selected.auxPhrase}</span><span class="ws-arrow">→</span><span class="ws-box ws-right">${correctOpt.auxPhrase}</span></div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule"><div class="fb-block-title">📐 La regla correcta</div><div class="rule-formula">${q.rule}</div><div class="rule-examples">${ruleExamples}</div></div>
                    <div class="fb-block fb-why"><div class="fb-block-title">💡 ¿Cómo debía transformarse?</div><div class="fb-why-text">${q.correctReason}</div></div>
                </div>`;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c,idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { if (i < quizData.length - 1) showQuestion(i + 1); else showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        document.getElementById('progressFill').style.width = (answered.filter(Boolean).length / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '¡Excelente! Formas preguntas perfectamente. 🏆'
            : pct >= 70 ? '¡Muy bien! Sigue practicando. 💪'
            : 'Buen esfuerzo. Repasa las reglas e inténtalo de nuevo. 📚';
        document.querySelectorAll('.star').forEach((s,i) => { if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300); });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
