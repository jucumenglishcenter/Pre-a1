<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fill in the Blanks - Pre-A1 M1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F59E0B; --primary-light: #FCD34D; --primary-dark: #D97706;
            --accent: #FBBF24; --bg-gradient-start: #FFFBEB; --bg-gradient-end: #FEF3C7;
            --text-dark: #78350F; --text-medium: #92400E; --text-light: #B45309;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(245,158,11,0.15);
            --shadow-strong: 0 8px 30px rgba(245,158,11,0.25);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start) 0%,var(--bg-gradient-end) 100%); min-height:100vh; color:var(--text-dark); }

        /* ── HEADER ── */
        .header { background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:var(--text-dark); transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { padding:0; height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }

        /* ── LAYOUT ── */
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        /* ── QUESTION CARD ── */
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .pronoun-type-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .pronoun-type-badge.subject { background:#D1FAE5; color:#059669; }
        .pronoun-type-badge.object { background:#EDE9FE; color:#7C3AED; }
        .pronoun-type-badge.possessive { background:#DBEAFE; color:#1D4ED8; }

        .hint-box { background:#FFFDE7; border-left:4px solid var(--primary); padding:0.7rem 1rem; border-radius:0 10px 10px 0; margin-bottom:1rem; font-size:0.88rem; color:#78350F; line-height:1.5; }
        .hint-label { font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:0.4rem; margin-bottom:0.2rem; font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }

        .question-text { font-size:1.1rem; line-height:1.7; margin-bottom:0.4rem; font-weight:600; }
        .blank { display:inline-block; min-width:70px; padding:0.2rem 0.6rem; background:var(--primary-light); border:2px dashed var(--primary-dark); border-radius:8px; text-align:center; font-weight:700; color:var(--primary-dark); transition:all .3s; }
        .blank.correct { background:var(--success-light); border:2px solid var(--success); color:var(--success-dark); }
        .blank.incorrect { background:var(--error-light); border:2px solid var(--error); color:var(--error-dark); }
        .translation { color:var(--text-light); font-style:italic; font-size:0.85rem; margin-bottom:1rem; }

        /* ── OPTIONS ── */
        .options-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.7rem; margin-top:0.5rem; }
        .option-btn { padding:0.9rem 0.5rem; border:2.5px solid #E5E7EB; border-radius:12px; background:white; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; color:var(--text-dark); }
        .option-btn:hover:not(:disabled) { border-color:var(--primary); background:var(--primary-light); transform:translateY(-2px); }
        .option-btn:disabled { cursor:default; }
        .option-btn.correct { border-color:var(--success); background:var(--success-light); color:var(--success-dark); }
        .option-btn.incorrect { border-color:var(--error); background:var(--error-light); color:var(--error-dark); }

        /* ── FEEDBACK SYSTEM ── */
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }

        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        /* 1. Señal clave */
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .fb-signal-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.8rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }

        /* 2. Comparación visual */
        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-compare-row { display:flex; align-items:baseline; gap:0.6rem; padding:0.35rem 0; border-bottom:1px dashed #E2E8F0; }
        .fb-compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.5; }
        .word-wrong { color:var(--error); font-weight:700; text-decoration:line-through; }
        .word-right { color:var(--success-dark); font-weight:700; }

        /* 3. Error analysis */
        .fb-error { background:var(--error-light); border-radius:12px; padding:0.9rem 1rem; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; margin-left:auto; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .error-word-row { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; }
        .ew-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ew-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ew-arrow { font-size:1.3rem; color:var(--text-medium); }
        .ew-right { background:var(--success); color:white; }
        .error-rule { font-size:0.88rem; color:var(--error-dark); line-height:1.5; }

        /* 4. Grammar rule */
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; border-radius:12px; padding:0.9rem 1rem; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { display:flex; align-items:center; gap:0.3rem; font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.5rem; }
        .rule-ex .base { color:var(--info-dark); font-weight:600; }
        .rule-ex .arrow { color:#94A3B8; }
        .rule-ex .past { color:var(--success-dark); font-weight:700; }

        /* 5. Correct reason */
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .why-highlight { background:var(--success-light); color:var(--success-dark); padding:0.1rem 0.4rem; border-radius:5px; font-weight:700; }

        /* ── NAV BUTTONS ── */
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        /* ── RESULTS ── */
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="prea1-m1-index.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">📝 Fill in the Blanks</div>
            <div class="header-subtitle">💛 Pre-A1 · Módulo 1 · Personal Pronouns</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">👤</div>
            <div>
                <div class="instructions-title">Completa el espacio en blanco</div>
                <div class="instructions-text">Elige el pronombre correcto (I, you, we, him, her, his, it). Lee la oración completa y piensa: ¿quién realiza la acción o de quién se habla?</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="prea1-m1-index.html" class="result-btn secondary">← Volver al Módulo</a>
            </div>
        </div>
    </main>

    <script>
    // ============================================================
    // PRE-A1 · M1 · PERSONAL PRONOUNS — FILL IN THE BLANKS
    // Tema: I, you, we, him, her, his, it
    // Basado en: Dialogues D1–D4 y Stories S1–S4
    // ============================================================
    const quizData = [
        {
            id: 1,
            sentence: "_____ am Leo. What is your name?",
            translation: "_____ soy Leo. ¿Cuál es tu nombre?",
            hint: "El hablante se presenta a sí mismo. ¿Qué pronombre usas cuando TÚ hablas de ti mismo?",
            clue: "am Leo",
            clueExplain: "'Am' siempre va con 'I'. Cuando alguien se presenta ('am Leo'), usa el pronombre de primera persona singular.",
            pronounType: "subject",
            options: ["I", "We", "He"],
            correct: "I",
            feedback: {
                "We": {
                    errorType: "Pronombre plural por singular",
                    explanation: "Elegiste 'We' (nosotros). Pero Leo habla solo de sí mismo, no de un grupo. 'We' es plural. Aquí solo hay UNA persona que se presenta.",
                    rule: "'We' = nosotros (grupo). 'I' = yo (una sola persona)."
                },
                "He": {
                    errorType: "Pronombre de tercera persona",
                    explanation: "Elegiste 'He' (él). Pero Leo habla de SÍ MISMO — no de otra persona. 'He' se usa para describir a otra persona, no al hablante.",
                    rule: "'He' = él (otra persona). 'I' = yo (el hablante)."
                }
            },
            correctReason: "'I' es el pronombre de primera persona singular — lo usas cuando TÚ eres el sujeto de la acción. Leo habla de sí mismo, entonces usa 'I'. Además, 'I am' es la única combinación correcta (nunca 'We am' o 'He am').",
            examples: ["I am Ana.", "I am seven years old.", "I have a sister."]
        },
        {
            id: 2,
            sentence: "We are in the same class! Are _____ new here?",
            translation: "¡Estamos en la misma clase! ¿Eres _____ nueva aquí?",
            hint: "Leo le hace una pregunta directamente a Ana. ¿Qué pronombre usas cuando hablas CON alguien?",
            clue: "Are _____ new here?",
            clueExplain: "La pregunta está dirigida a Ana directamente. 'Are' combinado con una pregunta directa a la otra persona siempre usa 'you'.",
            pronounType: "subject",
            options: ["you", "her", "we"],
            correct: "you",
            feedback: {
                "her": {
                    errorType: "Pronombre objeto por sujeto",
                    explanation: "Elegiste 'her' (la/ella objeto). 'Her' se usa cuando la mujer es el OBJETO de la acción ('I see her'), no el sujeto de la pregunta. Leo habla DIRECTAMENTE con Ana.",
                    rule: "'Her' = objeto (la veo a ella). 'You' = segunda persona (tú/usted)."
                },
                "we": {
                    errorType: "Pronombre plural por singular",
                    explanation: "Elegiste 'we' (nosotros). Pero Leo le pregunta solo a Ana — no a un grupo. 'Are we new here?' cambiaría el significado completamente.",
                    rule: "'We' = nosotros (grupo). 'You' = tú (la persona con quien hablas)."
                }
            },
            correctReason: "'You' es el pronombre de segunda persona — lo usas cuando hablas DIRECTAMENTE con alguien. Leo le hace la pregunta a Ana ('¿eres tú nueva aquí?'), entonces usa 'you'. Además, 'Are you' es la pregunta estándar en inglés para dirigirse a alguien.",
            examples: ["Are you new?", "You are kind.", "What is your name?"]
        },
        {
            id: 3,
            sentence: "That is my brother Nico. _____ name means 'victory.'",
            translation: "Ese es mi hermano Nico. _____ nombre significa 'victoria'.",
            hint: "Mia habla de su hermano (un chico). ¿Qué pronombre posesivo usas para un hombre?",
            clue: "my brother Nico",
            clueExplain: "Nico es un chico — masculino. El pronombre posesivo para un hombre es 'his'. Indica que el nombre PERTENECE a él.",
            pronounType: "possessive",
            options: ["His", "Her", "Its"],
            correct: "His",
            feedback: {
                "Her": {
                    errorType: "Posesivo femenino por masculino",
                    explanation: "Elegiste 'Her' (su — femenino). 'Her' se usa para mujeres. Pero Nico es el HERMANO de Mia — es masculino. El posesivo correcto para un hombre es 'his'.",
                    rule: "'Her' = posesivo femenino (ella). 'His' = posesivo masculino (él)."
                },
                "Its": {
                    errorType: "Posesivo de cosa por persona",
                    explanation: "Elegiste 'Its' (su — de una cosa o animal). 'Its' se usa para cosas u objetos, no para personas. Nico es una persona.",
                    rule: "'Its' = posesivo de cosa/animal. 'His' = posesivo de un hombre."
                }
            },
            correctReason: "'His' es el posesivo masculino — se usa cuando algo pertenece a un hombre. Nico es el hermano de Mia (masculino), entonces el nombre es de ÉL: 'His name'. Nota: 'his' sirve también como pronombre sujeto ('He is nice') pero aquí funciona como posesivo.",
            examples: ["His name is Nico.", "His dad is tall.", "His family is big."]
        },
        {
            id: 4,
            sentence: "And the woman next to _____? Is that your mom?",
            translation: "¿Y la mujer junto a _____? ¿Es esa tu mamá?",
            hint: "Sam señala al papá en la foto y pregunta sobre la mujer que está AL LADO de él. ¿Qué pronombre objeto usas para un hombre?",
            clue: "next to _____ (señala a Carlos, el papá)",
            clueExplain: "El papá (Carlos) fue mencionado antes. Ahora Sam lo señala como referencia — es el OBJETO de la preposición 'next to'. Para un hombre como objeto, se usa 'him'.",
            pronounType: "object",
            options: ["him", "his", "he"],
            correct: "him",
            feedback: {
                "his": {
                    errorType: "Posesivo por pronombre objeto",
                    explanation: "Elegiste 'his' (su — posesivo). 'His' indica pertenencia ('his name'). Pero aquí no hay posesión — Sam dice 'junto a...' usando 'next to', que necesita un pronombre OBJETO.",
                    rule: "'His' = posesivo (su). 'Him' = objeto (a él, con él, junto a él)."
                },
                "he": {
                    errorType: "Pronombre sujeto por objeto",
                    explanation: "Elegiste 'he' (él — sujeto). 'He' es el sujeto de una oración ('He is tall'). Pero después de preposiciones como 'next to', 'with', 'for', necesitas el pronombre OBJETO.",
                    rule: "Después de preposición → pronombre objeto. 'He' → sujeto. 'Him' → objeto."
                }
            },
            correctReason: "'Him' es el pronombre objeto masculino — aparece después de verbos o preposiciones ('next to him', 'I see him', 'for him'). El papá Carlos es el punto de referencia, y 'next to' exige un pronombre objeto. Compara: 'He is tall' (sujeto) vs. 'next to him' (objeto).",
            examples: ["I see him.", "She talks to him.", "The photo is of him."]
        },
        {
            id: 5,
            sentence: "Yes, that is _____. _____ name is Rosa. She is funny.",
            translation: "Sí, esa es _____. _____ nombre es Rosa. Ella es graciosa.",
            hint: "Mia habla de su mamá (una mujer). Necesitas el pronombre objeto Y el pronombre posesivo para mujer. ¿Son iguales en inglés?",
            clue: "that is _____ / _____ name is Rosa",
            clueExplain: "En inglés, 'her' tiene dos usos: pronombre objeto ('that is her' = esa es ella) Y pronombre posesivo ('her name' = su nombre — de ella). Aquí aparecen los dos en la misma oración.",
            pronounType: "object",

    // ============================================================
    // ENGINE — No modificar
    // ============================================================
    let currentQuestion = 0;
    let score = 0;
    let answered = new Array(quizData.length).fill(false);

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function init() {
        // Randomize options order for each question at load time
        quizData.forEach(q => { q.shuffled = shuffle(q.options); });
        const container = document.getElementById('questionsContainer');
        quizData.forEach((q, index) => {
            const card = buildCard(q, index);
            container.appendChild(card);
        });
        showQuestion(0);
    }

    function buildCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index === 0 ? '' : 'hidden'}`;
        card.id = `card-${index}`;

        const sentenceWithBlank = q.sentence.replace('_____', `<span class="blank" id="blank-${index}">_____</span>`);

        const optionsBtns = q.shuffled.map((opt, i) =>
            `<button class="option-btn" id="opt-${index}-${i}" onclick="selectOption(${index}, ${i})">${opt}</button>`
        ).join('');

        const badgeClass = q.pronounType === 'subject' ? 'subject' : q.pronounType === 'object' ? 'object' : 'possessive';
        const badgeText = q.pronounType === 'subject' ? '👤 Sujeto' : q.pronounType === 'object' ? '🎯 Objeto' : '📌 Posesivo';

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="pronoun-type-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Pista</div>
                ${q.hint}
            </div>
            <div class="question-text">${sentenceWithBlank}</div>
            <div class="translation">🇪🇸 ${q.translation}</div>
            <div class="options-grid" id="options-${index}">${optionsBtns}</div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion(${index})" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'Ver Resultados 🎉' : 'Siguiente →'}
                </button>
            </div>
        `;
        return card;
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected === q.correct;
        if (isCorrect) score++;

        const blank = document.getElementById(`blank-${qi}`);
        blank.textContent = selected;
        blank.classList.add(isCorrect ? 'correct' : 'incorrect');

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach((btn, i) => {
            btn.disabled = true;
            if (q.shuffled[i] === q.correct) btn.classList.add('correct');
            else if (i === optIdx && !isCorrect) btn.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        const examplesHTML = q.examples.map(e => {
            const parts = e.split('.');
            return `<span class="rule-ex"><span class="base">${e}</span></span>`;
        }).join('');

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div><div class="fb-title">¡Correcto!</div><div class="fb-subtitle">Pronombre perfecto</div></div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal">
                        <div class="fb-block-title">🔍 Señal clave</div>
                        <div class="fb-signal-text">La clave estaba en: <span class="signal-tag">${q.clue}</span><br>${q.clueExplain}</div>
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 Regla aplicada</div>
                        <div class="rule-formula">${q.pronounType === 'subject' ? 'Sujeto: I / You / He / She / It / We / They' : q.pronounType === 'object' ? 'Objeto: me / you / him / her / it / us / them' : 'Posesivo: my / your / his / her / its / our / their'}</div>
                        <div class="rule-examples">${q.examples.map(e => `<span class="rule-ex"><span class="past">${e}</span></span>`).join('')}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 ¿Por qué es correcto?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        } else {
            const errData = q.feedback[selected] || { errorType: "Error", explanation: "Revisa el pronombre.", rule: "Usa el pronombre correcto según la función." };
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div><div class="fb-title">Casi...</div><div class="fb-subtitle">Revisa el pronombre</div></div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal wrong">
                        <div class="fb-block-title">🔍 Señal clave que debías ver</div>
                        <div class="fb-signal-text">La clave era: <span class="signal-tag red">${q.clue}</span><br>${q.clueExplain}</div>
                    </div>
                    <div class="fb-compare">
                        <div class="fb-block-title">🔄 Tu respuesta vs. la correcta</div>
                        <div class="fb-compare-row">
                            <span class="compare-label wrong">Tú</span>
                            <span class="compare-text"><span class="word-wrong">${selected}</span></span>
                        </div>
                        <div class="fb-compare-row">
                            <span class="compare-label right">✓</span>
                            <span class="compare-text"><span class="word-right">${q.correct}</span></span>
                        </div>
                    </div>
                    <div class="fb-error">
                        <div class="fb-block-title">⚠️ Tipo de error <span class="error-badge">${errData.errorType}</span></div>
                        <div class="error-word-row">
                            <span class="ew-box ew-wrong">${selected}</span>
                            <span class="ew-arrow">→</span>
                            <span class="ew-box ew-right">${q.correct}</span>
                        </div>
                        <div class="error-rule">${errData.explanation}<br><strong>Regla:</strong> ${errData.rule}</div>
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 Regla gramatical</div>
                        <div class="rule-formula">${q.pronounType === 'subject' ? 'Sujeto: I / You / He / She / It / We / They' : q.pronounType === 'object' ? 'Objeto: me / you / him / her / it / us / them' : 'Posesivo: my / your / his / her / its / our / their'}</div>
                        <div class="rule-examples">${q.examples.map(e => `<span class="rule-ex"><span class="past">${e}</span></span>`).join('')}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 ¿Por qué es correcto?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        }
    }

    function showQuestion(index) {
        document.querySelectorAll('.question-card').forEach((c, i) => {
            c.classList.toggle('hidden', i !== index);
        });
        currentQuestion = index;
        document.getElementById('currentQ').textContent = index + 1;
    }

    function nextQuestion(index) {
        if (index === quizData.length - 1) {
            showResults();
        } else {
            showQuestion(index + 1);
        }
    }

    function prevQuestion(index) {
        if (index > 0) showQuestion(index - 1);
    }

    function updateProgress() {
        const done = answered.filter(Boolean).length;
        const pct = (done / quizData.length) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
    }

    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        const screen = document.getElementById('resultsScreen');
        screen.classList.add('show');
        document.getElementById('finalScore').textContent = `${score}/10`;

        const pct = score / quizData.length;
        const stars = screen.querySelectorAll('.star');
        const msg = document.getElementById('resultsMessage');

        const delays = [200, 600, 1000];
        if (pct >= 0.9) {
            stars.forEach((s, i) => setTimeout(() => s.classList.add('earned'), delays[i]));
            msg.textContent = '¡Excelente! Dominas los pronombres personales. 🌟';
        } else if (pct >= 0.6) {
            [0,1].forEach(i => setTimeout(() => stars[i].classList.add('earned'), delays[i]));
            msg.textContent = '¡Bien! Sigue practicando — ya casi lo tienes. 💪';
        } else {
            setTimeout(() => stars[0].classList.add('earned'), delays[0]);
            msg.textContent = 'Buen intento. Revisa la diferencia entre sujeto, objeto y posesivo. 📚';
        }
    }

    init();
    </script>
</body>
