<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fill in the Blanks - Pre-A1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F59E0B; --primary-light: #FCD34D; --primary-dark: #D97706;
            --accent: #FBBF24; --bg-gradient-start: #FFFBEB; --bg-gradient-end: #FEF3C7;
            --text-dark: #78350F; --text-medium: #92400E; --text-light: #B45309;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(245,158,11,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:var(--text-dark); transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .hint-box { background:#FFFDE7; border-left:4px solid var(--primary); padding:0.7rem 1rem; border-radius:0 10px 10px 0; margin-bottom:1rem; font-size:0.88rem; color:#78350F; line-height:1.5; }
        .hint-label { font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:0.4rem; margin-bottom:0.2rem; font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }
        .question-text { font-size:1.1rem; line-height:1.8; margin-bottom:0.4rem; font-weight:600; }
        .blank { display:inline-block; min-width:110px; padding:0.2rem 0.6rem; background:var(--primary-light); border:2px dashed var(--primary-dark); border-radius:8px; text-align:center; font-weight:700; color:var(--primary-dark); transition:all .3s; }
        .blank.correct { background:var(--success-light); border:2px solid var(--success); color:var(--success-dark); }
        .blank.incorrect { background:var(--error-light); border:2px solid var(--error); color:var(--error-dark); }
        .translation { color:var(--text-light); font-style:italic; font-size:0.85rem; margin-bottom:1rem; }
        .options-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.7rem; margin-top:0.5rem; }
        .option-btn { padding:0.75rem 0.3rem; border:2.5px solid #E5E7EB; border-radius:12px; background:white; font-family:'Nunito',sans-serif; font-size:0.88rem; font-weight:700; cursor:pointer; transition:all .2s; color:var(--text-dark); }
        .option-btn:hover:not(:disabled) { border-color:var(--primary); background:var(--primary-light); transform:translateY(-2px); }
        .option-btn:disabled { cursor:default; }
        .option-btn.correct { border-color:var(--success); background:var(--success-light); color:var(--success-dark); }
        .option-btn.incorrect { border-color:var(--error); background:var(--error-light); color:var(--error-dark); }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-compare .fb-block-title { color:#475569; }
        .compare-row { display:flex; align-items:baseline; gap:0.6rem; padding:0.35rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); }
        .word-wrong { color:var(--error); font-weight:700; text-decoration:line-through; }
        .word-right { color:var(--success-dark); font-weight:700; }
        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; margin-left:6px; }
        .error-word-row { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; }
        .ew-box { padding:0.4rem 0.8rem; border-radius:8px; font-weight:700; font-size:0.95rem; }
        .ew-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ew-arrow { font-size:1.3rem; color:var(--text-medium); }
        .ew-right { background:var(--success); color:white; }
        .error-rule { font-size:0.88rem; color:var(--error-dark); line-height:1.5; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { display:flex; align-items:center; gap:0.3rem; font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.5rem; }
        .rule-ex .base { color:var(--info-dark); font-weight:600; }
        .rule-ex .arrow { color:#94A3B8; }
        .rule-ex .form { color:var(--success-dark); font-weight:700; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/Pre-a1/panel-pre-a1.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">📝 Fill in the Blanks</div>
            <div class="header-subtitle">💛 Pre-A1 · Present Simple · Negative</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <main>
        <div class="instructions">
            <div class="instructions-icon">📖</div>
            <div>
                <div class="instructions-title">Completa el espacio</div>
                <div class="instructions-text">Elige la forma negativa correcta. Recuerda: <strong>don't</strong> = I / you / we / they &nbsp;|&nbsp; <strong>doesn't</strong> = he / she / it.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de nuevo</button>
                <a href="https://jucumenglishcenter.github.io/Pre-a1/panel-pre-a1.html" class="result-btn secondary">← Volver al panel</a>
            </div>
        </div>
    </main>
    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    const quizData = [
        {
            id:1, sentence:"I _____ rush in the morning.", translation:"Yo no tengo prisa en la mañana.",
            hint:"El sujeto es 'I'. ¿Cuál de las opciones es la palabra correcta para negar con 'I'?",
            options:["don't","doesn't","not"], correct:"don't",
            feedback:{
                "doesn't":{errorType:"Error de sujeto",explanation:"'Doesn't' se usa solo con él / ella (Marco doesn't). Con 'I', la forma correcta es: don't.",rule:"I → don't + verbo"},
                "not":{errorType:"Negación incompleta",explanation:"'Not' solo no puede negar un verbo. Se necesita el auxiliar: don't (= do not).",rule:"I → don't + verbo (nunca solo 'not')"}
            },
            correctReason:"Con 'I', la negación es: don't + verbo. → I don't rush.",
            examples:["I don't rush","you don't eat","they don't go"]
        },
        {
            id:2, sentence:"Marco _____ take his time.", translation:"Marco no se toma su tiempo.",
            hint:"Marco es una persona (él). ¿Cuál de las opciones es la palabra correcta para negar con 'él'?",
            options:["doesn't","don't","no"], correct:"doesn't",
            feedback:{
                "don't":{errorType:"Error de sujeto",explanation:"'Don't' se usa con I / you / we / they. Marco = él. Con él, la forma correcta es: doesn't.",rule:"él → doesn't + verbo"},
                "no":{errorType:"Negación incorrecta",explanation:"'No' no puede negar un verbo en inglés. Se necesita: doesn't. → Marco doesn't take.",rule:"él → doesn't + verbo (nunca 'no verbo')"}
            },
            correctReason:"Marco = él. La negación con él / ella es: doesn't + verbo. → Marco doesn't take his time.",
            examples:["Marco doesn't take","she doesn't go","he doesn't eat"]
        },
        {
            id:3, sentence:"Ben and Rosa _____ rush.", translation:"Ben y Rosa no tienen prisa.",
            hint:"Ben and Rosa = ellos. ¿Cuál auxiliar negativo va con ellos?",
            options:["don't","doesn't","not"], correct:"don't",
            feedback:{
                "doesn't":{errorType:"Error de sujeto",explanation:"'Doesn't' es solo para él / ella. 'Ben and Rosa' = ellos. Con ellos, la forma es: don't.",rule:"ellos → don't + verbo"},
                "not":{errorType:"Negación incompleta",explanation:"'Not' solo no puede negar un verbo. Se necesita: don't. → Ben and Rosa don't rush.",rule:"ellos → don't + verbo"}
            },
            correctReason:"'Ben and Rosa' = ellos. Con ellos, la negación es: don't + verbo. → Ben and Rosa don't rush.",
            examples:["they don't rush","we don't eat","Ben and Rosa don't go"]
        },
        {
            id:4, sentence:"Rosa _____ make coffee.", translation:"Rosa no hace café.",
            hint:"Rosa = ella. ¿Cuál auxiliar negativo va con ella?",
            options:["doesn't","don't","no"], correct:"doesn't",
            feedback:{
                "don't":{errorType:"Error de sujeto",explanation:"'Don't' es para I / you / we / they. Rosa = ella. Con ella, la forma es: doesn't.",rule:"ella → doesn't + verbo"},
                "no":{errorType:"Negación incorrecta",explanation:"'No' no niega verbos en inglés. Con ella, la negación es: doesn't. → Rosa doesn't make.",rule:"ella → doesn't + verbo"}
            },
            correctReason:"Rosa = ella. La negación con él / ella es: doesn't + verbo. → Rosa doesn't make coffee.",
            examples:["Rosa doesn't make","he doesn't go","she doesn't eat"]
        },
        {
            id:5, sentence:"I _____ eat a big meal.", translation:"Yo no como una comida grande.",
            hint:"El sujeto es 'I'. ¿Cuál auxiliar negativo va con I?",
            options:["don't","doesn't","not"], correct:"don't",
            feedback:{
                "doesn't":{errorType:"Error de sujeto",explanation:"'Doesn't' es para él / ella. Con 'I', la negación es: don't. → I don't eat.",rule:"I → don't + verbo"},
                "not":{errorType:"Negación incompleta",explanation:"'Not' solo no puede negar un verbo. La forma completa es: don't. → I don't eat.",rule:"I → don't + verbo"}
            },
            correctReason:"Con 'I', la negación es: don't + verbo. → I don't eat a big meal.",
            examples:["I don't eat","I don't go","I don't make"]
        },
        {
            id:6, sentence:"Marco _____ sweep every day.", translation:"Marco no barre todos los días.",
            hint:"Marco es una persona (él). ¿Cuál de las opciones es la palabra correcta para negar?",
            options:["doesn't","don't","no"], correct:"doesn't",
            feedback:{
                "don't":{errorType:"Error de sujeto",explanation:"'Don't' es para I / you / we / they. Marco = él. Con él, la negación es: doesn't.",rule:"él → doesn't + verbo"},
                "no":{errorType:"Negación incorrecta",explanation:"'No' no puede negar un verbo en inglés. Con él, la forma correcta es: doesn't. → Marco doesn't sweep.",rule:"él → doesn't + verbo"}
            },
            correctReason:"Marco = él. La negación con él / ella es: doesn't + verbo. → Marco doesn't sweep every day.",
            examples:["Marco doesn't sweep","he doesn't keep","she doesn't brush"]
        },
        {
            id:7, sentence:"We _____ keep the kitchen clean.", translation:"Nosotros no mantenemos la cocina limpia.",
            hint:"El sujeto es 'we'. ¿Cuál auxiliar negativo va con we?",
            options:["don't","doesn't","not"], correct:"don't",
            feedback:{
                "doesn't":{errorType:"Error de sujeto",explanation:"'Doesn't' es para él / ella. 'We' = nosotros. Con nosotros, la negación es: don't.",rule:"we → don't + verbo"},
                "not":{errorType:"Negación incompleta",explanation:"'Not' solo no puede negar un verbo. Con 'we', la forma correcta es: don't. → We don't keep.",rule:"we → don't + verbo"}
            },
            correctReason:"'We' = nosotros. La negación con I/you/we/they es: don't + verbo. → We don't keep the kitchen clean.",
            examples:["we don't keep","we don't eat","we don't go"]
        },
        {
            id:8, sentence:"Ben _____ go to the market on Sundays.", translation:"Ben no va al mercado los domingos.",
            hint:"Ben = él. ¿Cuál auxiliar negativo va con él?",
            options:["doesn't","don't","no"], correct:"doesn't",
            feedback:{
                "don't":{errorType:"Error de sujeto",explanation:"'Don't' es para I / you / we / they. Ben = él. Con él, la negación es: doesn't.",rule:"él → doesn't + verbo"},
                "no":{errorType:"Negación incorrecta",explanation:"'No' no niega verbos en inglés. Con él, la forma correcta es: doesn't. → Ben doesn't go.",rule:"él → doesn't + verbo"}
            },
            correctReason:"Ben = él. La negación con él / ella es: doesn't + verbo. → Ben doesn't go to the market on Sundays.",
            examples:["Ben doesn't go","he doesn't sweep","she doesn't rush"]
        },
        {
            id:9, sentence:"You _____ go to the market every day.", translation:"Tú no vas al mercado todos los días.",
            hint:"El sujeto es 'you'. ¿Cuál auxiliar negativo va con you?",
            options:["don't","doesn't","not"], correct:"don't",
            feedback:{
                "doesn't":{errorType:"Error de sujeto",explanation:"'Doesn't' es para él / ella. 'You' = tú. Con tú, la negación es: don't.",rule:"you → don't + verbo"},
                "not":{errorType:"Negación incompleta",explanation:"'Not' solo no niega el verbo. Con 'you', la forma correcta es: don't. → You don't go.",rule:"you → don't + verbo"}
            },
            correctReason:"'You' = tú. La negación con I/you/we/they es: don't + verbo. → You don't go to the market every day.",
            examples:["you don't go","you don't eat","you don't make"]
        },
        {
            id:10, sentence:"Sara _____ brush her teeth in the kitchen.", translation:"Sara no se cepilla los dientes en la cocina.",
            hint:"Sara = ella. ¿Cuál auxiliar negativo va con ella?",
            options:["doesn't","don't","no"], correct:"doesn't",
            feedback:{
                "don't":{errorType:"Error de sujeto",explanation:"'Don't' es para I / you / we / they. Sara = ella. Con ella, la negación es: doesn't.",rule:"ella → doesn't + verbo"},
                "no":{errorType:"Negación incorrecta",explanation:"'No' no puede negar un verbo en inglés. Con ella, la forma es: doesn't. → Sara doesn't brush.",rule:"ella → doesn't + verbo"}
            },
            correctReason:"Sara = ella. La negación con él / ella es: doesn't + verbo. → Sara doesn't brush her teeth in the kitchen.",
            examples:["Sara doesn't brush","she doesn't make","he doesn't go"]
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, index) => container.appendChild(createQuestionCard(q, index)));
        showQuestion(0);
        updateProgress();
    }

    const shuffledMap = {};

    function createQuestionCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const shuffledOptions = shuffle(q.options);
        shuffledMap[index] = shuffledOptions;
        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span style="font-size:0.82rem;color:var(--text-medium);font-weight:600;">Forma negativa</span>
            </div>
            <div class="hint-box"><div class="hint-label">💡 Pista</div>${q.hint}</div>
            <p class="question-text">${q.sentence.replace('_____', `<span class="blank" id="blank-${index}">?</span>`)}</p>
            <p class="translation">${q.translation}</p>
            <div class="options-grid" id="options-${index}">
                ${shuffledOptions.map((opt, oi) => `<button class="option-btn" data-idx="${oi}" onclick="selectAnswer(${index}, ${oi}, this)">${opt}</button>`).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'Ver resultados 🎉' : 'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    function selectAnswer(qi, optIdx, btn) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = shuffledMap[qi][optIdx];
        const isCorrect = selected === q.correct;
        if (isCorrect) score++;
        const blank = document.getElementById(`blank-${qi}`);
        blank.textContent = selected;
        blank.className = `blank ${isCorrect ? 'correct' : 'incorrect'}`;
        document.querySelectorAll(`#options-${qi} .option-btn`).forEach(b => {
            b.disabled = true;
            if (b.textContent.trim() === q.correct) b.classList.add('correct');
            else if (b.textContent.trim() === selected && !isCorrect) b.classList.add('incorrect');
        });
        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const ruleExamples = q.examples.map(e => `<span class="rule-ex"><span class="form">${e}</span></span>`).join('');
        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">✅</span><div><div class="fb-title">¡Correcto!</div><div class="fb-subtitle">Elegiste la negación correcta</div></div></div>
                <div class="fb-body">
                    <div class="fb-block fb-rule"><div class="fb-block-title">📐 Regla aplicada</div><div class="rule-formula">${q.correct} + verbo</div><div class="rule-examples">${ruleExamples}</div></div>
                    <div class="fb-block fb-why"><div class="fb-block-title">💡 ¿Por qué es correcta?</div><div class="fb-why-text">${q.correctReason}</div></div>
                </div>`;
        } else {
            const err = q.feedback[selected] || {errorType:'Incorrecto',explanation:'Respuesta incorrecta.',rule:''};
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">❌</span><div><div class="fb-title">Incorrecto</div><div class="fb-subtitle">Revisemos qué pasó</div></div></div>
                <div class="fb-body">
                    <div class="fb-block fb-compare"><div class="fb-block-title" style="color:#64748B;">🔄 Tu respuesta vs. la correcta</div>
                        <div class="compare-row"><span class="compare-label wrong">Tú elegiste</span><span class="compare-text"><span class="word-wrong">${selected}</span></span></div>
                        <div class="compare-row"><span class="compare-label right">Correcto</span><span class="compare-text"><span class="word-right">${q.correct}</span></span></div>
                    </div>
                    <div class="fb-block fb-error"><div class="fb-block-title">⚠️ Error: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-word-row"><span class="ew-box ew-wrong">${selected}</span><span class="ew-arrow">→</span><span class="ew-box ew-right">${q.correct}</span></div>
                        <div class="error-rule">${err.explanation}</div>
                        ${err.rule ? `<div style="margin-top:0.5rem;font-size:0.82rem;color:var(--error-dark);font-weight:700;">📌 ${err.rule}</div>` : ''}
                    </div>
                    <div class="fb-block fb-rule"><div class="fb-block-title">📐 La regla correcta</div><div class="rule-formula">${q.correct} + verbo</div><div class="rule-examples">${ruleExamples}</div></div>
                    <div class="fb-block fb-why"><div class="fb-block-title">💡 ¿Por qué es correcta?</div><div class="fb-why-text">${q.correctReason}</div></div>
                </div>`;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c,idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { if (i < quizData.length - 1) showQuestion(i + 1); else showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        document.getElementById('progressFill').style.width = (answered.filter(Boolean).length / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '¡Excelente! Dominas la negación. 🏆'
            : pct >= 70 ? '¡Muy bien! Sigue practicando. 💪'
            : 'Buen esfuerzo. Repasa las reglas e inténtalo de nuevo. 📚';
        document.querySelectorAll('.star').forEach((s,i) => { if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300); });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
