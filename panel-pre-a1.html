<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUCUM English Center — Pre-A1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  /* ── EXACT from PreA1 materials ── */
  --lp:#F9A825; --ld:#E65100; --ll:#FFF9C4; --lm:#FFECB3;
  --lg:linear-gradient(135deg,#F9A825 0%,#FF8F00 100%);
  --lglow:rgba(249,168,37,0.15); --lbt:#4E3800;

  /* ── base ── */
  --bg:#FAFAF6; --card:#FFFFFF; --text:#2A2A2A; --ts:#777777;
  --border:#E8E5DC; --shadow:0 3px 16px rgba(0,0,0,0.06); --rad:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;}

/* ── HEADER ── */
header{
  background:var(--card);border-bottom:1.5px solid var(--border);
  padding:0 28px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:300;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.hlogo{display:flex;align-items:center;gap:10px;}
.hbadge{
  font-family:'Fredoka',sans-serif;font-size:14px;font-weight:600;
  background:var(--lg);color:#fff;
  padding:5px 13px;border-radius:8px;letter-spacing:0.04em;
}
.htitle{font-family:'Fredoka',sans-serif;font-size:16px;font-weight:600;color:var(--text);}
.hlevel{
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:0.1em;text-transform:uppercase;
  background:var(--ll);color:var(--lbt);
  border:1.5px solid var(--lm);padding:4px 12px;border-radius:20px;
}





/* ── HERO ── */
.hero{
  background:var(--lg);
  padding:40px 28px 48px;position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;top:-40%;right:-8%;width:280px;height:280px;background:rgba(255,255,255,0.1);border-radius:50%;}
.hero::after{content:'';position:absolute;bottom:-60%;left:-5%;width:200px;height:200px;background:rgba(255,255,255,0.06);border-radius:50%;}
.hero-in{max-width:860px;margin:0 auto;position:relative;z-index:1;}

.hlevel-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:0.1em;text-transform:uppercase;
  background:var(--ll);color:var(--lbt);
  padding:5px 14px;border-radius:20px;border:1.5px solid var(--lm);
  margin-bottom:14px;
}
.hero h1{font-family:'Fredoka',sans-serif;font-size:38px;font-weight:600;color:#fff;line-height:1.1;margin-bottom:8px;}
.hero-sub{font-size:14px;color:rgba(255,255,255,0.82);max-width:500px;line-height:1.6;}
.hero-pills{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.hpill{
  background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.3);
  color:#fff;padding:5px 13px;border-radius:20px;
  font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;
}

/* ── MAIN ── */
main{max-width:860px;margin:0 auto;padding:32px 24px 80px;}

.stitle{
  font-family:'Fredoka',sans-serif;font-size:20px;font-weight:600;
  color:var(--text);margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.stitle::before{content:'';display:block;width:20px;height:3px;background:var(--lp);border-radius:2px;}

/* ── MODULE CARDS ── */
.mgrid{display:flex;flex-direction:column;gap:10px;}

.mcard{
  background:var(--card);border-radius:var(--rad);
  border:1px solid var(--border);border-top:3.5px solid var(--lp);
  box-shadow:var(--shadow);
  display:flex;align-items:stretch;cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
  overflow:hidden;
}
.mcard:not(.locked):hover{
  transform:translateY(-2px);
  box-shadow:0 8px 28px var(--lglow);
  border-color:var(--lp);
}
.mcard.locked{opacity:0.5;cursor:default;filter:grayscale(20%);}

.mcard-img{
  width:100px;flex-shrink:0;
  background-size:cover;background-position:center;
  position:relative;
}
.mcard-img::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 50%,var(--card));}

.mcard-body{flex:1;padding:16px 18px;display:flex;align-items:center;gap:14px;}



.mcard.locked 

.minfo{flex:1;}
.mname{font-family:'Fredoka',sans-serif;font-size:17px;font-weight:600;color:var(--text);line-height:1.2;}
.mcard.locked .mname{color:#BBB;}

.mtags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.mtag{
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  background:var(--ll);color:var(--ld);
  border:1.5px solid var(--lm);
  padding:2px 9px;border-radius:20px;
}
.mcard.locked .mtag{background:#F5F3EE;color:#CCC;border-color:#E0DDD5;}

.mcard-cta{
  display:flex;align-items:center;padding:0 18px;flex-shrink:0;
}
.cta-btn{
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  background:var(--ll);color:var(--ld);
  border:1.5px solid var(--lm);
  padding:7px 14px;border-radius:20px;
  display:flex;align-items:center;gap:5px;
  transition:all 0.18s;white-space:nowrap;
}
.mcard:not(.locked):hover .cta-btn{background:var(--lg);color:#fff;border-color:var(--lp);}
.lock-cta{font-size:16px;color:#CCC;}

/* ── OVERLAY ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(42,30,5,0.45);
  backdrop-filter:blur(3px);
  z-index:400;opacity:0;pointer-events:none;
  transition:opacity 0.28s;
}
.overlay.on{opacity:1;pointer-events:all;}

/* ── DRAWER ── */
.drawer{
  position:fixed;top:0;right:0;bottom:0;
  width:min(500px,100vw);
  background:var(--bg);
  z-index:500;
  transform:translateX(105%);
  transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;
  box-shadow:-6px 0 40px rgba(0,0,0,0.15);
  border-radius:20px 0 0 20px;
  overflow:hidden;
}
.drawer.on{transform:translateX(0);}

/* DRAWER HEADER */
.dhead{
  background:var(--lg);
  padding:16px 20px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}

.dhead-name{font-family:'Fredoka',sans-serif;font-size:17px;font-weight:600;color:#fff;flex:1;line-height:1.2;}
.dclose{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.3);
  cursor:pointer;font-size:15px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;flex-shrink:0;
}
.dclose:hover{background:rgba(255,255,255,0.35);}

/* DRAWER IMAGE */
.dimg{
  height:120px;flex-shrink:0;
  background-size:cover;background-position:center;
  position:relative;
}
.dimg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 35%,rgba(42,30,5,0.6));}
.dimg-label{
  position:absolute;bottom:10px;left:16px;z-index:1;
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  color:rgba(255,255,255,0.88);letter-spacing:0.06em;text-transform:uppercase;
}

/* DRAWER SCROLL */
.dscroll{flex:1;overflow-y:auto;padding:14px 14px 32px;}
.dscroll::-webkit-scrollbar{width:3px;}
.dscroll::-webkit-scrollbar-thumb{background:var(--lm);border-radius:4px;}

/* SECTION BLOCKS */
.dsec{
  background:var(--card);border:1px solid var(--border);border-top:3px solid var(--lp);
  border-radius:var(--rad);margin-bottom:8px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
  transition:border-top-color 0.18s,box-shadow 0.18s;
}
.dsec.open{box-shadow:0 4px 16px var(--lglow);}

.dsec-trig{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;cursor:pointer;user-select:none;
  transition:background 0.14s;
}
.dsec-trig:hover{background:var(--ll);}
.dsec.open .dsec-trig{background:var(--ll);}

.dsec-ico{
  width:36px;height:36px;border-radius:8px;
  background:var(--ll);border:1.5px solid var(--lm);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;transition:all 0.18s;
}
.dsec.open .dsec-ico{background:var(--lg);}

.dsec-label{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--text);flex:1;}
.dsec-meta{font-size:11px;color:var(--ts);font-family:'Nunito',sans-serif;font-weight:600;flex-shrink:0;}
.dsec-chev{font-size:11px;color:var(--ts);transition:transform 0.22s,color 0.15s;margin-left:4px;}
.dsec.open .dsec-chev{transform:rotate(180deg);color:var(--ld);}

.dsec-body{display:none;padding:0 14px 12px;border-top:1.5px dashed var(--lm);}
.dsec.open .dsec-body{display:block;}

/* SECTION LABEL inside drawer */
.sec-label{
  display:flex;align-items:center;gap:6px;
  font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.13em;color:var(--ld);
  margin:10px 0 6px;
}
.sec-label::before{content:'';width:16px;height:2.5px;background:var(--lp);border-radius:2px;}

/* TOPICS ACCORDION */
.tacc{display:flex;flex-direction:column;gap:4px;}

.titem{
  border:1px solid var(--border);border-radius:10px;
  overflow:hidden;background:var(--card);
  transition:border-color 0.15s,box-shadow 0.15s;
}
.titem:hover{border-color:var(--lp);}
.titem.open{border-color:var(--lp);box-shadow:0 2px 10px var(--lglow);}

.ttrig{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;cursor:pointer;user-select:none;transition:background 0.12s;
}
.ttrig:hover{background:var(--ll);}
.titem.open .ttrig{background:var(--ll);}

.tn{
  font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  background:var(--lm);color:var(--ld);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.titem.open .tn{background:var(--lg);color:#fff;}

.ttext{font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--ts);flex:1;line-height:1.4;}
.titem.open .ttext{color:var(--text);}
.tchev{font-size:10px;color:#CCC;transition:transform 0.18s;flex-shrink:0;}
.titem.open .tchev{transform:rotate(180deg);color:var(--ld);}

.tacts{
  display:none;gap:6px;flex-wrap:wrap;
  padding:8px 12px 10px 43px;
  border-top:1.5px dashed var(--lm);
  background:#FFFDF5;
}
.titem.open .tacts{display:flex;}

/* CHIPS */
.chip{
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  padding:5px 13px;border-radius:20px;
  text-decoration:none;cursor:pointer;transition:all 0.15s;
}
.chip-fill{background:var(--lg);color:#fff;border:1.5px solid var(--lp);}
.chip-fill:hover{box-shadow:0 3px 10px var(--lglow);transform:translateY(-1px);}
.chip-out{background:var(--ll);color:var(--ld);border:1.5px solid var(--lm);}
.chip-out:hover{background:var(--lm);}

/* DIRECT CHIPS */
.drow{padding-top:9px;display:flex;flex-wrap:wrap;gap:7px;}
.dchip{
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  padding:7px 15px;border-radius:20px;
  background:var(--lg);color:#fff;
  border:1.5px solid var(--lp);
  text-decoration:none;cursor:pointer;
  box-shadow:0 2px 8px var(--lglow);
  transition:all 0.15s;
}
.dchip:hover{box-shadow:0 4px 14px var(--lglow);transform:translateY(-1px);}

/* MATERIALS */
.matlist{padding-top:9px;display:flex;flex-direction:column;gap:6px;}
.matitem{
  display:flex;align-items:center;gap:11px;
  padding:10px 13px;border-radius:10px;
  border:1px solid var(--border);background:var(--card);
  text-decoration:none;color:var(--ts);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.15s;
}
.matitem:hover{border-color:var(--lp);background:var(--ll);color:var(--ld);transform:translateX(4px);}
.matitem-ico{width:36px;height:36px;border-radius:8px;background:var(--ll);border:1.5px solid var(--lm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.matitem span{flex:1;}
.matitem-arr{color:var(--lp);font-size:15px;font-weight:800;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.mcard{animation:fadeUp 0.36s ease both;}
.mcard:nth-child(1){animation-delay:.03s}.mcard:nth-child(2){animation-delay:.07s}
.mcard:nth-child(3){animation-delay:.11s}.mcard:nth-child(4){animation-delay:.15s}
.mcard:nth-child(5){animation-delay:.19s}.mcard:nth-child(6){animation-delay:.23s}
.mcard:nth-child(7){animation-delay:.27s}
</style>
</head>

<header>
  <div class="hlogo">
    <div class="hbadge">JUCUM EC</div>
    <div class="htitle">Panel de Materiales</div>

  </div>
</header>

<div class="hero">
  <div class="hero-in">
    <div class="hlevel-badge">🌟 Nivel Pre-A1</div>
    <h1>Bienvenido al inicio<br>de tu camino en inglés</h1>
    <p class="hero-sub">Exposición total al inglés desde el primer día. Selecciona un módulo para acceder a todos sus recursos.</p>
    <div class="hero-pills">
      <span class="hpill">🗂 7 Módulos</span>
      <span class="hpill">📝 Gramática</span>
      <span class="hpill">📖 Lectura</span>
      <span class="hpill">🎧 Auditiva</span>
      <span class="hpill">🃏 Quizlet</span>
      <span class="hpill">📚 Materiales</span>
    </div>
  </div>
</div>

<main>
  <div class="stitle">Módulos del Nivel</div>
  <div class="mgrid" id="root"></div>
</main>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="dhead">
    
    <div class="dhead-name" id="d-name"></div>
    <button class="dclose" onclick="closeDrawer()">✕</button>
  </div>
  <div class="dimg" id="d-img">
    <div class="dimg-label" id="d-label"></div>
  </div>
  <div class="dscroll" id="d-scroll"></div>
</div>

<script>
// ── BASE URL ──────────────────────────────────────────────────────────────────
const BASE = 'https://jucumenglishcenter.github.io/Pre-a1';

// ── HELPERS ───────────────────────────────────────────────────────────────────

function tRow(topic, i, mid) {
  const grammarChips = [
    `<a class="chip chip-fill" href="${topic.fillin}"        target="_blank">✏️ Fill In</a>`,
    `<a class="chip chip-fill" href="${topic.identification}" target="_blank">🔍 Identification</a>`,
    `<a class="chip chip-fill" href="${topic.transform}"     target="_blank">🔄 Transform</a>`,
  ].join('');

  return `<div class="titem" id="g${mid}_${i}">
    <div class="ttrig" onclick="ti('g${mid}_${i}')">
      <span class="tn">${i+1}</span>
      <span class="ttext">${topic.label}</span>
      <span class="tchev">▾</span>
    </div>
    <div class="tacts">${grammarChips}</div>
  </div>`;
}

function buildSec(s, m) {
  const id = `ds_${m.id}_${s.id}`;
  let body = '';
  const meta = s.type === 'grammar' ? `${m.topics.length} temas` : '';

  if (s.type === 'grammar') {
    body = `<div class="sec-label">Temas del módulo</div>
            <div class="tacc">${m.topics.map((t,i) => tRow(t, i, m.id)).join('')}</div>`;

  } else if (s.type === 'reading') {
    body = `<div class="drow">
      <a class="dchip" href="${m.reading}" target="_blank">📖 Abrir actividad</a>
    </div>`;

  } else if (s.type === 'listening') {
    body = `<div class="drow">
      <a class="dchip" href="${m.listening}" target="_blank">🎧 Abrir actividad</a>
    </div>`;

  } else if (s.type === 'quizlet') {
    body = `<div class="drow">
      <a class="dchip" href="${m.quizlet.esp_ing}"      target="_blank">🔤 Esp → Ing</a>
      <a class="dchip" href="${m.quizlet.traducir}"     target="_blank">✍️ Traducir</a>
      <a class="dchip" href="${m.quizlet.definiciones}" target="_blank">📚 Definiciones</a>
      <a class="dchip" href="${m.quizlet.ordenar}"      target="_blank">🔀 Ordenar</a>
    </div>`;

  } else if (s.type === 'materials') {
    const summaryItems = m.topics.flatMap(t => t.summaries || []).map(s =>
      `<a class="matitem" href="${s.url}" target="_blank">
        <div class="matitem-ico">📄</div><span>${s.label.replace('📄 ','')}</span><span class="matitem-arr">→</span>
      </a>`
    ).join('');
    body = `<div class="matlist">
      <a class="matitem" href="${m.story}" target="_blank">
        <div class="matitem-ico">📗</div><span>Stories & Diálogos</span><span class="matitem-arr">→</span>
      </a>
    </div>
    <div class="sec-label">Resumen de Gramática</div>
    <div class="matlist">${summaryItems}</div>`;
  }

  return `<div class="dsec" id="${id}">
    <div class="dsec-trig" onclick="ti('${id}')">
      <div class="dsec-ico">${s.ico}</div>
      <span class="dsec-label">${s.label}</span>
      ${meta ? `<span class="dsec-meta">${meta}</span>` : ''}
      <span class="dsec-chev">▾</span>
    </div>
    <div class="dsec-body">${body}</div>
  </div>`;
}

const SECS = [
  { id:'gr', ico:'📝', label:'Práctica de Gramática', type:'grammar'   },
  { id:'rd', ico:'📖', label:'Comprensión Lectora',   type:'reading'   },
  { id:'ls', ico:'🎧', label:'Comprensión Auditiva',  type:'listening' },
  { id:'qu', ico:'🃏', label:'Quizlet',               type:'quizlet'   },
  { id:'mt', ico:'📚', label:'Materiales',            type:'materials' },
];

function buildCard(m) {
  const tags = m.tags.map(t => `<span class="mtag">${t}</span>`).join('');
  const cta = m.ok
    ? `<div class="mcard-cta"><div class="cta-btn">Ver recursos ›</div></div>`
    : `<div class="mcard-cta"><div class="lock-cta">🔒</div></div>`;
  return `<div class="mcard${m.ok ? '' : ' locked'}" onclick="${m.ok ? `openDrawer(${m.id})` : ''}">
    <div class="mcard-img" style="background-image:url('${m.img}')"></div>
    <div class="mcard-body">
      <div class="minfo">
        <div class="mname">${m.name}</div>
        <div class="mtags">${m.ok ? tags : '<span class="mtag">🔒 Próximamente</span>'}</div>
      </div>
    </div>
    ${cta}
  </div>`;
}

function ti(id) { document.getElementById(id).classList.toggle('open'); }

function openDrawer(id) {
  const m = DATA.find(x => x.id === id);
  document.getElementById('d-name').textContent = m.name;
  document.getElementById('d-img').style.backgroundImage = `url('${m.img}')`;
  document.getElementById('d-label').textContent = m.name;
  document.getElementById('d-scroll').innerHTML = SECS.map(s => buildSec(s, m)).join('');
  document.getElementById('drawer').classList.add('on');
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
document.getElementById('root').innerHTML = DATA.map(buildCard).join('');
</script>
</body>
</html>
