<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identification - Pre-A1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F59E0B; --primary-light: #FCD34D; --primary-dark: #D97706;
            --accent: #FBBF24; --bg-gradient-start: #FFFBEB; --bg-gradient-end: #FEF3C7;
            --text-dark: #78350F; --text-medium: #92400E; --text-light: #B45309;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(245,158,11,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:var(--text-dark); transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .q-label { font-size:0.88rem; color:var(--text-medium); font-weight:600; }
        .sentence-options { display:flex; flex-direction:column; gap:0.7rem; margin-bottom:0.5rem; }
        .sent-option { border:2.5px solid #E5E7EB; border-radius:14px; padding:1rem 1.1rem; cursor:pointer; transition:all .2s; background:white; text-align:left; font-family:'Nunito',sans-serif; display:flex; gap:0.75rem; align-items:flex-start; }
        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .sent-option.disabled { cursor:default; }
        .sent-option.correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:var(--primary-light); color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; margin-top:1px; font-family:'Fredoka',sans-serif; }
        .sent-option.correct .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.98rem; color:var(--text-dark); line-height:1.55; font-weight:600; flex:1; }
        .option-status { font-size:1.1rem; margin-left:auto; flex-shrink:0; opacity:0; }
        .sent-option.correct .option-status, .sent-option.incorrect .option-status { opacity:1; }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-compare .fb-block-title { color:#475569; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.55; }
        .fb-error-block { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error-block .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { display:flex; align-items:center; gap:0.3rem; font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.5rem; }
        .rule-ex .base { color:var(--info-dark); font-weight:600; }
        .rule-ex .arrow { color:#94A3B8; }
        .rule-ex .form { color:var(--success-dark); font-weight:700; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/Pre-a1/panel-pre-a1.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔍 Identification</div>
            <div class="header-subtitle">💛 Pre-A1 · Present Simple · Affirmative</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <main>
        <div class="instructions">
            <div class="instructions-icon">🔍</div>
            <div>
                <div class="instructions-title">¿Cuál oración es correcta?</div>
                <div class="instructions-text">Lee las tres oraciones y elige la que usa el verbo correctamente en Present Simple.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de nuevo</button>
                <a href="https://jucumenglishcenter.github.io/Pre-a1/panel-pre-a1.html" class="result-btn secondary">← Volver al panel</a>
            </div>
        </div>
    </main>
    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    const quizData = [
        {
            id:1,
            options:[
                {text:"Marco gets up early.", correct:true},
                {text:"Marco get up early.", correct:false, errorWord:"get", correctWord:"gets", errorType:"Falta la -s", explanation:"Marco = él. Con él / ella, el verbo lleva -s: gets."},
                {text:"Marco geting up early.", correct:false, errorWord:"geting", correctWord:"gets", errorType:"Forma incorrecta", explanation:"'Geting' no existe en Present Simple. Con él, la forma correcta es: gets."}
            ],
            baseVerb:"get", correctForm:"gets", rule:"Marco (él) → get + s = gets",
            examples:["I get → he gets","you get → she gets"],
            correctReason:"Marco = él. Con él / ella, el verbo lleva -s al final: get → gets."
        },
        {
            id:2,
            options:[
                {text:"I wash my face every morning.", correct:true},
                {text:"I washes my face every morning.", correct:false, errorWord:"washes", correctWord:"wash", errorType:"Error de sujeto", explanation:"'Washes' es para él / ella (Rosa washes). Con 'I', el verbo no cambia: wash."},
                {text:"I washing my face every morning.", correct:false, errorWord:"washing", correctWord:"wash", errorType:"Forma incorrecta", explanation:"'Washing' solo no funciona en Present Simple. Con 'I', la forma correcta es: wash."}
            ],
            baseVerb:"wash", correctForm:"wash", rule:"I → wash (sin -s)",
            examples:["I wash","I brush","I eat"],
            correctReason:"Con 'I', el verbo no cambia: wash."
        },
        {
            id:3,
            options:[
                {text:"Rosa makes good food.", correct:true},
                {text:"Rosa make good food.", correct:false, errorWord:"make", correctWord:"makes", errorType:"Falta la -s", explanation:"Rosa = ella. Con ella, el verbo lleva -s: makes."},
                {text:"Rosa maks good food.", correct:false, errorWord:"maks", correctWord:"makes", errorType:"Error ortográfico", explanation:"'Maks' no existe. La forma correcta es: make + s = makes."}
            ],
            baseVerb:"make", correctForm:"makes", rule:"Rosa (ella) → make + s = makes",
            examples:["Rosa makes","she makes","he makes"],
            correctReason:"Rosa = ella. make + s = makes."
        },
        {
            id:4,
            options:[
                {text:"Ben and Rosa get fruit every week.", correct:true},
                {text:"Ben and Rosa gets fruit every week.", correct:false, errorWord:"gets", correctWord:"get", errorType:"Error de sujeto", explanation:"'Gets' es solo para él / ella. 'Ben and Rosa' = ellos. Con ellos, el verbo no cambia: get."},
                {text:"Ben and Rosa geting fruit every week.", correct:false, errorWord:"geting", correctWord:"get", errorType:"Forma incorrecta", explanation:"'Geting' no existe en Present Simple. Con ellos, el verbo se queda igual: get."}
            ],
            baseVerb:"get", correctForm:"get", rule:"ellos → get (sin -s)",
            examples:["they get","we get","Ben and Rosa get"],
            correctReason:"'Ben and Rosa' = ellos. Con ellos, el verbo no cambia: get."
        },
        {
            id:5,
            options:[
                {text:"Marco brushes his teeth.", correct:true},
                {text:"Marco brush his teeth.", correct:false, errorWord:"brush", correctWord:"brushes", errorType:"Falta la -es", explanation:"Marco = él. 'Brush' termina en -sh. Con él, se agrega -es: brushes."},
                {text:"Marco brushs his teeth.", correct:false, errorWord:"brushs", correctWord:"brushes", errorType:"Error ortográfico", explanation:"'Brushs' no existe. Los verbos en -sh agregan -es: brush → brushes."}
            ],
            baseVerb:"brush", correctForm:"brushes", rule:"Marco (él) → brush + es = brushes",
            examples:["brush → brushes","wash → washes","push → pushes"],
            correctReason:"Marco = él. 'Brush' termina en -sh → brush + es = brushes."
        },
        {
            id:6,
            options:[
                {text:"Rosa does her chores.", correct:true},
                {text:"Rosa do her chores.", correct:false, errorWord:"do", correctWord:"does", errorType:"Falta el cambio", explanation:"Rosa = ella. 'Do' es especial — con ella se escribe: does."},
                {text:"Rosa dos her chores.", correct:false, errorWord:"dos", correctWord:"does", errorType:"Error ortográfico", explanation:"'Dos' no es correcto. Con él / ella, 'do' se escribe: does."}
            ],
            baseVerb:"do", correctForm:"does", rule:"Rosa (ella) → do → does (especial)",
            examples:["I do → she does","you do → he does"],
            correctReason:"Rosa = ella. 'Do' es especial: do → does."
        },
        {
            id:7,
            options:[
                {text:"Ben goes to the market.", correct:true},
                {text:"Ben go to the market.", correct:false, errorWord:"go", correctWord:"goes", errorType:"Falta la -es", explanation:"Ben = él. 'Go' termina en -o. Con él, se agrega -es: goes."},
                {text:"Ben gos to the market.", correct:false, errorWord:"gos", correctWord:"goes", errorType:"Error ortográfico", explanation:"'Gos' no existe. Los verbos en -o agregan -es: go → goes."}
            ],
            baseVerb:"go", correctForm:"goes", rule:"Ben (él) → go + es = goes",
            examples:["go → goes","do → does"],
            correctReason:"Ben = él. 'Go' termina en -o → go + es = goes."
        },
        {
            id:8,
            options:[
                {text:"I sweep the floor.", correct:true},
                {text:"I sweeps the floor.", correct:false, errorWord:"sweeps", correctWord:"sweep", errorType:"Error de sujeto", explanation:"'Sweeps' es para él / ella (Marco sweeps). Con 'I', el verbo no cambia: sweep."},
                {text:"I sweeping the floor.", correct:false, errorWord:"sweeping", correctWord:"sweep", errorType:"Forma incorrecta", explanation:"'Sweeping' solo no funciona en Present Simple. Con 'I': sweep."}
            ],
            baseVerb:"sweep", correctForm:"sweep", rule:"I → sweep (sin -s)",
            examples:["I sweep","I keep","I go"],
            correctReason:"Con 'I', el verbo no cambia: sweep."
        },
        {
            id:9,
            options:[
                {text:"Marco keeps his room clean.", correct:true},
                {text:"Marco keep his room clean.", correct:false, errorWord:"keep", correctWord:"keeps", errorType:"Falta la -s", explanation:"Marco = él. Con él, el verbo lleva -s: keeps."},
                {text:"Marco keepes his room clean.", correct:false, errorWord:"keepes", correctWord:"keeps", errorType:"Error ortográfico", explanation:"'Keepes' no existe. 'Keep' solo agrega -s: keeps."}
            ],
            baseVerb:"keep", correctForm:"keeps", rule:"Marco (él) → keep + s = keeps",
            examples:["keep → keeps","sit → sits","like → likes"],
            correctReason:"Marco = él. keep + s = keeps."
        },
        {
            id:10,
            options:[
                {text:"Ben gives fruit to Rosa.", correct:true},
                {text:"Ben give fruit to Rosa.", correct:false, errorWord:"give", correctWord:"gives", errorType:"Falta la -s", explanation:"Ben = él. Con él, el verbo lleva -s: gives."},
                {text:"Ben gves fruit to Rosa.", correct:false, errorWord:"gves", correctWord:"gives", errorType:"Error ortográfico", explanation:"'Gves' no existe. Solo se agrega -s: give → gives."}
            ],
            baseVerb:"give", correctForm:"gives", rule:"Ben (él) → give + s = gives",
            examples:["give → gives","like → likes","take → takes"],
            correctReason:"Ben = él. give + s = gives."
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => { q.shuffled = shuffle(q.options); container.appendChild(createCard(q, i)); });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];
        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">¿Cuál oración es correcta en Present Simple?</span>
            </div>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt,i) => `
                    <button class="sent-option" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">${opt.text}</div>
                        <span class="option-status"></span>
                    </button>`).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'Ver resultados 🎉' : 'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        if (isCorrect) score++;
        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            const opt = q.shuffled[i];
            if (opt.correct) { btn.classList.add('correct'); btn.querySelector('.option-status').textContent = '✅'; }
            else if (i === optIdx && !isCorrect) { btn.classList.add('incorrect'); btn.querySelector('.option-status').textContent = '❌'; }
        });
        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const correctOpt = q.shuffled.find(o => o.correct);
        const ruleExamples = q.examples.map(e => {
            const p = e.split(' → ');
            return p.length === 2
                ? `<span class="rule-ex"><span class="base">${p[0]}</span><span class="arrow">→</span><span class="form">${p[1]}</span></span>`
                : `<span class="rule-ex"><span class="form">${e}</span></span>`;
        }).join('');

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">✅</span><div><div class="fb-title">¡Correcto!</div><div class="fb-subtitle">Identificaste la oración correcta</div></div></div>
                <div class="fb-body">
                    <div class="fb-block fb-rule"><div class="fb-block-title">📐 Regla aplicada</div><div class="rule-formula">${q.rule}</div><div class="rule-examples">${ruleExamples}</div></div>
                    <div class="fb-block fb-why"><div class="fb-block-title">💡 ¿Por qué es correcta?</div><div class="fb-why-text">${q.correctReason}</div></div>
                </div>`;
        } else {
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">❌</span><div><div class="fb-title">Incorrecto</div><div class="fb-subtitle">Revisemos qué pasó</div></div></div>
                <div class="fb-body">
                    <div class="fb-block fb-compare"><div class="fb-block-title" style="color:#64748B;">🔄 Tu elección vs. la correcta</div>
                        <div class="compare-row"><span class="compare-label wrong">Tú elegiste</span><span class="compare-text">${selected.text}</span></div>
                        <div class="compare-row"><span class="compare-label right">Correcto</span><span class="compare-text">${correctOpt.text}</span></div>
                    </div>
                    <div class="fb-block fb-error-block"><div class="fb-block-title">⚠️ Error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="word-swap"><span class="ws-box ws-wrong">${selected.errorWord}</span><span class="ws-arrow">→</span><span class="ws-box ws-right">${selected.correctWord}</span></div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule"><div class="fb-block-title">📐 La regla correcta</div><div class="rule-formula">${q.rule}</div><div class="rule-examples">${ruleExamples}</div></div>
                    <div class="fb-block fb-why"><div class="fb-block-title">💡 ¿Por qué es correcta?</div><div class="fb-why-text">${q.correctReason}</div></div>
                </div>`;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c,idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { if (i < quizData.length - 1) showQuestion(i + 1); else showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        document.getElementById('progressFill').style.width = (answered.filter(Boolean).length / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '¡Excelente! Identificas las oraciones correctamente. 🏆'
            : pct >= 70 ? '¡Muy bien! Sigue practicando. 💪'
            : 'Buen esfuerzo. Repasa las reglas e inténtalo de nuevo. 📚';
        document.querySelectorAll('.star').forEach((s,i) => { if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300); });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
