<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fill in the Blanks - Pre-A1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#F59E0B;--primary-light:#FCD34D;--primary-dark:#D97706;
            --accent:#FBBF24;--bg-gradient-start:#FFFBEB;--bg-gradient-end:#FEF3C7;
            --text-dark:#78350F;--text-medium:#92400E;--text-light:#B45309;
            --success:#10B981;--success-light:#D1FAE5;--success-dark:#059669;
            --error:#EF4444;--error-light:#FEE2E2;--error-dark:#DC2626;
            --info:#3B82F6;--info-light:#DBEAFE;--info-dark:#1D4ED8;
            --purple:#8B5CF6;--purple-light:#EDE9FE;--purple-dark:#6D28D9;
            --shadow-soft:0 4px 20px rgba(245,158,11,0.15);
            --border-radius:20px;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end));min-height:100vh;color:var(--text-dark);}
        .header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-soft);}
        .back-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.4rem;text-decoration:none;color:var(--text-dark);transition:all .2s;flex-shrink:0;}
        .back-btn:hover{background:rgba(255,255,255,0.5);transform:scale(1.1);}
        .header-info{flex:1;}
        .header-title{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:600;color:white;}
        .header-subtitle{font-size:0.8rem;color:rgba(255,255,255,0.85);margin-top:2px;}
        .progress-indicator{background:rgba(255,255,255,0.3);padding:0.4rem 0.9rem;border-radius:20px;font-weight:700;color:white;font-size:0.9rem;}
        .progress-container{height:6px;background:rgba(255,255,255,0.3);}
        .progress-fill{height:100%;background:white;transition:width .5s ease;width:0%;}
        main{padding:1.5rem;max-width:650px;margin:0 auto;}
        .instructions{background:white;border-radius:16px;padding:1rem 1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow-soft);border-left:5px solid var(--primary);display:flex;gap:0.75rem;align-items:flex-start;}
        .instructions-icon{font-size:1.6rem;flex-shrink:0;}
        .instructions-title{font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:600;color:var(--text-dark);margin-bottom:0.2rem;}
        .instructions-text{font-size:0.85rem;color:var(--text-medium);line-height:1.5;}
        .question-card{background:white;border-radius:var(--border-radius);box-shadow:var(--shadow-soft);padding:1.5rem;margin-bottom:1rem;animation:slideIn .4s ease;}
        .question-card.hidden{display:none;}
        @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        .q-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;}
        .question-number{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:0.95rem;flex-shrink:0;}
        .form-badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.7rem;border-radius:20px;font-size:0.72rem;font-weight:700;}
        .form-badge.singular{background:#DBEAFE;color:#1D4ED8;}
        .form-badge.plural{background:#D1FAE5;color:#059669;}
        .hint-box{background:#FFFDE7;border-left:4px solid var(--primary);padding:0.7rem 1rem;border-radius:0 10px 10px 0;margin-bottom:1rem;font-size:0.88rem;color:#78350F;line-height:1.5;}
        .hint-label{font-weight:700;color:var(--primary-dark);display:flex;align-items:center;gap:0.4rem;margin-bottom:0.2rem;font-size:0.82rem;text-transform:uppercase;letter-spacing:.5px;}
        .question-text{font-size:1.1rem;line-height:1.7;margin-bottom:0.4rem;font-weight:600;}
        .blank{display:inline-block;min-width:100px;padding:0.2rem 0.6rem;background:var(--primary-light);border:2px dashed var(--primary-dark);border-radius:8px;text-align:center;font-weight:700;color:var(--primary-dark);transition:all .3s;}
        .blank.correct{background:var(--success-light);border:2px solid var(--success);color:var(--success-dark);}
        .blank.incorrect{background:var(--error-light);border:2px solid var(--error);color:var(--error-dark);}
        .translation{color:var(--text-light);font-style:italic;font-size:0.85rem;margin-bottom:1rem;}
        .options-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.7rem;margin-top:0.5rem;}
        .option-btn{padding:0.9rem 0.5rem;border:2.5px solid #E5E7EB;border-radius:12px;background:white;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text-dark);}
        .option-btn:hover:not(:disabled){border-color:var(--primary);background:var(--primary-light);transform:translateY(-2px);}
        .option-btn:disabled{cursor:default;}
        .option-btn.correct{border-color:var(--success);background:var(--success-light);color:var(--success-dark);}
        .option-btn.incorrect{border-color:var(--error);background:var(--error-light);color:var(--error-dark);}
        .feedback{margin-top:1.25rem;border-radius:16px;overflow:hidden;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
        .feedback.show{display:block;animation:fadeUp .35s ease;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .fb-header{padding:0.9rem 1.25rem;display:flex;align-items:center;gap:0.75rem;}
        .feedback.correct .fb-header{background:linear-gradient(135deg,var(--success),var(--success-dark));}
        .feedback.incorrect .fb-header{background:linear-gradient(135deg,var(--error),var(--error-dark));}
        .fb-icon{font-size:1.6rem;}
        .fb-title{font-family:'Fredoka',sans-serif;font-size:1.1rem;color:white;font-weight:600;}
        .fb-subtitle{font-size:0.8rem;color:rgba(255,255,255,0.85);margin-top:1px;}
        .fb-body{background:white;border:2px solid;border-top:none;border-radius:0 0 16px 16px;padding:1.25rem;display:flex;flex-direction:column;gap:0.9rem;}
        .feedback.correct .fb-body{border-color:var(--success);}
        .feedback.incorrect .fb-body{border-color:var(--error);}
        .fb-block{border-radius:12px;padding:0.9rem 1rem;}
        .fb-block-title{font-weight:800;font-size:0.78rem;text-transform:uppercase;letter-spacing:.6px;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;}
        .error-badge{display:inline-block;background:var(--error);color:white;padding:0.15rem 0.55rem;border-radius:6px;font-size:0.72rem;font-weight:700;margin-left:4px;}
        .fb-signal{background:#F0FDF4;border:1px solid #BBF7D0;}
        .fb-signal.wrong{background:#FFF1F2;border-color:#FECDD3;}
        .fb-signal .fb-block-title{color:var(--success-dark);}
        .fb-signal.wrong .fb-block-title{color:var(--error-dark);}
        .signal-tag{display:inline-block;background:var(--success);color:white;border-radius:6px;padding:0.1rem 0.5rem;font-size:0.82rem;font-weight:700;margin:0 2px;}
        .signal-tag.red{background:var(--error);}
        .fb-error{background:var(--error-light);border:1px solid #FECACA;}
        .fb-error .fb-block-title{color:var(--error-dark);}
        .word-swap{display:flex;align-items:center;justify-content:center;gap:0.75rem;margin:0.6rem 0;flex-wrap:wrap;}
        .ws-box{padding:0.4rem 1rem;border-radius:8px;font-weight:700;font-size:0.95rem;text-align:center;}
        .ws-wrong{background:white;color:var(--error);border:2px solid var(--error);text-decoration:line-through;}
        .ws-arr{font-size:1.3rem;color:#94A3B8;}
        .ws-right{background:var(--success);color:white;}
        .error-text{font-size:0.9rem;color:var(--text-dark);line-height:1.55;}
        .fb-rule{background:var(--info-light);border:1px solid #BFDBFE;}
        .fb-rule .fb-block-title{color:var(--info-dark);}
        .rule-formula{background:white;border-radius:8px;padding:0.5rem 0.9rem;font-family:'Fredoka',sans-serif;font-size:0.92rem;color:var(--info-dark);font-weight:600;margin-bottom:0.6rem;text-align:center;border:1px solid #BFDBFE;}
        .rule-examples{display:flex;flex-wrap:wrap;gap:0.4rem;}
        .rule-ex{font-size:0.82rem;background:white;border:1px solid #BFDBFE;border-radius:6px;padding:0.2rem 0.5rem;color:var(--success-dark);font-weight:600;}
        .fb-why{background:#F0FDF4;border:1px solid #BBF7D0;}
        .fb-why .fb-block-title{color:var(--success-dark);}
        .fb-why-text{font-size:0.92rem;color:var(--text-dark);line-height:1.55;}
        .nav-buttons{display:flex;gap:0.75rem;margin-top:1.25rem;}
        .nav-btn{padding:0.8rem 1.2rem;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all .2s;}
        .nav-btn.next{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;flex:1;}
        .nav-btn.prev{background:#F1F5F9;color:var(--text-dark);}
        .nav-btn:disabled{opacity:.4;cursor:default;}
        .nav-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:var(--shadow-soft);}
        .results-screen{display:none;text-align:center;padding:2rem 1.5rem;}
        .results-screen.show{display:block;animation:fadeUp .5s ease;}
        .results-emoji{font-size:4rem;margin-bottom:1rem;}
        .results-title{font-family:'Fredoka',sans-serif;font-size:2rem;margin-bottom:0.5rem;}
        .results-score{font-size:3rem;font-weight:800;color:var(--purple);margin:1rem 0;}
        .results-message{font-size:1.05rem;color:var(--text-medium);margin-bottom:1.5rem;}
        .stars-container{display:flex;justify-content:center;gap:0.5rem;margin:1.5rem 0;}
        .star{font-size:2.5rem;opacity:.3;transition:all .5s ease;}
        .star.earned{opacity:1;animation:starPop .5s ease;}
        @keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
        .results-buttons{display:flex;flex-direction:column;gap:1rem;margin-top:2rem;}
        .result-btn{padding:1rem 2rem;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:0.5rem;transition:all .2s;}
        .result-btn.primary{background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:white;}
        .result-btn.secondary{background:#F1F5F9;color:var(--text-dark);}
        .result-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-soft);}
    </style>
</head>
<body>
    <header class="header">
        <a href="prea1-m1t3-index.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">✏️ Fill in the Blanks</div>
            <div class="header-subtitle">💛 Pre-A1 · Personal Identity · There is / There are</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <main>
        <div class="instructions">
            <div class="instructions-icon">✏️</div>
            <div>
                <div class="instructions-title">Completa el espacio</div>
                <div class="instructions-text">Elige <strong>There is</strong> o <strong>There are</strong> según corresponda. Observa si el sustantivo que sigue es singular o plural.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="prea1-m1t3-index.html" class="result-btn secondary">← Volver al módulo</a>
            </div>
        </div>
    </main>
    <script>
    // ============================================================
    // PRE-A1 · Personal Identity · There is / There are
    // Fill in the Blanks — 10 preguntas
    // Distribución: 5 × There is (singular) · 5 × There are (plural)
    // Contexto: Dialogues y Stories de Personal Identity M1
    // ============================================================
    const quizData = [
        {
            id:1,
            sentence: "_____ a boy called Ravi in our class.",
            translation: "Hay un niño llamado Ravi en nuestra clase.",
            hint: "Fíjate en el artículo que sigue al espacio. ¿El sustantivo es uno o varios?",
            clue: "a boy",
            clueExplain: "'A boy' = un niño (singular). Singular → There IS.",
            formType: "singular",
            options: ["There is", "There are", "There be"],
            correct: "There is",
            feedback: {
                "There are": {
                    errorType: "Plural por singular",
                    explanation: "'There are' se usa con sustantivos en plural. 'A boy' es singular — solo hay un niño. Con un sujeto singular se usa 'There is'.",
                    rule: "There is + singular / There are + plural"
                },
                "There be": {
                    errorType: "Forma inexistente",
                    explanation: "'There be' no existe como estructura en inglés. Las formas correctas son 'There is' (singular) y 'There are' (plural).",
                    rule: "There IS (singular) · There ARE (plural) — no existe 'There be'"
                }
            },
            correctReason: "'A boy' es singular (un niño). Con sustantivos singulares siempre usamos 'There is'. La señal clave es el artículo 'a' antes del sustantivo.",
            examples: ["There is a dog.", "There is a book.", "There is a new student."]
        },
        {
            id:2,
            sentence: "_____ still some empty seats in the classroom.",
            translation: "Todavía hay algunos asientos vacíos en el salón.",
            hint: "La palabra 'seats' te da la clave. ¿Es singular o plural?",
            clue: "seats (plural)",
            clueExplain: "'Seats' termina en -s — es plural. Plural → There ARE.",
            formType: "plural",
            options: ["There are", "There is", "There have"],
            correct: "There are",
            feedback: {
                "There is": {
                    errorType: "Singular por plural",
                    explanation: "'There is' se usa con un solo objeto. 'Seats' (asientos) es plural — hay más de uno. Con sustantivos plurales se usa 'There are'.",
                    rule: "There is + singular / There are + plural"
                },
                "There have": {
                    errorType: "Forma inexistente",
                    explanation: "'There have' no existe en inglés. Las únicas formas correctas son 'There is' y 'There are'. El verbo 'have' no funciona con 'there' como verbo existencial.",
                    rule: "There IS (singular) · There ARE (plural) — no existe 'There have'"
                }
            },
            correctReason: "'Seats' es plural (asientos). Con sustantivos plurales siempre usamos 'There are'. La -s al final de 'seats' es la señal clave.",
            examples: ["There are five students.", "There are two chairs.", "There are empty seats."]
        },
        {
            id:3,
            sentence: "_____ five people in the photo, and everyone is smiling.",
            translation: "Hay cinco personas en la foto, y todos están sonriendo.",
            hint: "¿Cuántas personas menciona la oración? El número te dice la forma.",
            clue: "five people",
            clueExplain: "'Five people' = cinco personas (plural). Número mayor que uno → There ARE.",
            formType: "plural",
            options: ["There are", "There is", "There was"],
            correct: "There are",
            feedback: {
                "There is": {
                    errorType: "Singular por plural",
                    explanation: "'There is' solo se usa para una sola cosa. Aquí hay cinco personas — es plural. Con cantidades mayores a uno siempre se usa 'There are'.",
                    rule: "There is + 1 cosa / There are + 2 o más cosas"
                },
                "There was": {
                    errorType: "Tiempo incorrecto — pasado",
                    explanation: "'There was' es el pasado de 'There is'. La oración describe una foto en el presente — el tiempo correcto es presente. Además, 'five people' es plural.",
                    rule: "Presente: There is/are. Pasado: There was/were"
                }
            },
            correctReason: "'Five people' indica cinco personas (plural). Con cualquier número mayor a uno se usa 'There are'. La señal clave es el número 'five'.",
            examples: ["There are five people.", "There are eight members.", "There are three brothers."]
        },
        {
            id:4,
            sentence: "_____ a new baby in your house! Are you happy?",
            translation: "¡Hay un bebé nuevo en tu casa! ¿Estás feliz?",
            hint: "¿De cuántos bebés estamos hablando? El artículo antes del sustantivo es tu pista.",
            clue: "a new baby",
            clueExplain: "'A new baby' = un bebé (singular). El artículo 'a' indica que es uno solo → There IS.",
            formType: "singular",
            options: ["There is", "There are", "There be"],
            correct: "There is",
            feedback: {
                "There are": {
                    errorType: "Plural por singular",
                    explanation: "'There are' se usa con más de una cosa. 'A new baby' es singular — solo hay un bebé. La clave es el artículo 'a' que siempre va con singular.",
                    rule: "There is + a/an + singular noun"
                },
                "There be": {
                    errorType: "Forma inexistente",
                    explanation: "'There be' no es una estructura válida en inglés. Con sustantivos singulares la forma correcta es siempre 'There is'.",
                    rule: "There IS (singular) · There ARE (plural)"
                }
            },
            correctReason: "'A new baby' es singular. Siempre que veas 'a' o 'an' antes del sustantivo, la estructura es 'There is'. El artículo 'a' es la señal definitiva.",
            examples: ["There is a baby.", "There is a new student.", "There is a photo."]
        },
        {
            id:5,
            sentence: "_____ six people in Ravi's family: his mom, dad, two brothers, grandpa, and him.",
            translation: "Hay seis personas en la familia de Ravi: su mamá, papá, dos hermanos, abuelo y él.",
            hint: "Cuenta las personas que menciona la oración. El número lo dice todo.",
            clue: "six people",
            clueExplain: "'Six people' = seis personas (plural). Plural → There ARE.",
            formType: "plural",
            options: ["There are", "There is", "There have"],
            correct: "There are",
            feedback: {
                "There is": {
                    errorType: "Singular por plural",
                    explanation: "'There is' se usa para una sola persona u objeto. La oración dice 'six people' — son seis. Con más de uno siempre se usa 'There are'.",
                    rule: "There is + 1 / There are + 2 o más"
                },
                "There have": {
                    errorType: "Forma inexistente",
                    explanation: "'There have' no existe como estructura existencial en inglés. Solo 'There is' y 'There are' son correctos para expresar existencia.",
                    rule: "There IS (singular) · There ARE (plural)"
                }
            },
            correctReason: "'Six people' son seis personas — plural. La regla es simple: con dos o más elementos se usa 'There are'. El número 'six' es la señal directa.",
            examples: ["There are six people.", "There are four chairs.", "There are two brothers."]
        },
        {
            id:6,
            sentence: "_____ also my grandpa, Don Beto. He is old but very strong.",
            translation: "También está mi abuelo, Don Beto. Es viejo pero muy fuerte.",
            hint: "¿De cuántas personas habla esta oración? Busca si el sujeto es uno o varios.",
            clue: "my grandpa (singular)",
            clueExplain: "'My grandpa' = mi abuelo — una sola persona (singular). Singular → There IS.",
            formType: "singular",
            options: ["There is", "There are", "There was"],
            correct: "There is",
            feedback: {
                "There are": {
                    errorType: "Plural por singular",
                    explanation: "'There are' se usa con dos o más personas. 'My grandpa' es una sola persona (singular). Con un sujeto singular la forma correcta es 'There is'.",
                    rule: "There is + persona/cosa singular"
                },
                "There was": {
                    errorType: "Tiempo incorrecto — pasado",
                    explanation: "'There was' es el pasado singular de 'There is'. La oración habla del abuelo en el presente — él sigue existiendo en la historia. El tiempo correcto es 'There is'.",
                    rule: "Presente: There is/are · Pasado: There was/were"
                }
            },
            correctReason: "'My grandpa' es una persona (singular). La estructura 'There is' se usa para presentar una persona o cosa singular. Aquí se introduce al abuelo Don Beto.",
            examples: ["There is my grandpa.", "There is a neighbor.", "There is a kind person."]
        },
        {
            id:7,
            sentence: "_____ eight people in the photo on Mia's bedroom wall.",
            translation: "Hay ocho personas en la foto en la pared del cuarto de Mia.",
            hint: "El número al inicio de la descripción es tu clave principal.",
            clue: "eight people",
            clueExplain: "'Eight people' = ocho personas. Número plural → There ARE.",
            formType: "plural",
            options: ["There are", "There is", "There be"],
            correct: "There are",
            feedback: {
                "There is": {
                    errorType: "Singular por plural",
                    explanation: "'There is' solo funciona con un solo elemento. Aquí hay ocho personas en la foto — eso es plural. Siempre que el número sea dos o más, usa 'There are'.",
                    rule: "There is + 1 / There are + 2 o más"
                },
                "There be": {
                    errorType: "Forma inexistente",
                    explanation: "'There be' no existe en inglés estándar. Las únicas formas presentes correctas son 'There is' (singular) y 'There are' (plural).",
                    rule: "There IS (singular) · There ARE (plural)"
                }
            },
            correctReason: "'Eight people' indica ocho personas — claramente plural. Cualquier número mayor a uno requiere 'There are'. El número 'eight' es la señal definitiva.",
            examples: ["There are eight people.", "There are five members.", "There are many photos."]
        },
        {
            id:8,
            sentence: "On Saturdays, _____ no rush in the morning at Leo's house.",
            translation: "Los sábados, no hay apuro por la mañana en la casa de Leo.",
            hint: "¿'Rush' (apuro) es contable o incontable? ¿Singular o plural?",
            clue: "no rush (singular/incontable)",
            clueExplain: "'Rush' es un sustantivo incontable singular. Con sustantivos singulares e incontables → There IS.",
            formType: "singular",
            options: ["There is", "There are", "There have"],
            correct: "There is",
            feedback: {
                "There are": {
                    errorType: "Plural por singular",
                    explanation: "'There are' se usa con sustantivos plurales contables. 'Rush' (apuro) es incontable — no se puede pluralizar ('rushes' significaría otra cosa). Con sustantivos incontables o singulares se usa 'There is'.",
                    rule: "There is + singular / There is + incontable"
                },
                "There have": {
                    errorType: "Forma inexistente",
                    explanation: "'There have' no existe como estructura existencial en inglés. Las formas correctas son solo 'There is' y 'There are'.",
                    rule: "There IS (singular/incontable) · There ARE (plural)"
                }
            },
            correctReason: "'Rush' (apuro) es un sustantivo incontable — no tiene forma plural en este contexto. Los sustantivos incontables siguen la regla del singular: 'There is no rush'. La señal es que no lleva artículo ni -s.",
            examples: ["There is no rush.", "There is silence.", "There is peace."]
        },
        {
            id:9,
            sentence: "_____ also my neighbor Mrs. Ana. She lives alone.",
            translation: "También está mi vecina, la señora Ana. Vive sola.",
            hint: "¿Cuántas vecinas menciona? Cuenta los sujetos en la oración.",
            clue: "my neighbor Mrs. Ana (una persona)",
            clueExplain: "'My neighbor Mrs. Ana' = una sola persona (singular). Singular → There IS.",
            formType: "singular",
            options: ["There is", "There are", "There was"],
            correct: "There is",
            feedback: {
                "There are": {
                    errorType: "Plural por singular",
                    explanation: "'There are' se usa cuando hay dos o más personas u objetos. Aquí solo se menciona a una vecina (Mrs. Ana). Con una sola persona se usa 'There is'.",
                    rule: "There is + 1 persona/cosa"
                },
                "There was": {
                    errorType: "Tiempo incorrecto — pasado",
                    explanation: "'There was' es el pasado de 'There is'. La historia habla de la vecina en el presente — ella sigue viviendo allí. El tiempo correcto es 'There is'.",
                    rule: "Presente: There is · Pasado: There was"
                }
            },
            correctReason: "'My neighbor Mrs. Ana' es una sola persona — singular. 'There is' se usa para presentar una persona o cosa singular en el presente. La estructura introduce a la vecina por primera vez en la historia.",
            examples: ["There is a neighbor.", "There is a kind woman.", "There is Mrs. Ana."]
        },
        {
            id:10,
            sentence: "In every story grandpa tells, _____ always a kind person who wins.",
            translation: "En cada historia que cuenta el abuelo, siempre hay una persona amable que gana.",
            hint: "¿Cuántas personas amables hay en cada historia? El artículo es tu guía.",
            clue: "a kind person",
            clueExplain: "'A kind person' = una persona amable (singular). El artículo 'a' confirma que es singular → There IS.",
            formType: "singular",
            options: ["There is", "There are", "There be"],
            correct: "There is",
            feedback: {
                "There are": {
                    errorType: "Plural por singular",
                    explanation: "'There are' va con plural. 'A kind person' es singular — el artículo 'a' siempre indica uno solo. Con 'a/an + sustantivo singular' la forma correcta es 'There is'.",
                    rule: "There is + a/an + singular noun"
                },
                "There be": {
                    errorType: "Forma inexistente",
                    explanation: "'There be' no es una forma válida en inglés presente. Las formas correctas son 'There is' (singular) y 'There are' (plural).",
                    rule: "There IS · There ARE — no existe 'There be'"
                }
            },
            correctReason: "'A kind person' es singular. El artículo 'a' es la señal más directa: siempre que veas 'a' o 'an' antes del sustantivo, la estructura es 'There is'.",
            examples: ["There is a kind person.", "There is a winner.", "There is always hope."]
        }
    ];

    let currentQuestion=0, score=0;
    let answered=new Array(quizData.length).fill(false);

    function initQuiz(){
        const c=document.getElementById('questionsContainer');
        c.innerHTML='';
        quizData.forEach((q,i)=>{
            q.shuffled=[...q.options].sort(()=>Math.random()-.5);
            c.appendChild(createCard(q,i));
        });
        showQuestion(0); updateProgress();
    }

    function createCard(q,index){
        const card=document.createElement('div');
        card.className=`question-card ${index!==0?'hidden':''}`;
        card.id=`question-${index}`;
        const badge=q.formType==='singular'
            ?'<span class="form-badge singular">📌 Singular</span>'
            :'<span class="form-badge plural">📌 Plural</span>';
        const opts=q.shuffled.map((opt,i)=>`
            <button class="option-btn" data-idx="${i}" data-qi="${index}">${opt}</button>
        `).join('');
        card.innerHTML=`
            <div class="q-header">
                <div class="question-number">${index+1}</div>
                <span style="font-size:0.88rem;color:var(--text-medium);font-weight:600;flex:1;">Elige la forma correcta:</span>
                ${badge}
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Pista</div>
                ${q.hint}
            </div>
            <div class="question-text" id="sentence-${index}">${q.sentence.replace('_____','<span class="blank" id="blank-${index}">_____</span>')}</div>
            <div class="translation">${q.translation}</div>
            <div class="options-grid" id="options-${index}">${opts}</div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index===0?'disabled':''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index===quizData.length-1?'Ver Resultados 🎉':'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    document.getElementById('questionsContainer').addEventListener('click', e => {
        const btn=e.target.closest('.option-btn');
        if(!btn)return;
        const qi=parseInt(btn.dataset.qi);
        const idx=parseInt(btn.dataset.idx);
        selectOption(qi,idx);
    });

    function selectOption(qi,optIdx){
        if(answered[qi])return;
        answered[qi]=true;
        const q=quizData[qi];
        const chosen=q.shuffled[optIdx];
        const isCorrect=chosen===q.correct;
        if(isCorrect)score++;

        const blank=document.getElementById(`blank-${qi}`);
        if(blank){blank.textContent=chosen;blank.className=`blank ${isCorrect?'correct':'incorrect'}`;}

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach((btn,i)=>{
            btn.disabled=true;
            const v=q.shuffled[i];
            if(v===q.correct)btn.classList.add('correct');
            else if(i===optIdx)btn.classList.add('incorrect');
        });
        buildFeedback(qi,chosen,isCorrect,q);
        document.getElementById(`next-${qi}`).disabled=false;
        updateProgress();
    }

    function buildFeedback(qi,chosen,isCorrect,q){
        const el=document.getElementById(`feedback-${qi}`);
        el.className=`feedback show ${isCorrect?'correct':'incorrect'}`;
        const exs=q.examples.map(e=>`<span class="rule-ex">${e}</span>`).join('');
        if(isCorrect){
            el.innerHTML=`
            <div class="fb-header"><span class="fb-icon">✅</span><div>
                <div class="fb-title">¡Correcto!</div>
                <div class="fb-subtitle">"${q.correct}" es la forma exacta</div>
            </div></div>
            <div class="fb-body">
                <div class="fb-block fb-signal">
                    <div class="fb-block-title">🔍 Señal clave en la oración</div>
                    <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                        <span class="signal-tag">${q.clue}</span> — ${q.clueExplain}
                    </div>
                </div>
                <div class="fb-block fb-rule">
                    <div class="fb-block-title">📐 Regla aplicada</div>
                    <div class="rule-formula">There is + singular &nbsp;/&nbsp; There are + plural</div>
                    <div class="rule-examples">${exs}</div>
                </div>
                <div class="fb-block fb-why">
                    <div class="fb-block-title">💡 ¿Por qué es correcta?</div>
                    <div class="fb-why-text">${q.correctReason}</div>
                </div>
            </div>`;
        } else {
            const fb=q.feedback[chosen]||{errorType:'Error',explanation:'Revisa la regla.',rule:'There is + singular / There are + plural'};
            el.innerHTML=`
            <div class="fb-header"><span class="fb-icon">❌</span><div>
                <div class="fb-title">Incorrecto</div>
                <div class="fb-subtitle">Revisemos la señal clave</div>
            </div></div>
            <div class="fb-body">
                <div class="fb-block fb-signal wrong">
                    <div class="fb-block-title">🔍 Señal clave que debías identificar</div>
                    <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                        <span class="signal-tag red">${q.clue}</span> — ${q.clueExplain}
                    </div>
                </div>
                <div class="fb-block fb-error">
                    <div class="fb-block-title">⚠️ El error: <span class="error-badge">${fb.errorType}</span></div>
                    <div class="word-swap">
                        <span class="ws-box ws-wrong">${chosen}</span>
                        <span class="ws-arr">→</span>
                        <span class="ws-box ws-right">${q.correct}</span>
                    </div>
                    <div class="error-text">${fb.explanation}</div>
                </div>
                <div class="fb-block fb-rule">
                    <div class="fb-block-title">📐 La regla correcta</div>
                    <div class="rule-formula">There is + singular &nbsp;/&nbsp; There are + plural</div>
                    <div class="rule-examples">${exs}</div>
                </div>
                <div class="fb-block fb-why">
                    <div class="fb-block-title">💡 ¿Por qué es correcta la otra opción?</div>
                    <div class="fb-why-text">${q.correctReason}</div>
                </div>
            </div>`;
        }
    }

    function showQuestion(i){
        document.querySelectorAll('.question-card').forEach((c,idx)=>c.classList.toggle('hidden',idx!==i));
        document.getElementById('currentQ').textContent=i+1;
        currentQuestion=i;
    }
    function nextQuestion(i){i<quizData.length-1?showQuestion(i+1):showResults();}
    function prevQuestion(){if(currentQuestion>0)showQuestion(currentQuestion-1);}
    function updateProgress(){
        const done=answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width=(done/quizData.length*100)+'%';
    }
    function showResults(){
        document.querySelectorAll('.question-card').forEach(c=>c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct=score/quizData.length*100;
        document.getElementById('finalScore').textContent=`${score}/${quizData.length}`;
        let stars=pct>=90?3:pct>=70?2:1;
        document.getElementById('resultsMessage').textContent=pct>=90
            ?'¡Excelente! Dominas "There is" y "There are" perfectamente. 🏆'
            :pct>=70?'¡Muy bien! Sigue practicando la distinción singular/plural. 💪'
            :'Buen esfuerzo. Recuerda: singular → There is, plural → There are. 📚';
        document.querySelectorAll('.star').forEach((s,i)=>{
            if(i<stars)setTimeout(()=>s.classList.add('earned'),i*300);
        });
    }
    document.addEventListener('DOMContentLoaded',initQuiz);
    </script>
</body>
</html>
